# Cognite Toolkit project root for Foundation Deployment Pack (FDP) CI/CD.
# Deployable modules live under modules/; environment configs under foundation-deployment-pack/.
[cdf]
default_organization_dir = "foundation-deployment-pack"
default_env = "dev"
file_encoding = "utf-8"

[modules]
# Updated by cdf modules upgrade; keep in sync with cognite-toolkit in CI.
version = "0.7.220"

[plugins]
dump = false
dev = false
data = false
functions = false

[alpha_flags]
deployment-pack = true

[library.cognite]
url = "https://github.com/cognitedata/library/releases/download/latest/packages.zip"
