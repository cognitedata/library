# This is making an equivalent location in Fusion to display the same data as InField.
# This is optional and not needed for InField to work, just for convinient data exploration based on InField locations in Fusion.
externalId: loc_fltr_{{location}}
name: Infield - {{location_name}}
description: Infield {{location_description}}
dataModels:
  - space: cdf_infield
    externalId: InFieldOnCDM
    version: v1
instanceSpaces:
  - sp_infield_{{location}}_assets
  - sp_infield_{{location}}_maintenance
  - sp_infield_{{location}}_timeseries
  - sp_infield_{{location}}_files_1
  - sp_infield_{{location}}_files_2
  - sp_infield_{{location}}_app_inst
views:
  - externalId: CogniteMaintenanceOrder
    space: cdf_idm
    version: v1
    representsEntity: MAINTENANCE_ORDER
  - externalId: CogniteOperation
    space: cdf_idm
    version: v1
    representsEntity: OPERATION
  - externalId: CogniteNotification
    space: cdf_idm
    version: v1
    representsEntity: NOTIFICATION
  - externalId: CogniteAsset
    space: cdf_cdm
    version: v1
    representsEntity: ASSET
