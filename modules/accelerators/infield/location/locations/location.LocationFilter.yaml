# Note: Template variables must use double braces format without spaces.
# Do not auto-format this file as it will break template variable syntax.
externalId: loc_fltr_{{location}}
name: Infield - {{location_name}}
description: Infield {{location_description}}
dataModels:
  - space: {{idm_extension_space}}
    externalId: {{idm_extension_data_model_external_id}}
    version: {{idm_extension_data_model_version}}
instanceSpaces:
  - sp_infield_{{location}}_assets
  - sp_infield_{{location}}_maintenance
  - sp_infield_{{location}}_timeseries
  - sp_infield_{{location}}_files_1
  - sp_infield_{{location}}_files_2
  - sp_infield_{{location}}_app_inst
views:
  - externalId: ExtendedMaintenanceOrder
    space: {{idm_extension_space}}
    version: {{idm_extension_data_model_version}}
    representsEntity: MAINTENANCE_ORDER
  - externalId: ExtendedOperation
    space: {{idm_extension_space}}
    version: {{idm_extension_data_model_version}}
    representsEntity: OPERATION
  - externalId: ExtendedNotification
    space: {{idm_extension_space}}
    version: {{idm_extension_data_model_version}}
    representsEntity: NOTIFICATION
  - externalId: ExtendedAsset
    space: {{idm_extension_space}}
    version: {{idm_extension_data_model_version}}
    representsEntity: ASSET
