# =============================================================================
# Site Aliasing Config
# Generated from: prod/<site>/config.yaml (legacy)
# Targets: CogniteFile (resource_type=File), CogniteAsset (resource_type=Asset)
# Structure based on: ctx_aliasing_default.config.yaml
# =============================================================================

externalId: ctx_aliasing_{{ site_abbreviation }}_prod
config:
  parameters:
    debug: true
    run_all: true
    overwrite: true
    raw_db: db_tag_aliasing
    raw_table_state: tag_aliasing_state_{{ site_abbreviation }}
    raw_table_aliases: {{ site_abbreviation }}_aliases
  data:
    aliasing_rules:

    # =========================================================================
    # FILE RULES (scope_filters: entity_type: [file])
    # Legacy: files_query_args detect/match_transformations, metadata_transformations
    # =========================================================================

    # File: RDP-PID <-> PPG-* OCR substitutions (legacy ocr_fix)
    - name: site_file_rdp_ppg_ocr
      type: character_substitution
      description: "{{ site_name }} file OCR substitutions - RDP-PID <-> PPG-SYS, PPG-HAS, PPG-E25, PPG-UTI"
      enabled: true
      priority: 10
      preserve_original: true
      config:
        substitutions:
          "RDP-PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
          "RDP_PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
          "RDP PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
        cascade_substitutions: false
        max_aliases_per_input: 10
        bidirectional: true
      conditions: {}
      scope_filters:
        entity_type: [file]

    # File: Default OCR substitutions
    - name: site_file_default_ocr
      type: character_substitution
      description: "Default OCR substitutions A<->W, 8<->B for files"
      enabled: true
      priority: 11
      preserve_original: true
      config:
        substitutions: {"A": ["W"], "8": ["B"]}
        cascade_substitutions: false
        max_aliases_per_input: 20
        bidirectional: true
      conditions: {}
      scope_filters:
        entity_type: [file]

