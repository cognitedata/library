# =============================================================================
# Site Key Extraction Config (Candidate Keys)
# Generated from: prod/<site>/config.yaml (legacy)
# Targets: CogniteFile (resource_type=File), CogniteAsset (resource_type=Asset)
# =============================================================================

externalId: ctx_key_extraction_{{ site_abbreviation }}_prod
config:
  parameters:
    debug: true
    run_all: true
    overwrite: true
    raw_db: db_key_extraction
    raw_table_state: key_extraction_state_{{ site_abbreviation }}
    raw_table_key: {{ site_abbreviation }}_extracted_keys
  data:
    validation:
      min_confidence: 0.5
      max_keys_per_type: 1000
      blacklist_keywords:
        - "test"
        - "example"
        - "sample"
        - "dummy"
        - "temp"
        - "temporary"
        - "null"
        - "none"
        - "n/a"
        - "na"
        - "unknown"
    source_views:
    # -------------------------------------------------------------------------
    # CogniteFile (resource_type = File)
    # -------------------------------------------------------------------------
    - view_external_id: CogniteFile
      view_space: cdf_cdm
      view_version: v1
      instance_space: {{ instance_space }}
      entity_type: file
      batch_size: 1000
      filters:
        - operator: IN
          target_property: mimeType
          values:
            - application/pdf
      include_properties:
        - externalId
        - name
        - description
        - tags
        - metadata

    extraction_rules:
      # Keep this file focused on site-specific rules.
      # Generic examples live in ctx_key_extraction_default.config.yaml.

      - name: "site_file_ocr_rdp_ppg_candidates"
        method: "regex"
        extraction_type: "candidate_key"
        description: "Extract RDP/PPG variants from file name"
        enabled: true
        priority: 65
        scope_filters:
          entity_type: ["file"]
        parameters:
          pattern: '\b(?:RDP[-_\s]?PID|PPG[-_\s]?(?:SYS|HAS|E25|UTI))\b'
          max_matches_per_field: 10
          regex_options:
            ignore_case: true
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
          - field_name: "name"
            required: true
            max_length: 500
            field_type: string
            priority: 1
            role: target
            preprocessing:
              - trim
        field_selection_strategy: "first_match"

      - name: "site_file_tag_like_from_name"
        method: "regex"
        extraction_type: "candidate_key"
        description: "Extract asset-tag-like tokens from file name/description"
        enabled: true
        priority: 58
        scope_filters:
          entity_type: ["file"]
        parameters:
          pattern: '\b(?=[A-Za-z0-9_-]*\d)[A-Za-z0-9][A-Za-z0-9_-]{3,}\b'
          max_matches_per_field: 50
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
          - field_name: "name"
            required: true
            max_length: 500
            field_type: string
            priority: 1
            role: target
            preprocessing:
              - trim
          - field_name: "description"
            required: false
            max_length: 1000
            field_type: string
            priority: 2
            role: target
            preprocessing:
              - trim
        field_selection_strategy: "merge_all"

      - name: "site_file_metadata_aliases_extraction"
        method: "regex"
        extraction_type: "candidate_key"
        description: "Extract tag-like tokens from file metadata.aliases"
        enabled: true
        priority: 72
        scope_filters:
          entity_type: ["file"]
        parameters:
          pattern: '\b(?=[A-Za-z0-9_-]*\d)[A-Za-z0-9][A-Za-z0-9_-]{3,}\b'
          max_matches_per_field: 200
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
          - field_name: "metadata.aliases"
            required: false
            max_length: 5000
            field_type: array
            separator: " "
            priority: 1
            role: target
            preprocessing:
              - trim
        field_selection_strategy: "merge_all"

