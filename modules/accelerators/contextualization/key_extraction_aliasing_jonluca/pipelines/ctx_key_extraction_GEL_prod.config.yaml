# =============================================================================
# Geleen Key Extraction Config (Candidate Keys)
# Generated from: prod/geleen/config.yaml
# Targets: CogniteFile (resource_type=File), CogniteAsset (resource_type=Asset)
# =============================================================================

externalId: ctx_key_extraction_GEL_prod
config:
  parameters:
    debug: true
    run_all: true
    overwrite: true
    raw_db: db_key_extraction
    raw_table_state: key_extraction_state_GEL
    raw_table_key: GEL_extracted_keys
  data:
    validation:
      min_confidence: 0.5
      max_keys_per_type: 1000
      blacklist_keywords:
        - "test"
        - "example"
        - "sample"
        - "dummy"
        - "temp"
        - "temporary"
        - "null"
        - "none"
        - "n/a"
        - "na"
        - "unknown"
    source_views:
    # -------------------------------------------------------------------------
    # CogniteFile (resource_type = File)
    # Dataset: BEN-GEL-ALL-DAT
    # -------------------------------------------------------------------------
    - view_external_id: CogniteFile
      view_space: cdf_cdm
      view_version: v1
      instance_space: BEN-GEL-ALL-DAT
      entity_type: file
      batch_size: 50
      filters:
      - operator: IN
        target_property: mimeType
        values:
        - application/pdf
      include_properties:
      - externalId
      - name
      - description
      - tags
      - metadata

    # -------------------------------------------------------------------------
    # CogniteAsset (resource_type = Asset)
    # Dataset: SAP-GEL-ALL-DAT
    # -------------------------------------------------------------------------
    - view_external_id: CogniteAsset
      view_space: cdf_cdm
      view_version: v1
      instance_space: SAP-GEL-ALL-DAT
      entity_type: asset
      batch_size: 100
      include_properties:
      - externalId
      - name
      - description
      - tags
      - metadata

    # CogniteAsset from synthetic PI dataset
    - view_external_id: CogniteAsset
      view_space: cdf_cdm
      view_version: v1
      instance_space: SYNTHETIC-PI-ASSETS-GEL
      entity_type: asset
      batch_size: 50
      include_properties:
      - externalId
      - name
      - description
      - tags
      - metadata

    extraction_rules:
    # =========================================================================
    # FILE RULES (scope_filters: entity_type: ["file"])
    # Mapped from Geleen prod: files_query_args detect_transformations,
    # match_transformations (default_file_aliasing)
    # =========================================================================

    # File: RDP-PID / PPG-* OCR-style candidates (from detect: ocr_fix)
    - name: "geleen_file_ocr_rdp_ppg_candidates"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract RDP-PID, PPG-SYS, PPG-HAS, PPG-E25, PPG-UTI from file name (Geleen ocr_fix equivalents)"
      enabled: true
      priority: 65
      scope_filters:
        entity_type: ["file"]
      parameters:
        pattern: '\b(?:RDP[-_\s]?PID|PPG[-_\s]?(?:SYS|HAS|E25|UTI))\b'
        max_matches_per_field: 10
        regex_options:
          ignore_case: true
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "name"
        required: true
        max_length: 500
        field_type: string
        priority: 1
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "first_match"

    # File: Tag-like tokens from name (default_file_aliasing extraction logic)
    - name: "geleen_file_tag_like_from_name"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract asset-tag-like tokens from file name (4+ chars, contains digit)"
      enabled: true
      priority: 58
      scope_filters:
        entity_type: ["file"]
      parameters:
        pattern: '\b(?=[A-Za-z0-9_-]*\d)[A-Za-z0-9][A-Za-z0-9_-]{3,}\b'
        max_matches_per_field: 50
        regex_options:
          ignore_case: false
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "name"
        required: true
        max_length: 500
        field_type: string
        priority: 1
        role: target
        preprocessing:
        - trim
      - field_name: "description"
        required: false
        max_length: 1000
        field_type: string
        priority: 2
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "merge_all"

    # File: Tag-like tokens from metadata (CDM property: aliases)
    # Legacy: object.metadata['aliases']
    - name: "geleen_file_metadata_aliases_extraction"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract tag-like tokens from file metadata.aliases (CDM property)"
      enabled: true
      priority: 72
      scope_filters:
        entity_type: ["file"]
      parameters:
        pattern: '\b(?=[A-Za-z0-9_-]*\d)[A-Za-z0-9][A-Za-z0-9_-]{3,}\b'
        max_matches_per_field: 200
        regex_options:
          ignore_case: false
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "metadata.aliases"
        required: false
        max_length: 5000
        field_type: array
        separator: " "
        priority: 1
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "merge_all"

    # File: Standard asset-tag pattern (default_file_aliasing uses extract_asset_list internally)
    - name: "geleen_file_asset_tag_extraction"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract standard asset tags from file name (legacy asset_tag_match pattern)"
      enabled: true
      priority: 55
      scope_filters:
        entity_type: ["file"]
      parameters:
        pattern: '\b[A-Z0-9-\/]+[a-zA-Z0-9]\b'
        max_matches_per_field: 30
        regex_options:
          ignore_case: false
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "name"
        required: true
        max_length: 500
        field_type: string
        priority: 1
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "merge_all"

    # =========================================================================
    # ASSET RULES (scope_filters: entity_type: ["asset"])
    # Mapped from Geleen prod: assets_query_args, name_transformations
    # =========================================================================

    # Asset: Standard asset tags from name (default_asset_aliasing)
    - name: "geleen_asset_tag_extraction"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract asset tags from asset name (default_asset_aliasing extract_asset_list)"
      enabled: true
      priority: 50
      scope_filters:
        entity_type: ["asset"]
      parameters:
        pattern: '\b[A-Z0-9-\/]+[a-zA-Z0-9]\b'
        max_matches_per_field: 50
        regex_options:
          ignore_case: false
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "name"
        required: true
        max_length: 500
        field_type: string
        priority: 1
        role: target
        preprocessing:
        - trim
      - field_name: "description"
        required: false
        max_length: 1000
        field_type: string
        priority: 2
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "merge_all"

    # Asset: 6-digit codes from name and metadata (CDM property: Sort Field)
    # Legacy: object.metadata['Sort Field']
    - name: "geleen_asset_6digit_extraction"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract 6-digit codes from asset name and metadata.Sort Field (CDM property)"
      enabled: true
      priority: 55
      scope_filters:
        entity_type: ["asset"]
      parameters:
        pattern: '\b\d{6}\b'
        max_matches_per_field: 20
        regex_options:
          ignore_case: false
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "name"
        required: true
        max_length: 500
        field_type: string
        priority: 1
        role: target
        preprocessing:
        - trim
      - field_name: "metadata.Sort Field"
        required: false
        max_length: 2000
        field_type: string
        priority: 2
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "merge_all"

    # Asset: 6-digit + optional letter (CDM property: Sort Field)
    # Legacy: object.metadata['Sort Field']
    - name: "geleen_asset_6digit_letter_extraction"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract 6-digit codes with optional suffix letter (A,B,C,O,S,R) from metadata.Sort Field"
      enabled: true
      priority: 56
      scope_filters:
        entity_type: ["asset"]
      parameters:
        pattern: '\b\d{6}[A-Z]\b'
        max_matches_per_field: 20
        regex_options:
          ignore_case: false
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "name"
        required: true
        max_length: 500
        field_type: string
        priority: 1
        role: target
        preprocessing:
        - trim
      - field_name: "metadata.Sort Field"
        required: false
        max_length: 2000
        field_type: string
        priority: 2
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "merge_all"

    # Asset: Tag-like tokens with unit infixes (CDM property: Sort Field)
    # Legacy: object.metadata['Sort Field']
    - name: "geleen_asset_unit_infix_candidates"
      method: "regex"
      extraction_type: "candidate_key"
      description: "Extract tag patterns with unit infixes (-CSB1-, -SSPT-, etc.) from metadata.Sort Field"
      enabled: true
      priority: 57
      scope_filters:
        entity_type: ["asset"]
      parameters:
        pattern: '\b[A-Za-z0-9]+(?:-CSB1-|-SSPT-|-CSA1-|-SSND-|-SSSF-|-SSB1-)[A-Za-z0-9]+\b'
        max_matches_per_field: 30
        regex_options:
          ignore_case: false
          multiline: false
          dotall: false
          unicode: true
        early_termination: false
      source_fields:
      - field_name: "name"
        required: true
        max_length: 500
        field_type: string
        priority: 1
        role: target
        preprocessing:
        - trim
      - field_name: "metadata.Sort Field"
        required: false
        max_length: 2000
        field_type: string
        priority: 2
        role: target
        preprocessing:
        - trim
      field_selection_strategy: "merge_all"
