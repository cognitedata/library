  - externalId: transform_mpk5q5bq
    type: function
    dependsOn:
    - externalId: query_view_mpk5beqq
    - externalId: query_view_mpkf9ork
    - externalId: query_view_mpkf9xge
    - externalId: query_view_mpkfbrkh
    parameters:
      function:
        externalId: fn_etl_transform
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: transform_mpk5q5bq
          canvas_node_id: transform_mpk5q5bq
          config:
            handler_id: trim_whitespace
            trim_whitespace:
              mode: ends_only
            output_field: aliases
            fields:
            - field_name: name
              regex: ''
            output_template: ''
            description: Trim instance name and append normalized value to aliases
          predecessors:
          - query_view_mpk5beqq
          - query_view_mpkf9ork
          - query_view_mpkf9xge
          - query_view_mpkfbrkh
    name: Name Passthrough
    description: Execute fn_etl_transform
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: transform_mpk5sdjw
    type: function
    dependsOn:
    - externalId: query_view_mpk5beqq
    parameters:
      function:
        externalId: fn_etl_transform
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: transform_mpk5sdjw
          canvas_node_id: transform_mpk5sdjw
          config:
            execution:
              mode: parallel
            steps:
            - handler_id: trim_whitespace
              trim_whitespace:
                mode: ends_only
              fields:
              - field_name: name
                regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
              output_field: aliases
              description: Extract ISA-style tag tokens from CogniteAsset name via
                regex
            - handler_id: heuristic_sampler
              heuristic_sampler:
                on_no_match: keep_working
                samples:
                - 10-P-1234
              output_field: aliases
              fields:
              - field_name: name
              description: Infer tag-like aliases from asset name using heuristic
                sample patterns
            - handler_id: regex_substitution
              trim_whitespace:
                mode: ends_only
              output_field: aliases
              fields:
              - field_name: name
                regex: ''
              regex_substitution:
                patterns:
                - pattern: ^[^-]+-(?=[^ -]+-[^ -])
                  replacement: ''
              description: Strip leading unit prefix segment from name before alias
                merge
            description: Extract ISA-style tag tokens from CogniteAsset name via regex
            field_policies:
            - property: aliases
              strategy: merge_list
              merge_list:
                unique: true
                branch_order: by_score
          predecessors:
          - query_view_mpk5beqq
    name: 'Regex Tag Extraction: Name'
    description: Execute fn_etl_transform
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: transform_mpr2s8sk
    type: function
    dependsOn:
    - externalId: query_view_mpkfbrkh
    parameters:
      function:
        externalId: fn_etl_transform
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: transform_mpr2s8sk
          canvas_node_id: transform_mpr2s8sk
          config:
            execution:
              mode: parallel
            steps:
            - handler_id: heuristic_sampler
              heuristic_sampler:
                samples:
                - XXX-000000
                - XXX_000000
                on_no_match: keep_working
              output_field: indexKey
              fields:
              - field_name: name
              description: Heuristic indexKey from file name
            - handler_id: heuristic_sampler
              enabled: true
              fields:
              - field_name: description
              output_field: indexKey
              output_template: ''
              output_mode: append
              heuristic_sampler:
                samples:
                - XXX-000000
                - XXX_000000
              description: Append indexKey tokens parsed from file description
            description: Heuristic indexKey from file name
            field_policies:
            - property: indexKey
              strategy: merge_list
              merge_list:
                unique: true
                branch_order: by_score
          predecessors:
          - query_view_mpkfbrkh
    name: Heuristic indexKey from file name
    description: Execute fn_etl_transform
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
