workflowExternalId: wf_etl_aliasing_template
version: 1.0.0.3
workflowDefinition:
  tasks:
  - externalId: build_index_mpkhwovn
    type: function
    dependsOn:
    - externalId: score_mpoukomr
    parameters:
      function:
        externalId: fn_etl_build_index
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: build_index_mpkhwovn
          canvas_node_id: build_index_mpkhwovn
          config:
            description: Build inverted index postings from indexKey tokens for alias
              lookup
            handler_id: property_token_index
            index_kinds:
              metadata:
              - indexKey
            property_token_index:
              lookup_key_normalization: strip_casefold
              token_initial_confidence: 1
              row_key_template: '{lookup_key}:{scope}|{index_kind}'
              query_source: build_index
              default_view_version: v1
          predecessors:
          - score_mpoukomr
    name: Build Index
    description: Execute fn_etl_build_index
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: merge_mpk5updx
    type: function
    dependsOn:
    - externalId: transform_mpk5sdjw
    - externalId: transform_mpk5q5bq
    parameters:
      function:
        externalId: fn_etl_merge
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: merge_mpk5updx
          canvas_node_id: merge_mpk5updx
          config:
            field_policies:
            - property: aliases
              strategy: merge_list
              merge_list:
                unique: true
                branch_order: by_score
            description: Merge alias lists from parallel transform branches into one
              aliases property
          predecessors:
          - transform_mpk5sdjw
          - transform_mpk5q5bq
    name: Merge Aliases
    description: Execute fn_etl_merge
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: query_view_mpk5beqq
    type: function
    dependsOn: []
    parameters:
      function:
        externalId: fn_etl_view_query
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: query_view_mpk5beqq
          canvas_node_id: query_view_mpk5beqq
          config:
            description: "View query \u2014 CogniteAsset name, description, and tags\
              \ for alias extraction"
            view_space: cdf_cdm
            view_external_id: CogniteAsset
            view_version: v1
            batch_size: 1000
            filters: []
            include_properties:
            - description
            - name
            - tags
          predecessors: []
    name: CogniteAsset (v1)
    description: Execute fn_etl_view_query
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: query_view_mpkf9ork
    type: function
    dependsOn: []
    parameters:
      function:
        externalId: fn_etl_view_query
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: query_view_mpkf9ork
          canvas_node_id: query_view_mpkf9ork
          config:
            description: "View query \u2014 CogniteEquipment instances for shared\
              \ name passthrough aliases"
            view_space: cdf_cdm
            view_external_id: CogniteEquipment
            view_version: v1
            batch_size: 1000
            include_properties:
            - description
            - name
          predecessors: []
    name: CogniteEquipment (v1)
    description: Execute fn_etl_view_query
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: query_view_mpkf9xge
    type: function
    dependsOn: []
    parameters:
      function:
        externalId: fn_etl_view_query
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.configuration.parameters.correlation_id}
          configuration: ${workflow.input.configuration}
          task_id: query_view_mpkf9xge
          canvas_node_id: query_view_mpkf9xge
          config:
            description: "View query \u2014 CogniteTimeSeries instances for shared\
              \ name passthrough aliases"
            view_space: cdf_cdm
            view_external_id: CogniteTimeSeries
            view_version: v1
            batch_size: 1000
            include_properties:
            - description
            - name
          predecessors: []
    name: CogniteTimeSeries (v1)
    description: Execute fn_etl_view_query
