      config: &id013
        execution:
          mode: parallel
        steps:
        - handler_id: heuristic_sampler
          heuristic_sampler:
            samples:
            - XXX-000000
            - XXX_000000
            on_no_match: keep_working
          output_field: indexKey
          fields:
          - field_name: name
          description: Heuristic indexKey from file name
        - handler_id: heuristic_sampler
          enabled: true
          fields:
          - field_name: description
          output_field: indexKey
          output_template: ''
          output_mode: append
          heuristic_sampler:
            samples:
            - XXX-000000
            - XXX_000000
          description: Append indexKey tokens parsed from file description
        description: Heuristic indexKey from file name
        field_policies:
        - property: indexKey
          strategy: merge_list
          merge_list:
            unique: true
            branch_order: by_score
