  incremental_skip_unchanged: true
  raw_db: etl_staging
  raw_table_key: cohort
  instance_space: inst_assets
  etl_state_instance_space: null
scope: null
sources: []
canvas:
  schemaVersion: 1
  handle_orientation: lr
  layout_method: layered
  edge_path_style: default
  nodes:
  - id: build_index_mpkhwovn
    kind: build_index
    data:
      label: Build Index
      config: &id001
        description: Build inverted index postings from indexKey tokens for alias
          lookup
        handler_id: property_token_index
        index_kinds:
          metadata:
          - indexKey
        property_token_index:
          lookup_key_normalization: strip_casefold
          token_initial_confidence: 1
          row_key_template: '{lookup_key}:{scope}|{index_kind}'
          query_source: build_index
          default_view_version: v1
    width: 192
    height: 96
  - id: end
    kind: end
    data:
      label: End
      config:
        description: Post-run cohort RAW cleanup
    width: 148
    height: 68
  - id: merge_mpk5updx
    kind: merge
    data:
      label: Merge Aliases
      config: &id002
        field_policies:
        - property: aliases
          strategy: merge_list
          merge_list:
            unique: true
            branch_order: by_score
        description: Merge alias lists from parallel transform branches into one aliases
          property
    width: 192
    height: 96
  - id: query_view_mpk5beqq
    kind: query_view
    data:
      label: CogniteAsset (v1)
      config: &id003
        description: "View query \u2014 CogniteAsset name, description, and tags for\
          \ alias extraction"
        view_space: cdf_cdm
        view_external_id: CogniteAsset
        view_version: v1
        batch_size: 1000
        filters: []
        include_properties:
        - description
        - name
        - tags
    width: 192
    height: 96
  - id: query_view_mpkf9ork
    kind: query_view
    data:
      label: CogniteEquipment (v1)
      config: &id004
        description: "View query \u2014 CogniteEquipment instances for shared name\
          \ passthrough aliases"
        view_space: cdf_cdm
        view_external_id: CogniteEquipment
        view_version: v1
        batch_size: 1000
        include_properties:
        - description
        - name
    width: 192
    height: 96
  - id: query_view_mpkf9xge
    kind: query_view
    data:
      label: CogniteTimeSeries (v1)
