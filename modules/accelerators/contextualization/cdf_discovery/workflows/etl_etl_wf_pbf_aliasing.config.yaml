          output_field: aliases
          trim_whitespace:
            mode: ends_only
        - fields:
          - field_name: technicalIdentificationNumber
          handler_id: heuristic_sampler
          description: Infer tag-like aliases from asset name using heuristic sample
            patterns
          output_field: aliases
          heuristic_sampler:
            samples:
            - 10-P-1234
            - 79ZSO096A
            - 10P1234
            on_no_match: keep_working
        - fields:
          - regex: ''
            field_name: name
          handler_id: regex_substitution
          description: Strip leading unit prefix segment from name before alias merge
          output_field: aliases
          trim_whitespace:
            mode: ends_only
          regex_substitution:
            patterns:
            - pattern: ^[^-]+-(?=[^ -]+-[^ -])
              replacement: ''
        execution:
          mode: parallel
        field_policies:
        - property: aliases
          strategy: merge_list
