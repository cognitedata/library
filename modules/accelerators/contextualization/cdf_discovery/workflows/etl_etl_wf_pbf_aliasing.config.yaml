  - id: transform_mpk5sdjw
    function_external_id: fn_etl_transform
    executable_kind: transform
    task_type: function
    canvas_node_id: transform_mpk5sdjw
    label: 'Regex Tag Extraction: Name'
    depends_on:
    - query_view_mpk5beqq
    payload:
      config:
        description: Execute fn_etl_transform
        steps:
        - fields:
          - regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
            field_name: technicalIdentificationNumber
          handler_id: trim_whitespace
          description: Extract ISA-style tag tokens from CogniteAsset name via regex
          output_field: aliases
          trim_whitespace:
            mode: ends_only
        - fields:
          - field_name: technicalIdentificationNumber
          handler_id: heuristic_sampler
          description: Infer tag-like aliases from asset name using heuristic sample
            patterns
          output_field: aliases
          heuristic_sampler:
            samples:
            - 10-P-1234
            - 79ZSO096A
            - 10P1234
            on_no_match: keep_working
        - fields:
          - regex: ''
            field_name: name
          handler_id: regex_substitution
          description: Strip leading unit prefix segment from name before alias merge
          output_field: aliases
          trim_whitespace:
            mode: ends_only
          regex_substitution:
            patterns:
            - pattern: ^[^-]+-(?=[^ -]+-[^ -])
              replacement: ''
        execution:
          mode: parallel
        field_policies:
        - property: aliases
          strategy: merge_list
          merge_list:
            unique: true
            branch_order: by_score
