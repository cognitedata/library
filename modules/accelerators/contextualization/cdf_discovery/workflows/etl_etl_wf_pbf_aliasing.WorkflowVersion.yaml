              enabled: true
              priority: 0
              score_modifier:
                mode: explicit
                value: 0
              expression_match: fullmatch
            - name: blacklist
              match:
                keywords:
                - test
                - example
                - sample
                - dummy
                - temp
                - temporary
                - 'null'
                - none
                - n/a
                - na
                - unknown
                - delete
                expressions: []
              enabled: true
              priority: 10
              score_modifier:
