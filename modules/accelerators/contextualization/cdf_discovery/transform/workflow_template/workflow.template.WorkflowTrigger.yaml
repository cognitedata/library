# Schedule trigger shell — scope rules under input.configuration (patched per leaf at build).
externalId: 'trg_{{ workflow }}'
triggerRule:
  triggerType: schedule
  cronExpression: '{{ workflow_schedule }}'
workflowExternalId: '{{ workflow }}'
workflowVersion: '1'
input:
  incremental_change_processing: true
  run_id: ''
  configuration: {}
