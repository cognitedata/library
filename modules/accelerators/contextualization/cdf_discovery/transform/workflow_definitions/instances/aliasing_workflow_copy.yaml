  - id: transform_mpk5sdjw
    kind: transform
    position:
      x: 464
      y: -189
    data:
      label: 'Regex Tag Extraction: Name'
      config:
        handler_id: trim_whitespace
        trim_whitespace:
          mode: ends_only
        fields:
        - field_name: name
          regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
        output_field: aliases
        description: Extract ISA-style tag tokens from CogniteAsset name via regex
    width: 192
    height: 96
  - id: transform_mpkd8cix
    kind: transform
    position:
      x: 464
      y: -51
    data:
      label: 'Heuristic Extraction: Name'
      config:
        handler_id: heuristic_sampler
        heuristic_sampler:
          on_no_match: keep_working
          samples:
          - 10-P-1234
        output_field: aliases
        fields:
        - field_name: name
        description: Infer tag-like aliases from asset name using heuristic sample
          patterns
    width: 192
    height: 96
  - id: transform_mpkdhn77
    kind: transform
    position:
      x: 464
      y: 87
    data:
      label: Drop Numeric Prefix
      config:
        handler_id: regex_substitution
        trim_whitespace:
          mode: ends_only
        output_field: aliases
        fields:
        - field_name: name
          regex: ''
        regex_substitution:
          patterns:
          - pattern: ^[^-]+-(?=[^ -]+-[^ -])
            replacement: ''
        description: Strip leading unit prefix segment from name before alias merge
    width: 192
    height: 96
  - id: transform_mpkh6yk9
    kind: transform
    position:
