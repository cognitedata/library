  - id: transform_mpk5q5bq
    kind: transform
    position:
      x: 464
      y: -327
    data:
      label: Name Passthrough
      config:
        handler_id: trim_whitespace
        trim_whitespace:
          mode: ends_only
        output_field: aliases
        fields:
        - field_name: name
          regex: ''
        output_template: ''
        description: Trim instance name and append normalized value to aliases
    width: 192
