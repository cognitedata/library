        description: CogniteAsset (v1)
        view_space: cdf_cdm
        view_external_id: CogniteAsset
        view_version: v1
        batch_size: 1000
        include_properties:
        - name
    width: 192
    height: 96
  - id: save_view_mpojgyeo
    kind: save_view
    position:
      x: 718
      y: -51
    data:
      label: CogniteAsset (v1)
      config: &id002
        description: CogniteAsset (v1)
        view_space: cdf_cdm
        view_external_id: CogniteAsset
        view_version: v1
