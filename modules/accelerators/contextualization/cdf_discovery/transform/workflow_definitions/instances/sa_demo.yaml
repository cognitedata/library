        save_field_policies:
        - property: aliases
          strategy: merge_list
          merge_list:
            unique: true
            branch_order: by_score
    width: 192
    height: 96
  - id: start
    kind: start
    position:
      x: 0
      y: -37
    data:
      label: Workflow trigger
      config:
        description: Workflow trigger
        trigger_type: schedule
        cron_expression: 0 2 * * *
        workflow_version: '1'
        workflow_base: ''
        workflow_external_id: ''
        trigger_external_id: ''
        incremental_change_processing: true
        run_id: ''
    width: 148
    height: 68
  - id: transform_mpojj3m6
    kind: transform
    position:
      x: 464
      y: -120
    data:
      label: Passthrough
      config: &id003
        handler_id: trim_whitespace
        enabled: true
        fields:
        - field_name: name
        output_field: aliases
        output_template: ''
        output_mode: append
        trim_whitespace:
          mode: ends_only
        description: Transform
    width: 192
    height: 96
  - id: transform_mpojtoti
    kind: transform
    position:
      x: 464
      y: 18
    data:
      label: Drop Numeric Prefix
      config: &id004
        handler_id: regex_substitution
        trim_whitespace:
          mode: ends_only
        output_field: aliases
        fields:
        - field_name: name
          regex: ''
        regex_substitution:
          patterns:
          - pattern: ^[^-]+-(?=[^ -]+-[^ -])
            replacement: ''
        description: Strip leading unit prefix segment from name before alias merge
    width: 192
    height: 96
  edges:
  - id: xy-edge__startout-query_view_mpojgyeoin
    source: start
    target: query_view_mpojgyeo
    source_handle: out
    target_handle: in
    kind: data
