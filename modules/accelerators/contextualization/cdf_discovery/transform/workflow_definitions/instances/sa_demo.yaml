    source_handle: out
    target_handle: in
    kind: data
  - id: xy-edge__query_view_mpojgyeoout-transform_mpojj3m6in
    source: query_view_mpojgyeo
    target: transform_mpojj3m6
    source_handle: out
    target_handle: in
    kind: data
  - id: xy-edge__transform_mpojj3m6out-save_view_mpojgyeoin
    source: transform_mpojj3m6
