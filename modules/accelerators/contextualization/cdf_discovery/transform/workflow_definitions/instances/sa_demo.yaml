    target: transform_mpojtoti
    source_handle: out
    target_handle: in
    kind: data
  - id: xy-edge__transform_mpojtotiout-save_view_mpojgyeoin
    source: transform_mpojtoti
    target: save_view_mpojgyeo
    source_handle: out
    target_handle: in
    kind: data
