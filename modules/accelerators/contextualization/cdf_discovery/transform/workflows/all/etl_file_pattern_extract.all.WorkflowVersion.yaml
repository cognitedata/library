externalId: wf_all_etl_file_pattern_extract:1
workflowExternalId: wf_all_etl_file_pattern_extract
version: '1'
description: File Pattern Extract (template)
workflowDefinition:
  tasks:
  - externalId: map_annotations_dm
    type: jsonMapping
    dependsOn:
    - externalId: fanout
    parameters:
      jsonMapping:
        input:
          rows: ${fanout.output}
        expression: input.rows
    name: Map annotations (DM)
    description: Expand file-annotation cohort hits to DM annotation staging rows
    retries: 2
    timeout: 1800
    onFailure: abortWorkflow
  - externalId: map_annotations_classic
    type: jsonMapping
    dependsOn:
    - externalId: fanout
    parameters:
      jsonMapping:
        input:
          rows: ${fanout.output}
        expression: input.rows
    name: Map annotations (classic)
    description: Expand file-annotation cohort hits to classic annotation staging
      rows
    retries: 2
    timeout: 1800
    onFailure: abortWorkflow
  - externalId: fanout
    type: dynamic
    dependsOn:
    - externalId: fanout_plan
    parameters:
      dynamic:
        tasks: ${fanout_plan.output.tasks}
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: fanout_plan
    type: function
    dependsOn:
    - externalId: query_assets
    - externalId: query_files
    parameters:
      function:
        externalId: fn_etl_workflow_fanout_plan
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.run_id}
          configuration: ${workflow.input.configuration}
          task_id: fanout_plan
          canvas_node_id: fanout_plan
          config:
            description: Build normalized pattern entities and one dynamic task per
              detect page-pack
            fanout_profile: file_annotation
            batch_size: 1
            max_pattern_samples: 100
            max_pages_per_detect_request: 15
            max_pages_per_file_reference: 15
            min_tokens: 2
            diagram_poll_timeout_sec: 840
            max_detect_jobs_per_invocation: 1
            pattern_normalization: file_annotation
            child_function_external_id: fn_etl_file_annotation
          input_a_task_id: query_assets
          input_b_task_id: query_files
          fanout_profile: file_annotation
        isAsyncComplete: false
    name: Plan detect batches
    description: Execute fn_etl_workflow_fanout_plan
    retries: 3
    timeout: 1800
    onFailure: abortWorkflow
  - externalId: query_assets
    type: function
    dependsOn: []
    parameters:
      function:
        externalId: fn_etl_view_query
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.run_id}
          configuration: ${workflow.input.configuration}
          task_id: query_assets
          canvas_node_id: query_assets
          config:
            description: Load CogniteAsset aliases for pattern-mode diagram detect
              entities
            view_space: cdf_cdm
            view_external_id: CogniteAsset
            view_version: v1
            batch_size: 1000
            include_properties:
            - aliases
            query_scope_mode: all
        isAsyncComplete: false
    name: CogniteAsset (aliases)
    description: Execute fn_etl_view_query
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: query_files
    type: function
    dependsOn: []
    parameters:
      function:
        externalId: fn_etl_view_query
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.run_id}
          configuration: ${workflow.input.configuration}
          task_id: query_files
          canvas_node_id: query_files
          config:
            description: Files to scan via diagram detect
            view_space: cdf_cdm
            view_external_id: CogniteFile
            view_version: v1
            batch_size: 500
            include_properties:
            - name
            - mimeType
            - pageCount
            query_scope_mode: all
        isAsyncComplete: false
    name: CogniteFile (PDFs)
    description: Execute fn_etl_view_query
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: save_annotation_results_dm
    type: function
    dependsOn:
    - externalId: map_annotations_dm
    parameters:
      function:
        externalId: fn_etl_raw_save
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.run_id}
          configuration: ${workflow.input.configuration}
          task_id: save_annotation_results_dm
          canvas_node_id: save_annotation_results_dm
          config:
            description: Persist DM annotation staging rows to RAW
            source_raw_db: db_discovery
            source_raw_table_key: annotation_results_dm
        isAsyncComplete: false
    name: Save DM annotations
    description: Execute fn_etl_raw_save
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: save_annotation_results_classic
    type: function
    dependsOn:
    - externalId: map_annotations_classic
    parameters:
      function:
        externalId: fn_etl_raw_save
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.run_id}
          configuration: ${workflow.input.configuration}
          task_id: save_annotation_results_classic
          canvas_node_id: save_annotation_results_classic
          config:
            description: Persist classic annotation staging rows to RAW
            source_raw_db: db_discovery
            source_raw_table_key: annotation_results_classic
        isAsyncComplete: false
    name: Save classic annotations
    description: Execute fn_etl_raw_save
    retries: 3
    timeout: 7200
    onFailure: abortWorkflow
  - externalId: end
    type: function
    dependsOn:
    - externalId: save_annotation_results_dm
    - externalId: save_annotation_results_classic
    parameters:
      function:
        externalId: fn_etl_raw_cleanup
        data:
          logLevel: INFO
          incremental_change_processing: ${workflow.input.incremental_change_processing}
          run_id: ${workflow.input.run_id}
          configuration: ${workflow.input.configuration}
          task_id: end
          canvas_node_id: end
          config:
            description: Post-run cohort RAW cleanup
        isAsyncComplete: false
    name: Workflow step
    description: Execute fn_etl_raw_cleanup
    retries: 3
    timeout: 1800
    onFailure: skipTask
