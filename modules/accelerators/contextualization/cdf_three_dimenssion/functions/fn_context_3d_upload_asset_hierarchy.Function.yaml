# Pipeline: upload asset hierarchy from CSV to DM. Assign this function to ep_ctx_3d_*_upload_asset_hierarchy.
- name: 'context:3d:upload_asset_hierarchy'
  externalId: 'fn_context_3d_upload_asset_hierarchy'
  owner: 'Anonymous'
  description: 'Upload Asset hierarchy (DM nodes) from CSV in CDF Files'
  metadata:
    version: '0.1.0'
  envVars:
    ENV_TYPE: '${CDF_BUILD_TYPE}'
    CDF_ENV: '${CDF_ENVIRON}'
    ASSET_INSTANCE_SPACE: '{{asset_instance_space}}'
    RAW_DB: '{{raw_db}}'
    RAW_TABLE: three_dimension_asset
    ASSET_VIEW_SPACE: '{{data_model_space}}'
    ASSET_VIEW_EXT_ID: '{{asset_view_ext_id}}'
    ASSET_VIEW_VERSION: '{{asset_view_version}}'
  cpu: 0.25
  runtime: 'py311'
  functionPath: './handler.py'
  dataSetExternalId: 'ds_3d_{{default_location}}'
  space: '{{function_space}}'
