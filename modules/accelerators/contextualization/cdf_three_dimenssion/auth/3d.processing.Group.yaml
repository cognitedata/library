# Processing role: runs the 3D ↔ CogniteAsset contextualization pipeline (DM-only project)
name: 'gp_3d_{{default_location}}_processing'
sourceId: '{{3d_location_processing_group_source_id}}'
metadata:
  origin: 'cdf-project-templates'
capabilities:
  - rawAcl:
      actions:
        - READ
        - WRITE
      scope:
        tableScope:
          dbsToTables:
            3d_{{default_location}}_{{source_name}}: []
  - sessionsAcl:
      actions:
        - LIST
        - CREATE
        - DELETE
      scope:
        all: {}
  - dataModelInstancesAcl:
      actions:
        - READ
        - WRITE
      scope:
        spaceIdScope:
          spaceIds:
            - upstream-value-chain
            - cdf_cdm
  - filesAcl:
      actions:
        - READ
        - WRITE
      scope:
        datasetScope: {
            ids: ['ds_3d_{{default_location}}']
        }
  - threedAcl:
      actions:
        - READ
      scope:
        datasetScope: {
            ids: ['ds_3d_{{default_location}}']
        }
  - extractionConfigsAcl:
      actions:
        - READ
        - WRITE
      scope:
        datasetScope: {
            ids: ['ds_3d_{{default_location}}']
        }
  - extractionRunsAcl:
      actions:
        - READ
        - WRITE
      scope:
        datasetScope: {
            ids: ['ds_3d_{{default_location}}']
        }
  - entitymatchingAcl:
      actions:
        - READ
        - WRITE
      scope:
        all: {}
  - functionsAcl:
      actions:
        - READ
        - WRITE
      scope:
        all: {}
