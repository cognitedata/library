# CDF Toolkit config for dev environment.
# Variables here are substituted into YAML templates (auth/, extraction_pipelines/, functions/, raw/, data_sets/).

environment:
  name: dev
  project: cdf-shivam-test
  validation-type: dev
  selected:
    - modules/

variables:
  default_location: clov
  source_name: navisworks
  # CDF RAW database and tables (used by scripts and pipeline config)
  raw_db: 3d_clov_navisworks
  raw_table_manual: contextualization_manual_input
  # Required when project is DATA_MODELING_ONLY: space for function code (CogniteFile NodeId)
  function_space: upstream-value-chain
  "3d_model_name": deployment_pack
  # CAD model name/type for apply_cad_contextualization script (defaults: 3d_model_name, CAD)
  cad_model_name: deployment_pack
  cad_model_type: CAD
  # DM-only CAD contextualization defaults (used by pipeline config / apply_dm_cad_contextualization)
  default_cad_space: rmdm
  default_dm_space: upstream-value-chain
  default_dm_ext_id: upstream_value_chain
  default_dm_version: v1
  default_scene_space: scene
  cad_contextualization_batch_size: 100
  cad_model_view: { space: sp_enterprise_process_industry, external_id: CADModel, version: v1 }
  cad_revision_view: { space: sp_enterprise_process_industry, external_id: CADRevision, version: v1 }
  scene_config_view: { space: scene, external_id: SceneConfiguration, version: v1 }
  scene_model_view: { space: cdf_3d_schema, external_id: Cdf3dModel, version: "1" }
  rev_props_view: { space: scene, external_id: RevisionProperties, version: v1 }
  # 3D DM required views (for apply_cad_contextualization script and pipeline); list of { space, external_id, version }
  required_views:
    - { space: cdf_cdm, external_id: Cognite3DObject, version: v1 }
    - { space: cdf_cdm, external_id: CogniteCADNode, version: v1 }
    - { space: cdf_cdm, external_id: CogniteCADRevision, version: v1 }
    - { space: cdf_cdm, external_id: CogniteCADModel, version: v1 }
    - { space: cdf_cdm, external_id: Cognite3DRevision, version: v1 }
    - { space: cdf_cdm, external_id: Cognite3DModel, version: v1 }
    - { space: cdf_cdm, external_id: Cognite3DTransformation, version: v1 }
    - { space: cdf_cdm, external_id: CogniteVisualizable, version: v1 }
    - { space: cdf_cdm, external_id: Cognite360Image, version: v1 }
    - { space: cdf_cdm, external_id: Cognite360ImageAnnotation, version: v1 }
    - { space: cdf_cdm, external_id: CogniteAnnotation, version: v1 }
    - { space: cdf_cdm, external_id: Cognite360ImageCollection, version: v1 }
    - { space: cdf_cdm, external_id: Cognite360ImageStation, version: v1 }
    - { space: cdf_cdm, external_id: CognitePointCloudVolume, version: v1 }
    - { space: cdf_cdm, external_id: CognitePointCloudRevision, version: v1 }
    - { space: scene, external_id: SceneConfiguration, version: v1 }
    - { space: scene, external_id: RevisionProperties, version: v1 }
    - { space: cdf_3d_schema, external_id: Cdf3dModel, version: "1" }
  asset_instance_space: instance_upstream_value_chain
  cad_node_instance_space: rmdm
  "3d_dataset": ds_3d_clov
  # File extractor: local folder to watch for 3D files (.zip). Change to your path (e.g. /path/to/3d_files).
  file_extractor_watch_path: c:/tmp/files
  "3d_location_extractor_group_source_id": "c32ac88c-4048-4b74-854a-107a0527f22c"
  "3d_location_processing_group_source_id": "81678087-872a-41ed-9d93-d9948098eab1"
  "3d_location_read_group_source_id": "788105c1-adbd-4e09-9f85-98e8fb001166"
  # Set to real Azure AD app client ID/secret to enable schedules
  cicd_clientId: "placeholder-client-id"
  cicd_clientSecret: "placeholder-client-secret"
