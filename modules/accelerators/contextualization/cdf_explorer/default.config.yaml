# CDF Explorer — operator preferences (template).
# Copy to explorer.local.config.yaml and edit; the local file is gitignored.

stars:
  # Tree node ids (Object Explorer ``id`` field) pinned to the top of their sibling list.
  # Order here is preserved among favorites; remaining siblings sort A–Z by label.
  # Examples:
  #   - dm:model:cdf_cdm:CogniteCore:v1
  #   - tx:item:42
  #   - wf:item:my_workflow
  node_ids: []

workspace:
  # Open document tabs restored on launch (written by the UI to explorer.local.config.yaml).
  active_tab_id: null
  tabs: []
  # Example SQL tab:
  # - kind: sql
  #   id: sql:workspace
  #   label: SQL Query
  #   query: "SELECT * FROM cdf_nodes('cdf_cdm', 'CogniteAsset', 'v1')"
  #   limit: 100
  #   convert_to_string: true

saved_queries:
  # Named SQL queries shown under **Saved Queries** in the Object Explorer.
  queries: []
  # Example:
  # - id: my_assets
  #   name: My assets
  #   query: "SELECT * FROM _cdf.assets"
  #   limit: 100
  #   convert_to_string: true
