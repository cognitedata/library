# CDF Toolkit Function Definitions — Inverted Index Contextualization

- name: 'dm:context:inverted_index:build:metadata'
  externalId: 'fn_idx_build_metadata'
  dataSetExternalId: 'ds_inverted_index_all'
  owner: 'Anonymous'
  description: 'Build metadata inverted index from DM views via instances.query'
  metadata:
    version: '1.0.0'
  envVars:
    ENV_TYPE: '${CDF_BUILD_TYPE}'
    CDF_ENV: '${CDF_ENVIRON}'
  runtime: 'py311'
  functionPath: 'handler.py'

