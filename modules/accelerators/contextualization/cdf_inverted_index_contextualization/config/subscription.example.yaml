# Instance subscription for target-driven contextualization after aliasing.
# Deploy as a CDF subscription / Function trigger filtered to watch_property changes.
# Align watch_property with target_driven.query_property and your CDF subscription filter.

target_driven:
  query_property: aliases
  query_property_fallbacks: [name]
  exclude_empty_aliases: false

subscription:
  enabled: true
  trigger: instance_subscription
  watch_property: aliases  # defaults to query_property when omitted in config merge
  instance_spaces: [cdf_cdm]
  watch_view_keys: [asset, file]

# Illustrative event payload (aliases updated by cdf_discovery_aliasing):
# {
#   "space": "cdf_cdm",
#   "externalId": "ASSET_P101",
#   "view_external_id": "CogniteAsset",
#   "changed_properties": ["aliases"],
#   "after": {
#     "properties": {
#       "aliases": ["P-101A", "p101a"]
#     }
#   }
# }

# Dedupe: RAW table target_driven_state stores TERMS_HASH per instance + scope.
# Re-runs within cooldown_seconds are skipped unless force=True on the handler.

