# Example scope configuration — copy into default.config.yaml when site/unit
# fields are mapped on your DM views. Not active OOTB.

scope:
  enabled: true
  levels: [site, unit]
  scope_key_template: "site:{site}|unit:{unit}"
  strict_scope: true
  resolve_from:
    CogniteAsset:
      site: [sourceContext, source]
      unit: [sourceId]
    CogniteFile:
      site: [sourceContext]
      unit: [sourceId]
    CogniteEquipment:
      site: [sourceContext]
      unit: [sourceId]
    CogniteTimeSeries:
      site: [sourceContext]
      unit: [sourceId]
    CogniteDiagramAnnotation:
      site: [sourceContext]
      unit: [sourceId]
  resolve_from_default:
    site: [sourceContext]
    unit: [sourceId]
  annotation_scope_via_linked_file: true
