name: inverted_index_contextualization
organization: YourOrg
index_storage_backend: raw
index_raw_database: db_contextualization_idx
scope:
  enabled: true
  levels: []
  scope_key_template: site:{site}|unit:{unit}
  strict_scope: false
  fallback_scope_key: global
  annotation_scope_via_linked_file: true
  resolve_from: {}
  resolve_from_default: {}
_x_metadata_properties:
  - path: name
    source_type: asset_metadata
    extract_mode: regex
    extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
  - path: description
    source_type: asset_metadata
    extract_mode: regex
    extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
  - path: description
    source_type: file_metadata
    extract_mode: regex
    extract_pattern: (?i)\b[\w][\w.-]*\.(?:pdf|dwg|png|jpe?g|tif{1,2})\b
  - path: description
    source_type: file_metadata
    extract_mode: regex
    extract_pattern: \b[A-Z]{2,}(?:-[A-Z]{2,})*-P-\d{4}(?:-\d{3})?\b
index_field_config:
  - view: CogniteFile
    view_space: cdf_cdm
    version: v1
    instance_spaces: []
    filters: []
    properties:
      - path: name
        source_type: asset_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
      - path: description
        source_type: asset_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: (?i)\b[\w][\w.-]*\.(?:pdf|dwg|png|jpe?g|tif{1,2})\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{2,}(?:-[A-Z]{2,})*-P-\d{4}(?:-\d{3})?\b
  - view: CogniteAsset
    view_space: cdf_cdm
    version: v1
    instance_spaces: []
    properties:
      - path: description
        source_type: asset_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: (?i)\b[\w][\w.-]*\.(?:pdf|dwg|png|jpe?g|tif{1,2})\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{2,}(?:-[A-Z]{2,})*-P-\d{4}(?:-\d{3})?\b
  - view: CogniteEquipment
    view_space: cdf_cdm
    version: v1
    instance_spaces: []
    properties:
      - path: name
        source_type: asset_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
      - path: description
        source_type: asset_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: (?i)\b[\w][\w.-]*\.(?:pdf|dwg|png|jpe?g|tif{1,2})\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{2,}(?:-[A-Z]{2,})*-P-\d{4}(?:-\d{3})?\b
  - view: CogniteTimeSeries
    view_space: cdf_cdm
    version: v1
    instance_spaces: []
    properties:
      - path: name
        source_type: asset_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
      - path: description
        source_type: asset_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{1,2}-\d{3,4}[A-Z]?\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: (?i)\b[\w][\w.-]*\.(?:pdf|dwg|png|jpe?g|tif{1,2})\b
      - path: description
        source_type: file_metadata
        extract_mode: regex
        extract_pattern: \b[A-Z]{2,}(?:-[A-Z]{2,})*-P-\d{4}(?:-\d{3})?\b
annotation_index_config:
  view: CogniteDiagramAnnotation
  view_space: cdf_cdm
  version: v1
  instance_type: edge
  text_property: startNodeText
  confidence_property: confidence
  status_property: status
  page_property: startNodePageNumber
  bbox_properties:
    - startNodeXMin
    - startNodeYMin
    - startNodeXMax
    - startNodeYMax
index_raw_term_partition:
  enabled: false
  strategy: first_char
  activate_above_rows: 400000
  bucket_mode: script_aware
target_driven:
  query_property: aliases
  query_property_fallbacks:
    - name
  exclude_empty_aliases: true
subscription:
  enabled: true
  trigger: instance_subscription
  watch_property: aliases
  instance_spaces: []
  watch_view_keys:
    - asset
    - file
direct_relation_config:
  enabled: true
  min_confidence: 0.6
  allowed_annotation_statuses:
    - Suggested
    - Approved
virtual_tag_creation:
  enabled: false
  incremental_enabled: true
  term_selection_mode: missing_tags_only
  source_types:
    - asset_metadata
    - diagram_annotation_pattern
  missing_tag_criteria:
    require_pattern_detection: true
    check_existing_cognite_asset: true
    exclude_with_cognite_asset_metadata: true
  asset_lookup:
    view_external_id: CogniteAsset
    view_space: cdf_cdm
    view_version: v1
    instance_spaces: []
    match_properties:
      - name
      - aliases
    scope_filter: true
  hierarchy_levels: []
  leaf_level: asset_tag
  instance_space: inst_virtual_tags
  view_space: cdf_cdm
  view_external_id: CogniteAsset
  view_version: v1
  populate_aliases: true
  scope_property_mapping:
    site: sourceContext
    unit: sourceId
  min_confidence: 0
  batch_limit: 0
