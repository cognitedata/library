      x: 449.86220712070747
      y: 164.39611311074134
    data:
      label: 'Entity Alias: Tag'
      handler_family: discovery
      preset_from_palette: true
      handler_id: trim_whitespace
      config:
        description: Extract Tag Alias from Name
        handler_id: trim_whitespace
        enabled: true
        fields:
        - regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          field_name: name
          required: true
          priority: 1
          regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          max_matches_per_field: 10
        output_field: aliases
        output_template: '{name}'
        output_mode: append
        regex_substitution:
          patterns:
          - pattern: ^\d+-
            replacement: ''
        trim_whitespace:
          mode: ends_only
