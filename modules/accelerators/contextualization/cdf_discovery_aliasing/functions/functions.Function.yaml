# CDF Toolkit Function Definitions
# The directory with the function code should have the same name
# and externalId as the function itself as defined below.

- name: 'dm:context:discovery:save:view'
  externalId: 'fn_dm_view_save'
  dataSetExternalId: 'ds_discovery_aliasing'
  owner: 'Anonymous'
  description: 'Discovery DM instances apply from predecessor payloads (stub)'
  metadata:
    version: '{{key_extraction_function_version}}'
  envVars:
    ENV_TYPE: '${CDF_BUILD_TYPE}'
    CDF_ENV: '${CDF_ENVIRON}'
  runtime: 'py311'
  functionPath: 'handler.py'

