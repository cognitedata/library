  - id: tr
    kind: transform
    position:
      x: 452
      y: 131.5
    data:
      label: 'Aliases: Tag Based'
      handler_family: discovery
      preset_from_palette: true
      handler_id: regex_substitution
      config:
        enabled: true
        execution:
          mode: ordered
        steps:
        - description: Extract tag alias from name (and unit when present)
          handler_id: regex_substitution
          enabled: true
          fields:
          - regex_options:
              ignore_case: false
              multiline: false
              dotall: false
              unicode: true
            field_name: name
            required: true
            priority: 1
            regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
            max_matches_per_field: 10
          output_field: _tagAliasDraft
          output_template: '{name}'
          output_mode: overwrite
          regex_substitution:
            patterns: []
        - description: Strip numeric unit prefix and append to aliases
          handler_id: regex_substitution
          enabled: true
          fields:
          - field_name: _tagAliasDraft
          output_field: aliases
          output_template: '{_tagAliasDraft}'
          output_mode: append
          regex_substitution:
            patterns:
            - pattern: ^\d+-
              replacement: ''
        description: Extract tag alias from name; strip leading numeric prefix; append
          to aliases
  - id: tr_ts
    kind: transform
    position:
      x: 452
      y: 291.5
    data:
      label: 'Time Series Alias: Instrument tag → Time Series Alias: Heuristic (name)'
      handler_family: discovery
      preset_from_palette: true
      handler_id: split_join
      config:
        description: 'Time Series Alias: Instrument tag → Time Series Alias: Heuristic
          (name) (ordered multi-step)'
        execution:
          mode: ordered
        steps:
        - handler_id: split_join
          enabled: true
          fields:
          - field_name: name
          output_field: aliases
          output_template: '{name}'
          output_mode: append
          split_join:
            delimiter_regex: '[-./_:]+'
            trim: true
            indexes:
            - 2
            - 3
            join: '-'
        - handler_id: heuristic_sampler
          enabled: true
          fields:
          - field_name: name
          output_field: aliases
          output_template: '{name}'
          output_mode: append
          heuristic_sampler:
            pattern: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
            on_no_match: empty
        handler_id: split_join
        enabled: true
