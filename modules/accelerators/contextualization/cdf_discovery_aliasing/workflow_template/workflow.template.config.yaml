      config:
        description: Inverted index — CDM lookup by extracted keys
        index_kinds:
          metadata:
          - indexKey
        inverted_index_raw_db: db_discovery
        inverted_index_raw_table: discovery_inverted_index
  - id: n_1778825555896_yb0o2sr8
    kind: transform
    position:
      x: 452
      y: -467.5
    data:
      label: File Alias
      handler_family: discovery
      preset_from_palette: true
      handler_id: trim_whitespace
      config:
        description: Create file alias based on Name field.
        handler_id: trim_whitespace
        enabled: true
        fields:
        - field_name: name
          regex: ''
        output_field: aliases
        output_template: '{name}'
        output_mode: append
        regex_substitution:
          patterns: []
        trim_whitespace:
          mode: ends_only
  - id: n_1778825856747_8nhc2ug8
    kind: transform
    position:
      x: 452
      y: -338.5
    data:
      label: 'Index Key: Name → Description'
      handler_family: discovery
      preset_from_palette: true
      handler_id: trim_whitespace
      config:
        handler_id: trim_whitespace
        enabled: true
        execution:
          mode: parallel
        steps:
        - description: 'Index Key: Name'
          handler_id: trim_whitespace
          enabled: true
          fields:
          - field_name: name
            regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          output_field: indexKey
          output_template: '{name}'
          output_mode: append
          regex_substitution:
            patterns:
            - pattern: ^OLD
              replacement: NEW
          trim_whitespace:
            mode: ends_only
        - description: Extract Asset Reference from Description
          handler_id: trim_whitespace
          enabled: true
          fields:
          - field_name: description
            regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          output_field: indexKey
          output_template: '{description}'
          output_mode: append
          regex_substitution:
            patterns:
            - pattern: ^OLD
              replacement: NEW
          trim_whitespace:
            mode: ends_only
        description: 'Index Key: name then description (ordered multi-step)'
        field_policies:
        - property: indexKey
          strategy: merge_list
          merge_list:
            unique: true
            branch_order: by_score
  - id: n_1778828796157_r1tixf2w
    kind: validation
    position:
      x: 706
      y: -143
    data:
      label: Asset validation — ISA → shape → blacklist
      handler_family: discovery
      config:
        description: CogniteAsset tag validation — ISA, alias shape, blacklist (ordered
          multi-step)
        execution:
          mode: ordered
        steps:
        - name: whitelist
          enabled: true
          match:
            expressions:
            - pattern: \bP[-_]?\d{1,6}[A-Z]?\b
              description: Standard pump tags (P-101, P101A, P-2001)
            - pattern: \b[A-Z]{2,4}P[-_]?\d{1,6}[A-Z]?\b
              description: Pump with service designation (FWP-101, CWP-201)
            - pattern: \bCP[-_]?\d{1,6}[A-Z]?\b
              description: Centrifugal pump tags
            - pattern: \bC[-_]?\d{1,6}[A-Z]?\b
              description: Standard compressor tags (C-101, C101A)
            - pattern: \b[A-Z]{2}C[-_]?\d{1,6}[A-Z]?\b
              description: Compressor with type designation (AC-101, RC-201)
            - pattern: \b[A-Z]{2,3}V[-_]?\d{1,6}[A-Z]?\b
              description: Control valve tags (FCV-101, PCV-201, TCV-301)
            - pattern: \bV[-_]?\d{1,6}[A-Z]?\b
              description: Manual valve and vessel tags (V-101, V101A)
            - pattern: \b[A-Z]{2,3}SV[-_]?\d{1,6}[A-Z]?\b
              description: Safety valve tags (PSV-101, TSV-201)
            - pattern: \bT[-_]?\d{1,6}[A-Z]?\b
              description: Standard tank tags (T-101, T101A)
            - pattern: \bR[-_]?\d{1,6}[A-Z]?\b
              description: Reactor tags (R-101, R101A)
            - pattern: \bE[-_]?\d{1,6}[A-Z]?\b
              description: Heat exchanger tags (E-101, E101A)
            - pattern: \b[A-Z]{2}E[-_]?\d{1,6}[A-Z]?\b
              description: Heat exchanger with type (HE-101, CE-201)
            - pattern: \bF[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
              description: Flow instruments (FIC-101, FIT-201, FCV-301)
            - pattern: \bP[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
              description: Pressure instruments (PIC-101, PIT-201, PCV-301)
            - pattern: \bT[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
              description: Temperature instruments (TIC-101, TIT-201, TCV-301)
            - pattern: \bL[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
              description: Level instruments (LIC-101, LIT-201, LCV-301)
            - pattern: \bA[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
              description: Analytical instruments (AIC-101, AIT-201, ACV-301)
            - pattern: \b[A-Z]?C[-_]?\d{1,6}[A-Z]?\b
              description: Distillation column tags (C-101, DC-201)
            keywords: []
          confidence_modifier:
            mode: explicit
            value: 1
          priority: 10
        - name: not_isa_penalty
          enabled: true
          match:
            expressions:
            - pattern: (?s).*
              description: Catch-all when no higher-priority rule matched; applies
                non-ISA penalty
            keywords: []
          confidence_modifier:
            mode: offset
            value: -0.2
          priority: 1000
        - name: alias_shape_invalid
          enabled: true
          priority: 0
          expression_match: fullmatch
          match:
            expressions:
            - pattern: ^[0-9]{0,3}$
              description: Alias is only digits and shorter than 4 characters (empty
                counts as invalid)
            - pattern: ^.{81,}$
              description: Alias exceeds maximum length 80
            - pattern: '[^A-Za-z0-9-_/. ]'
              description: Character outside allowed set (letters, digits, _ / . -
                and space)
          confidence_modifier:
            mode: explicit
            value: 0
        - name: blacklist
          enabled: true
          priority: 10
          match:
            keywords:
            - test
            - example
            - sample
            - dummy
            - temp
            - temporary
            - 'null'
            - none
            - n/a
            - na
            - unknown
          confidence_modifier:
            mode: explicit
            value: 0
        min_confidence: 0.5
