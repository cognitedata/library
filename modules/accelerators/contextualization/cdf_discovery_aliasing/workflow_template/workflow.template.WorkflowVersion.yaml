# Reference document only: shipped ``workflows/**.WorkflowVersion.yaml`` is generated by
# ``scripts/build_scopes.py`` from build-time ``compiled_workflow`` IR (``build_workflow_version_document``).
# Discovery-only: node-per-task canvas; each task uses stable task externalId (kea__*).
# Template: __KEA_WORKFLOW_EXTERNAL_ID__ → must match sibling Workflow externalId.
workflowExternalId: __KEA_WORKFLOW_EXTERNAL_ID__
version: 'v5'
workflowDefinition:
  description: >-
    Discovery pipeline (canvas DAG). Each task passes task_id plus inlined payload from
    build-time IR; schedule triggers supply workflow.input (run_all, run_id, configuration).
  tasks:
    - externalId: kea__vq
      type: function
      parameters:
        function:
          externalId: fn_dm_view_query
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__vq
            pipeline_node_id: kea__vq
            canvas_node_id: vq
            config:
              description: Primary asset view query
              view_space: cdf_cdm
              view_external_id: CogniteAsset
              view_version: v1
      name: View query
      description: >-
        DM view query — cohort-scoped list; sink RAW (stub).
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow

    - externalId: kea__tr
      type: function
      parameters:
        function:
          externalId: fn_dm_transform
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__tr
            pipeline_node_id: kea__tr
            canvas_node_id: tr
            config:
              description: Default transform stage
      name: Transform
      description: >-
        Transform predecessor payloads; sink RAW (stub).
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow
      dependsOn:
        - externalId: kea__vq

    - externalId: kea__va
      type: function
      parameters:
        function:
          externalId: fn_dm_validate
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__va
            pipeline_node_id: kea__va
            canvas_node_id: va
            config:
              description: Validation row 1
      name: Validate
      description: >-
        Validate predecessor payloads; sink RAW (stub).
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow
      dependsOn:
        - externalId: kea__tr

    - externalId: kea__ii
      type: function
      parameters:
        function:
          externalId: fn_dm_inverted_index
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__ii
            pipeline_node_id: kea__ii
            canvas_node_id: ii
            inverted_index_input_source: discovery_predecessor_payloads
            upstream_compiled_task_ids:
              - kea__va
      name: Inverted index
      description: >-
        Build inverted RAW index from discovery predecessor payloads (stub).
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow
      dependsOn:
        - externalId: kea__va

    - externalId: kea__discovery_raw_cleanup
      type: function
      parameters:
        function:
          externalId: fn_dm_discovery_raw_cleanup
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__discovery_raw_cleanup
            pipeline_node_id: kea__discovery_raw_cleanup
            canvas_node_id: n_discovery_raw_cleanup
            config: {}
      name: RAW cleanup
      description: >-
        Post-run: delete cohort RAW keys for this run_id (default) or truncate tables if configured.
      retries: 3
      timeout: 7200
      onFailure: skipTask
      dependsOn:
        - externalId: kea__ii
