# Uploads config/scopes/default/key_extraction_aliasing.yaml as file content with a CogniteFile DM node.
# Unique instanceId.externalId per scope (not only $FILENAME) — all scopes use the same basename.
kind: FileContent
type: fileDataModelingTemplate
fileDirectory: ../../../config/scopes/default
viewId:
  space: '{{ key_extraction_config_file_view_space }}'
  externalId: '{{ key_extraction_config_file_view_external_id }}'
  version: '{{ key_extraction_config_file_view_version }}'
template:
  instanceId:
    space: '{{ key_extraction_config_files_instance_space }}'
    externalId: kea_config_default
  name: $FILENAME
