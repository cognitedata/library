        E:
        - HEAT_EXCHANGER
        - EXCHANGER
        - EXCH
        HE:
        - HEAT_EXCHANGER
        - EXCHANGER
        - EXCH
        CE:
        - CONDENSER_EXCHANGER
        - HEAT_EXCHANGER
        - EXCH
        DC:
        - DISTILLATION_COLUMN
        - COLUMN
        - COL
        FIC:
        - FLOW_INDICATOR_CONTROLLER
        - FLOW_CONTROLLER
        - INSTRUMENT
        FIT:
        - FLOW_INDICATOR_TRANSMITTER
        - FLOW_TRANSMITTER
        - INSTRUMENT
