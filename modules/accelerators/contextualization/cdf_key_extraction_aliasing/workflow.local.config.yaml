    target_property: mimeType
    values:
    - application/pdf
  include_properties:
  - externalId
  - name
  - description
  - tags
  - unit
  - documentType
  - drawingNumber
- view_external_id: CogniteTimeSeries
  view_space: cdf_cdm
  view_version: v1
  entity_type: timeseries
  include_properties:
  - externalId
  - name
  - description
  - tags
  - unit
- view_external_id: CogniteAsset
  view_space: cdf_cdm
  view_version: v1
  entity_type: asset
  filters:
  - operator: CONTAINSANY
    target_property: tags
    values:
    - asset_tag
  include_properties:
  - externalId
  - name
  - description
  - tags
  - unit
- view_external_id: CogniteEquipment
  view_space: cdf_cdm
  view_version: v1
  entity_type: equipment
  filters: []
  include_properties: []
validation_rule_definitions:
  isa_compliant:
    name: whitelist
    enabled: true
    match:
      expressions:
      - pattern: \bP[-_]?\d{1,6}[A-Z]?\b
        description: Standard pump tags (P-101, P101A, P-2001)
      - pattern: \b[A-Z]{2,4}P[-_]?\d{1,6}[A-Z]?\b
        description: Pump with service designation (FWP-101, CWP-201)
      - pattern: \bCP[-_]?\d{1,6}[A-Z]?\b
        description: Centrifugal pump tags
      - pattern: \bC[-_]?\d{1,6}[A-Z]?\b
        description: Standard compressor tags (C-101, C101A)
      - pattern: \b[A-Z]{2}C[-_]?\d{1,6}[A-Z]?\b
        description: Compressor with type designation (AC-101, RC-201)
      - pattern: \b[A-Z]{2,3}V[-_]?\d{1,6}[A-Z]?\b
        description: Control valve tags (FCV-101, PCV-201, TCV-301)
      - pattern: \bV[-_]?\d{1,6}[A-Z]?\b
        description: Manual valve and vessel tags (V-101, V101A)
      - pattern: \b[A-Z]{2,3}SV[-_]?\d{1,6}[A-Z]?\b
        description: Safety valve tags (PSV-101, TSV-201)
      - pattern: \bT[-_]?\d{1,6}[A-Z]?\b
        description: Standard tank tags (T-101, T101A)
      - pattern: \bR[-_]?\d{1,6}[A-Z]?\b
        description: Reactor tags (R-101, R101A)
      - pattern: \bE[-_]?\d{1,6}[A-Z]?\b
        description: Heat exchanger tags (E-101, E101A)
      - pattern: \b[A-Z]{2}E[-_]?\d{1,6}[A-Z]?\b
        description: Heat exchanger with type (HE-101, CE-201)
      - pattern: \bF[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
        description: Flow instruments (FIC-101, FIT-201, FCV-301)
      - pattern: \bP[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
        description: Pressure instruments (PIC-101, PIT-201, PCV-301)
      - pattern: \bT[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
        description: Temperature instruments (TIC-101, TIT-201, TCV-301)
      - pattern: \bL[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
        description: Level instruments (LIC-101, LIT-201, LCV-301)
      - pattern: \bA[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b
        description: Analytical instruments (AIC-101, AIT-201, ACV-301)
      - pattern: \b[A-Z]?C[-_]?\d{1,6}[A-Z]?\b
        description: Distillation column tags (C-101, DC-201)
      keywords: []
    confidence_modifier:
      mode: explicit
      value: 1
    priority: 50
  not_isa_penalty:
    name: not_isa_penalty
    enabled: true
    match:
      expressions:
      - pattern: (?s).*
        description: Catch-all when no higher-priority rule matched; applies non-ISA
          penalty
      keywords: []
    confidence_modifier:
      mode: offset
      value: -0.2
    priority: 1000
  blacklist:
    name: blacklist
    enabled: true
    priority: 10
    match:
      keywords:
      - test
      - example
      - sample
      - dummy
      - temp
      - temporary
      - 'null'
      - none
      - n/a
      - na
      - unknown
    confidence_modifier:
      mode: explicit
      value: 0
  alias_shape_invalid:
    name: alias_shape_invalid
    enabled: true
    priority: 0
    expression_match: fullmatch
    match:
      expressions:
      - pattern: ^[0-9]{0,3}$
        description: Alias is only digits and shorter than 4 characters (empty counts
          as invalid)
      - pattern: ^.{81,}$
        description: Alias exceeds maximum length 80
      - pattern: '[^A-Za-z0-9-_/. ]'
        description: Character outside allowed set (letters, digits, _ / . - and space)
    confidence_modifier:
      mode: explicit
      value: 0
key_extraction:
  externalId: ctx_key_extraction_default
  config:
    parameters:
      debug: true
      run_all: false
      raw_db: db_key_extraction
      raw_table_key: key_extraction_state
      skip_entity_policy: successful_only
      write_empty_extraction_rows: false
      raw_skip_scan_chunk_size: 5000
      incremental_change_processing: true
      key_discovery_instance_space: inst_key_discovery
      key_discovery_schema_space: dm_key_discovery
      key_discovery_dm_version: v1
      cdm_view_version: v1
      workflow_scope: SITE_01__PLANT_A__AREA_01__COOLING_SYS
      incremental_skip_unchanged_source_inputs: true
      enable_reference_index: true
      exclude_self_referencing_keys: true
    data:
      extraction_rules:
      - name: asset_tag_candidate
        handler: regex_handler
        extraction_type: candidate_key
        enabled: true
        priority: 10
        description: Equipment tags — optional hyphens; optional numeric tail segments
          (e.g. ...-92529-02).
        fields:
        - regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          field_name: name
          required: true
          priority: 1
          regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          max_matches_per_field: 10
          max_length: 500
          preprocessing:
          - trim
        scope_filters:
          entity_type:
          - asset
        validation:
          validation_rules: []
        aliasing_pipeline: []
      - name: file_basename_candidate
        handler: regex_handler
        extraction_type: candidate_key
        enabled: true
        priority: 20
        description: Basename (with extension) as candidate key for files.
        fields:
        - field_name: name
          regex: (?:^|[/\\])([^/\\]+)$
          max_matches_per_field: 1
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          required: true
          max_length: 500
          priority: 1
          preprocessing:
          - trim
        scope_filters:
          entity_type:
          - file
        validation:
          validation_rules:
          - blacklist
        aliasing_pipeline:
        - document_aliases
      - name: timeseries_instrument_tag_candidate
        handler: regex_handler
        extraction_type: candidate_key
        enabled: true
        priority: 30
        description: Same *alphanumeric_tag as timeseries FK rules on name/description
          (and asset candidate).
        fields:
        - field_name: name
          regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          required: true
          max_length: 500
          priority: 1
          preprocessing:
          - trim
        scope_filters:
          entity_type:
          - timeseries
        validation:
          validation_rules: []
        aliasing_pipeline: []
      - name: instance_name_asset_fk
        handler: regex_handler
        extraction_type: foreign_key_reference
        enabled: true
        priority: 40
        description: Extract asset-tag references embedded in timeseries name.
        fields:
        - field_name: name
          regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          required: true
          max_length: 500
          priority: 1
          preprocessing:
          - trim
        scope_filters:
          entity_type:
          - file
          - timeseries
        validation:
          validation_rules: []
        aliasing_pipeline: []
      - name: instance_description_asset_fk
        handler: regex_handler
        extraction_type: foreign_key_reference
        enabled: true
        priority: 50
        description: Extract asset-tag references from file description for linking
          to assets.
        fields:
        - field_name: description
          regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          required: false
          max_length: 1000
          priority: 1
          preprocessing:
          - trim
        scope_filters: {}
        validation:
          validation_rules: []
        aliasing_pipeline: []
      - name: equipment_tag_ck
        handler: regex_handler
        extraction_type: candidate_key
        enabled: true
        priority: 60
        fields:
        - field_name: name
          required: true
          priority: 1
          variable: name
          regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          max_length: 500
          preprocessing:
          - trim
        scope_filters:
          entity_type:
          - equipment
        validation:
          validation_rules: []
        aliasing_pipeline: []
      validation:
        min_confidence: 0.5
        max_keys_per_type: 1000
aliasing_rule_definitions:
  local_demo_alias:
    name: local_demo_alias
    handler: character_substitution
    enabled: true
    priority: 10
    preserve_original: true
    config:
      substitutions:
        /: '-'
  cogniteasset_explicit_aliases_from_raw:
    name: cogniteasset_explicit_aliases_from_raw
    handler: alias_mapping_table
    description: Apply explicit alias mappings for CogniteAsset from RAW lookup rows.
    enabled: true
    priority: 5
    preserve_original: true
    config:
      source_match: exact
      case_insensitive: false
      raw_table:
        database_name: db_tag_aliasing
        table_name: explicit_asset_aliases
        key_column: source_tag
        alias_columns:
        - aliases
        alias_delimiter: ','
        scope_column: scope
        scope_value_column: scope_value
        source_match_column: source_match
        columns:
        - source_tag
        - aliases
        - scope
        - scope_value
        - source_match
    conditions: {}
    scope_filters:
      entity_type:
      - asset
  semantic_expansion:
    name: semantic_expansion
    handler: semantic_expansion
    description: Expand equipment type letter codes to full words (e.g. P-101 → PUMP-101).
    enabled: true
    priority: 10
    preserve_original: true
    config:
      type_mappings:
        P:
        - PUMP
        - PMP
        CP:
        - CENTRIFUGAL_PUMP
        - PUMP
        - PMP
        FWP:
        - FEEDWATER_PUMP
        - PUMP
        - PMP
        CWP:
        - COOLING_WATER_PUMP
        - PUMP
        - PMP
        BWP:
        - BOILER_WATER_PUMP
        - PUMP
        - PMP
        C:
        - COMPRESSOR
        - COMP
        AC:
        - AIR_COMPRESSOR
        - COMPRESSOR
        - COMP
        RC:
        - RECIPROCATING_COMPRESSOR
        - COMPRESSOR
        - COMP
        CC:
        - CENTRIFUGAL_COMPRESSOR
        - COMPRESSOR
        - COMP
        FCV:
        - FLOW_CONTROL_VALVE
        - VALVE
        - VLV
        PCV:
        - PRESSURE_CONTROL_VALVE
        - VALVE
        - VLV
        TCV:
        - TEMPERATURE_CONTROL_VALVE
        - VALVE
        - VLV
        LCV:
        - LEVEL_CONTROL_VALVE
        - VALVE
        - VLV
        PSV:
