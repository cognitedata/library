        - INSTRUMENT
      format_templates:
      - '{type}-{tag}'
      - '{type}_{tag}'
      auto_detect: true
    conditions: {}
    scope_filters:
      entity_type:
      - asset
  strip_numeric_unit_prefix:
    name: strip_numeric_unit_prefix
    handler: regex_substitution
    description: '{unit}-{type}-{id} e.g. 10-P-1234 -> P-1234; does not match tags
      already starting with type (P-1234).'
    enabled: true
    priority: 10
    preserve_original: true
    config:
      patterns:
      - pattern: ^\d+-
        replacement: ''
    conditions: {}
    scope_filters:
      entity_type:
      - asset
  leading_zero_normalization:
    name: leading_zero_normalization
    handler: leading_zero_normalization
    description: Normalize leading zeros in numeric tokens within tags (assets only).
    enabled: true
    priority: 20
    preserve_original: true
    config:
      preserve_single_zero: true
      min_length: 4
    conditions: {}
    scope_filters:
      entity_type:
      - asset
  document_aliases:
    name: document_aliases
    handler: document_aliases
    description: P&ID / drawing / file-name variants for file candidate keys.
    enabled: true
    priority: 30
    preserve_original: true
    config:
      pid_rules:
        remove_ampersand: true
        add_spaces: true
        revision_variants: true
      drawing_rules:
        zero_padding:
          enabled: true
          target_length: 6
        sheet_variants: true
      file_rules:
        remove_revision_numbers: true
    conditions: {}
    scope_filters:
      entity_type:
      - file
