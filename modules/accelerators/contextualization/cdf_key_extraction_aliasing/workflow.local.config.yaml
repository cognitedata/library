      raw_table_aliases: default_aliases
      alias_writeback_property: aliases
      write_foreign_key_references: false
      foreign_key_writeback_property: references_found
    data:
      aliasing_rules: []
      validation:
        max_aliases_per_tag: 100
        min_confidence: 0.01
        validation_rules:
        - alias_shape_invalid
      pathways:
        steps:
        - mode: sequential
          rules:
          - name: document_aliases
            handler: document_aliases
            enabled: true
            priority: 30
            preserve_original: true
            config:
              pid_rules:
