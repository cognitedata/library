            extraction_type: candidate_key
            enabled: true
            priority: 20
            description: Basename (with extension) as candidate key for files.
            fields:
            - field_name: name
              regex: (?:^|[/\\])([^/\\]+)$
              max_matches_per_field: 1
              regex_options:
                ignore_case: false
                multiline: false
                dotall: false
                unicode: true
              required: true
              max_length: 500
              priority: 1
              preprocessing:
              - trim
            scope_filters:
