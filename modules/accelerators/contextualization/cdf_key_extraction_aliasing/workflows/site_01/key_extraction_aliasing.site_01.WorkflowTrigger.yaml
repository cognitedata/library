                multiline: false
                dotall: false
                unicode: true
              field_name: name
              required: true
              priority: 1
              regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
              max_matches_per_field: 10
              max_length: 500
              preprocessing:
              - trim
            scope_filters:
              entity_type:
              - asset
            validation:
              validation_rules: []
            aliasing_pipeline: []
          - name: file_basename_candidate
