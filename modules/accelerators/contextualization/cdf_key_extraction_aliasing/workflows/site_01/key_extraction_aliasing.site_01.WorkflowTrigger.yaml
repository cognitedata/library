            fields:
            - field_name: name
              regex: (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
              max_matches_per_field: 10
              regex_options:
                ignore_case: false
                multiline: false
                dotall: false
                unicode: true
              required: true
              max_length: 500
              priority: 1
              preprocessing:
              - trim
            scope_filters:
