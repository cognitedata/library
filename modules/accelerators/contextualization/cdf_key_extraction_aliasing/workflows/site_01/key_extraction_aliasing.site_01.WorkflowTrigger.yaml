      include_properties:
      - externalId
      - name
      - description
      - tags
      - unit
      - documentType
      - drawingNumber
    - view_external_id: CogniteTimeSeries
      view_space: cdf_cdm
      view_version: v1
      entity_type: timeseries
      include_properties:
      - externalId
      - name
      - description
      - tags
      - unit
      filters:
      - operator: EQUALS
        property_scope: node
        target_property: space
        values:
        - '{{instance_space}}'
    - view_external_id: CogniteAsset
      view_space: cdf_cdm
      view_version: v1
      entity_type: asset
      filters:
      - operator: EQUALS
        property_scope: node
        target_property: space
        values:
        - '{{instance_space}}'
      - operator: CONTAINSANY
        target_property: tags
        values:
        - asset_tag
      include_properties:
      - externalId
      - name
      - description
      - tags
      - unit
    - view_external_id: CogniteEquipment
      view_space: cdf_cdm
      view_version: v1
      entity_type: equipment
      filters:
