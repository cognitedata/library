              max_matches_per_field: 10
              regex_options:
                ignore_case: false
                multiline: false
                dotall: false
                unicode: true
              required: true
              max_length: 500
              priority: 1
              preprocessing:
              - trim
            scope_filters:
              entity_type:
              - file
              - timeseries
            validation:
              validation_rules: []
            aliasing_pipeline: []
          - name: instance_description_asset_fk
            handler: regex_handler
            extraction_type: foreign_key_reference
            enabled: true
