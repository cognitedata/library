        aliasing_pipeline:
        - cogniteasset_explicit_aliases_from_raw:
          - Strip Delimiter
      validation:
        min_confidence: 0.5
        max_keys_per_type: 1000
aliasing_rule_definitions:
  cogniteasset_explicit_aliases_from_raw:
    name: cogniteasset_explicit_aliases_from_raw
    handler: alias_mapping_table
    description: Apply explicit alias mappings for CogniteAsset from RAW lookup rows.
    enabled: true
    priority: 5
    preserve_original: true
    config:
      source_match: exact
      case_insensitive: false
      raw_table:
        database_name: db_tag_aliasing
        table_name: explicit_asset_aliases
        key_column: source_tag
        alias_columns:
        - aliases
        alias_delimiter: ','
        scope_column: scope
        scope_value_column: scope_value
        source_match_column: source_match
        columns:
        - source_tag
        - aliases
        - scope
        - scope_value
        - source_match
    conditions: {}
    scope_filters:
      entity_type:
      - asset
  strip_numeric_unit_prefix:
    name: strip_numeric_unit_prefix
    handler: regex_substitution
    description: '{unit}-{type}-{id} e.g. 10-P-1234 -> P-1234; does not match tags
      already starting with type (P-1234).'
    enabled: true
    priority: 10
    preserve_original: true
    config:
      patterns:
      - pattern: ^\d+-
        replacement: ''
    conditions: {}
    scope_filters:
      entity_type:
      - asset
  leading_zero_normalization:
    name: leading_zero_normalization
    handler: leading_zero_normalization
    description: Normalize leading zeros in numeric tokens within tags (assets only).
    enabled: true
    priority: 20
    preserve_original: true
    config:
      preserve_single_zero: true
      min_length: 4
    conditions: {}
    scope_filters:
      entity_type:
      - asset
  document_aliases:
    name: document_aliases
    handler: document_aliases
    description: P&ID / drawing / file-name variants for file candidate keys.
    enabled: true
    priority: 30
    preserve_original: true
    config:
      pid_rules:
        remove_ampersand: true
        add_spaces: true
        revision_variants: true
      drawing_rules:
        zero_padding:
          enabled: true
          target_length: 6
        sheet_variants: true
      file_rules:
        remove_revision_numbers: true
    conditions: {}
    scope_filters:
      entity_type:
      - file
  pre_prefix_site01:
    name: pre_prefix_site01
    handler: prefix_suffix
    description: 'Debug: prefix aliases with pre_ after strip delimiter (site_01).'
    enabled: true
    priority: 70
    preserve_original: true
    config:
      operation: add_prefix
      prefix: pre_
      conditions:
        missing_prefix: true
    conditions: {}
    scope_filters:
      entity_type:
      - asset
      - equipment
      - timeseries
aliasing:
  externalId: ctx_aliasing_site_01
  config:
    parameters:
      debug: true
      raw_db: db_tag_aliasing
      raw_table_state: tag_aliasing_state
      raw_table_aliases: default_aliases
      alias_writeback_property: aliases
      write_foreign_key_references: false
      foreign_key_writeback_property: references_found
    data:
      pathways:
        steps:
        - mode: sequential
          rules:
          - name: cogniteasset_explicit_aliases_from_raw
            handler: alias_mapping_table
            enabled: true
            priority: 20
            preserve_original: true
            config:
              source_match: exact
              case_insensitive: false
              raw_table:
                database_name: db_tag_aliasing
                table_name: explicit_asset_aliases
                key_column: source_tag
                alias_columns:
                - aliases
                alias_delimiter: ','
                scope_column: scope
                scope_value_column: scope_value
                source_match_column: source_match
                columns:
                - source_tag
                - aliases
                - scope
                - scope_value
                - source_match
            conditions: {}
            scope_filters:
              entity_type:
              - asset
            description: Apply explicit alias mappings for CogniteAsset from RAW lookup
              rows.
            validation:
              validation_rules: []
          - name: Strip Delimiter
            handler: regex_substitution
            enabled: true
            priority: 10
            preserve_original: true
            config:
              patterns:
              - pattern: (?:\W|_)
                replacement: ''
            conditions: {}
            scope_filters:
              entity_type:
              - asset
              - timeseries
            validation:
              validation_rules: []
          - name: document_aliases
            handler: document_aliases
            enabled: true
            priority: 30
            preserve_original: true
            config:
              pid_rules:
                remove_ampersand: true
                add_spaces: true
                revision_variants: true
              drawing_rules:
                zero_padding:
                  enabled: true
                  target_length: 6
                sheet_variants: true
              file_rules:
                remove_revision_numbers: true
            conditions: {}
            scope_filters:
              entity_type:
              - file
            description: P&ID / drawing / file-name variants for file candidate keys.
            validation:
              validation_rules: []
          - name: leading_zero_normalization
            handler: leading_zero_normalization
            enabled: true
            priority: 40
            preserve_original: true
            config:
              preserve_single_zero: true
              min_length: 4
            conditions: {}
            scope_filters:
              entity_type:
              - asset
            description: Normalize leading zeros in numeric tokens within tags (assets
              only).
            validation:
              validation_rules: []
          - name: strip_numeric_unit_prefix
            handler: regex_substitution
            enabled: true
            priority: 60
            preserve_original: true
            config:
              patterns:
              - pattern: ^\d+-
                replacement: ''
            conditions: {}
            scope_filters:
              entity_type:
              - asset
            description: '{unit}-{type}-{id} e.g. 10-P-1234 -> P-1234; does not match
              tags already starting with type (P-1234).'
            validation:
              validation_rules: []
          - name: character_substitution_1
            handler: character_substitution
            enabled: true
            priority: 60
            preserve_original: true
            config:
              substitutions:
                _: '-'
            conditions: {}
            scope_filters: {}
            validation:
              validation_rules: []
          - name: pre_prefix_site01
            handler: prefix_suffix
            enabled: true
            priority: 70
            preserve_original: true
            config:
              operation: add_prefix
              prefix: pre_
              conditions:
                missing_prefix: true
            conditions: {}
            scope_filters:
              entity_type:
              - asset
              - equipment
              - timeseries
            description: 'Debug: prefix aliases with pre_ after strip delimiter (site_01).'
            validation:
              validation_rules: []
      validation:
        max_aliases_per_tag: 100
        min_confidence: 0.01
        validation_rules:
        - alias_shape_invalid
