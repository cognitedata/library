workflowExternalId: cdf_key_extraction_aliasing_{{ site_abbreviation }}
version: 'v1'
workflowDefinition:
  description: 'Run {{ site_name }} key extraction'
  tasks:
    - externalId: 'fn_dm_key_extraction_{{ site_abbreviation }}'
      type: 'function'
      parameters:
        function:
          externalId: 'fn_dm_key_extraction'
          data:
            logLevel: 'INFO'
            config:
              externalId: ctx_key_extraction_{{ site_abbreviation }}_prod
              config:
                parameters:
                  debug: true
                  run_all: true
                  # Temporary safety limit while validating the pipeline end-to-end.
                  # Set to null (or remove) to process all matching files.
                  max_files: 50
                  overwrite: true
                  raw_db: db_key_extraction
                  raw_table_state: key_extraction_state_{{ site_abbreviation }}
                  raw_table_key: {{ site_abbreviation }}_extracted_keys
                data:
                  validation:
                    min_confidence: 0.5
                    max_keys_per_type: 1000
                    blacklist_keywords:
                      - "test"
                      - "example"
                      - "sample"
                      - "dummy"
                      - "temp"
                      - "temporary"
                      - "null"
                      - "none"
                      - "n/a"
                      - "na"
                      - "unknown"
                  source_views:
                    - view_external_id: CogniteFile
                      view_space: cdf_cdm
                      view_version: v1
                      instance_space: {{ instance_space }}
                      entity_type: file
                      batch_size: 1000
                      filters:
                        - operator: IN
                          target_property: mimeType
                          values:
                            - application/pdf
                      include_properties:
                        - externalId
                        - name
                        - description
                        - tags
                        - metadata
                  extraction_rules:
                    - name: "site_file_ocr_rdp_ppg_candidates"
                      method: "regex"
                      extraction_type: "candidate_key"
                      description: "Extract RDP-PID, PPG-SYS, PPG-HAS, PPG-E25, PPG-UTI from file name"
                      enabled: true
                      priority: 65
                      scope_filters:
                        entity_type: ["file"]
                      parameters:
                        pattern: '\b(?:RDP[-_\s]?PID|PPG[-_\s]?(?:SYS|HAS|E25|UTI))\b'
                        max_matches_per_field: 10
                        regex_options:
                          ignore_case: true
                          multiline: false
                          dotall: false
                          unicode: true
                        early_termination: false
                      source_fields:
                        - field_name: "name"
                          required: true
                          max_length: 500
                          field_type: string
                          priority: 1
                          role: target
                          preprocessing:
                            - trim
                      field_selection_strategy: "first_match"
                    - name: "site_file_tag_like_from_name"
                      method: "regex"
                      extraction_type: "candidate_key"
                      description: "Extract asset-tag-like tokens from file name"
                      enabled: true
                      priority: 58
                      scope_filters:
                        entity_type: ["file"]
                      parameters:
                        pattern: '\b(?=[A-Za-z0-9_-]*\d)[A-Za-z0-9][A-Za-z0-9_-]{3,}\b'
                        max_matches_per_field: 50
                        regex_options:
                          ignore_case: false
                          multiline: false
                          dotall: false
                          unicode: true
                        early_termination: false
                      source_fields:
                        - field_name: "name"
                          required: true
                          max_length: 500
                          field_type: string
                          priority: 1
                          role: target
                          preprocessing:
                            - trim
                        - field_name: "description"
                          required: false
                          max_length: 1000
                          field_type: string
                          priority: 2
                          role: target
                          preprocessing:
                            - trim
                      field_selection_strategy: "merge_all"
                    - name: "site_file_metadata_aliases_extraction"
                      method: "regex"
                      extraction_type: "candidate_key"
                      description: "Extract tag-like tokens from file metadata.aliases"
                      enabled: true
                      priority: 72
                      scope_filters:
                        entity_type: ["file"]
                      parameters:
                        pattern: '\b(?=[A-Za-z0-9_-]*\d)[A-Za-z0-9][A-Za-z0-9_-]{3,}\b'
                        max_matches_per_field: 200
                        regex_options:
                          ignore_case: false
                          multiline: false
                          dotall: false
                          unicode: true
                        early_termination: false
                      source_fields:
                        - field_name: "metadata.aliases"
                          required: false
                          max_length: 5000
                          field_type: array
                          separator: " "
                          priority: 1
                          role: target
                          preprocessing:
                            - trim
                      field_selection_strategy: "merge_all"
                    - name: "site_file_asset_tag_extraction"
                      method: "regex"
                      extraction_type: "candidate_key"
                      description: "Extract standard asset tags from file name"
                      enabled: true
                      priority: 55
                      scope_filters:
                        entity_type: ["file"]
                      parameters:
                        pattern: '\b[A-Z0-9-\/]+[a-zA-Z0-9]\b'
                        max_matches_per_field: 30
                        regex_options:
                          ignore_case: false
                          multiline: false
                          dotall: false
                          unicode: true
                        early_termination: false
                      source_fields:
                        - field_name: "name"
                          required: true
                          max_length: 500
                          field_type: string
                          priority: 1
                          role: target
                          preprocessing:
                            - trim
                      field_selection_strategy: "merge_all"
      name: '{{ site_name }} Key Extraction'
      description: 'Extract candidate keys from {{ site_name }} files and write to RAW'
      retries: 3
      timeout: 7200
      onFailure: 'abortWorkflow'

    - externalId: 'fn_dm_aliasing_{{ site_abbreviation }}'
      type: 'function'
      parameters:
        function:
          externalId: 'fn_dm_aliasing'
          data:
            logLevel: 'INFO'
            # Key-Extraction writes candidate keys to RAW; Aliasing reads them back from RAW
            # because Workflows don't auto-pass function outputs to the next task.
            source_raw_db: db_key_extraction
            source_raw_table_key: {{ site_abbreviation }}_extracted_keys
            source_raw_read_limit: 10000
            source_instance_space: {{ instance_space }}
            source_view_space: cdf_cdm
            source_view_external_id: CogniteFile
            source_view_version: v1
            source_entity_type: file
            config:
              externalId: ctx_aliasing_{{ site_abbreviation }}_prod
              config:
                parameters:
                  debug: true
                  run_all: true
                  overwrite: true
                  raw_db: db_tag_aliasing
                  raw_table_state: tag_aliasing_state_{{ site_abbreviation }}
                  raw_table_aliases: {{ site_abbreviation }}_aliases
                data:
                  aliasing_rules:
                    - name: site_file_rdp_ppg_ocr
                      type: character_substitution
                      description: "{{ site_name }} file OCR substitutions - RDP-PID <-> PPG-SYS, PPG-HAS, PPG-E25, PPG-UTI"
                      enabled: true
                      priority: 10
                      preserve_original: true
                      config:
                        substitutions:
                          "RDP-PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
                          "RDP_PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
                          "RDP PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
                        cascade_substitutions: false
                        max_aliases_per_input: 10
                        bidirectional: true
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_default_ocr
                      type: character_substitution
                      description: "Default OCR substitutions A<->W, 8<->B for files"
                      enabled: true
                      priority: 11
                      preserve_original: true
                      config:
                        substitutions: {"A": ["W"], "8": ["B"]}
                        cascade_substitutions: false
                        max_aliases_per_input: 20
                        bidirectional: true
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_leading_zero_normalization
                      type: leading_zero_normalization
                      description: "Strip leading zeros from numeric tokens in file tags"
                      enabled: true
                      priority: 75
                      preserve_original: true
                      config: {preserve_single_zero: true, min_length: 1}
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_delimit_alpha_numeric_hyphen
                      type: regex_substitution
                      description: "Add hyphen at alpha-numeric boundaries"
                      enabled: true
                      priority: 20
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^([A-Za-z]+)([0-9].*)$$", replacement: "\\1-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_delimit_alpha_numeric_zero
                      type: regex_substitution
                      description: "Add '0' at alpha-numeric boundaries"
                      enabled: true
                      priority: 21
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^([A-Za-z]+)([0-9].*)$$", replacement: "\\10\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_delimit_alpha_numeric_double_zero
                      type: regex_substitution
                      description: "Add '00' at alpha-numeric boundaries"
                      enabled: true
                      priority: 22
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^([A-Za-z]+)([0-9].*)$$", replacement: "\\100\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_delimit_alpha_numeric_hyphen_zero
                      type: regex_substitution
                      description: "Add '-0' at alpha-numeric boundaries"
                      enabled: true
                      priority: 23
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^([A-Za-z]+)([0-9].*)$$", replacement: "\\1-0\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_delimit_alpha_numeric_hyphen_double_zero
                      type: regex_substitution
                      description: "Add '-00' at alpha-numeric boundaries"
                      enabled: true
                      priority: 24
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^([A-Za-z]+)([0-9].*)$$", replacement: "\\1-00\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_cleanse
                      type: regex_substitution
                      description: "Remove non-alphanumeric characters"
                      enabled: true
                      priority: 5
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*)[^A-Za-z0-9]+(.*)$$", replacement: "\\1\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [file]
                    - name: site_file_remove_revision_suffix
                      type: regex_substitution
                      description: "Remove revision suffixes (rX, vX, revX, verX)"
                      enabled: true
                      priority: 60
                      preserve_original: true
                      config:
                        patterns:
                          - {pattern: "(.*)((?:REV|VER|rev|ver)[A-Za-z0-9]{1,2})$$", replacement: "\\1"}
                          - {pattern: "(.*)((?:R|V|r|v)[A-Za-z0-9]{1,2})$$", replacement: "\\1"}
                    - name: site_asset_instrument_ocr
                      type: character_substitution
                      description: "{{ site_name }} asset instrument-type OCR substitutions"
                      enabled: true
                      priority: 10
                      preserve_original: true
                      config:
                        substitutions:
                          FT: [FC, FE, FI]
                          LT: [LC, LE, LI]
                          PT: [PC, PE, PI]
                          ST: [SC, SE, SI]
                          TT: [TC, TE, TI]
                          VE: [VO, VC]
                          WT: [WC, WE, WI]
                        cascade_substitutions: false
                        max_aliases_per_input: 30
                        bidirectional: true
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_6digit_suffix_variants
                      type: regex_substitution
                      description: "Add A,B,C,O,S,R suffix after 6-digit codes"
                      enabled: true
                      priority: 15
                      preserve_original: true
                      config:
                        patterns:
                          - {pattern: "^(.*)(\\d{6})$$", replacement: "\\1\\2A"}
                          - {pattern: "^(.*)(\\d{6})$$", replacement: "\\1\\2B"}
                          - {pattern: "^(.*)(\\d{6})$$", replacement: "\\1\\2C"}
                          - {pattern: "^(.*)(\\d{6})$$", replacement: "\\1\\2O"}
                          - {pattern: "^(.*)(\\d{6})$$", replacement: "\\1\\2S"}
                          - {pattern: "^(.*)(\\d{6})$$", replacement: "\\1\\2R"}
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_remove_sis_suffix
                      type: regex_substitution
                      description: "Remove -SIS or SIS suffix from asset tags"
                      enabled: true
                      priority: 25
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*)[-]?SIS$$", replacement: "\\1"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_remove_trailing_letter
                      type: regex_substitution
                      description: "Remove trailing single letter after digit"
                      enabled: true
                      priority: 26
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*\\d)([A-Z])$$", replacement: "\\1"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_unit_infix_csb1
                      type: regex_substitution
                      description: "Insert -CSB1- at alpha-to-numeric boundary"
                      enabled: true
                      priority: 30
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$$", replacement: "\\1-CSB1-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_unit_infix_sspt
                      type: regex_substitution
                      description: "Insert -SSPT- at alpha-to-numeric boundary"
                      enabled: true
                      priority: 31
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$$", replacement: "\\1-SSPT-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_unit_infix_csa1
                      type: regex_substitution
                      description: "Insert -CSA1- at alpha-to-numeric boundary"
                      enabled: true
                      priority: 32
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$$", replacement: "\\1-CSA1-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_unit_infix_ssnd
                      type: regex_substitution
                      description: "Insert -SSND- at alpha-to-numeric boundary"
                      enabled: true
                      priority: 33
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$$", replacement: "\\1-SSND-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_unit_infix_sssf
                      type: regex_substitution
                      description: "Insert -SSSF- at alpha-to-numeric boundary"
                      enabled: true
                      priority: 34
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$$", replacement: "\\1-SSSF-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_unit_infix_ssb1
                      type: regex_substitution
                      description: "Insert -SSB1- at alpha-to-numeric boundary"
                      enabled: true
                      priority: 35
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$$", replacement: "\\1-SSB1-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_default_ocr
                      type: character_substitution
                      description: "Default OCR substitutions A<->W, 8<->B for assets"
                      enabled: true
                      priority: 11
                      preserve_original: true
                      config:
                        substitutions: {"A": ["W"], "8": ["B"]}
                        cascade_substitutions: false
                        max_aliases_per_input: 20
                        bidirectional: true
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_leading_zero_normalization
                      type: leading_zero_normalization
                      description: "Strip leading zeros from numeric tokens in asset tags"
                      enabled: true
                      priority: 76
                      preserve_original: true
                      config: {preserve_single_zero: true, min_length: 1}
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_delimit_alpha_numeric_hyphen
                      type: regex_substitution
                      description: "Add hyphen at alpha-numeric boundaries"
                      enabled: true
                      priority: 20
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^([A-Za-z]+)([0-9].*)$$", replacement: "\\1-\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_delimit_alpha_numeric_zero
                      type: regex_substitution
                      description: "Add '0' at alpha-numeric boundaries"
                      enabled: true
                      priority: 21
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^([A-Za-z]+)([0-9].*)$$", replacement: "\\10\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_asset_cleanse
                      type: regex_substitution
                      description: "Remove non-alphanumeric characters"
                      enabled: true
                      priority: 5
                      preserve_original: true
                      config:
                        patterns: [{pattern: "^(.*)[^A-Za-z0-9]+(.*)$$", replacement: "\\1\\2"}]
                      conditions: {}
                      scope_filters:
                        entity_type: [asset]
                    - name: site_separator_variants
                      type: character_substitution
                      description: "Generate hyphen/underscore/empty separator variants"
                      enabled: true
                      priority: 12
                      preserve_original: true
                      config:
                        substitutions: {"-": ["_", ""], "_": ["-", ""]}
                        cascade_substitutions: false
                        max_aliases_per_input: 15
                        bidirectional: false
                      conditions: {}
                      scope_filters:
                        entity_type: [file, asset]
                  validation:
                    max_aliases_per_tag: 50
                    min_alias_length: 2
                    max_alias_length: 100
                    allowed_characters: "A-Za-z0-9-_/. "
      name: '{{ site_name }} Aliasing'
      description: 'Generate aliases from extracted candidate keys and write aliasing results to RAW'
      retries: 3
      timeout: 7200
      onFailure: 'abortWorkflow'
      dependsOn:
        - externalId: 'fn_dm_key_extraction_{{ site_abbreviation }}'

    - externalId: 'fn_dm_alias_persistence_{{ site_abbreviation }}'
      type: 'function'
      parameters:
        function:
          externalId: 'fn_dm_alias_persistence'
          data:
            logLevel: 'INFO'
            # Load aliasing results from RAW produced by aliasing task.
            raw_db: db_tag_aliasing
            raw_table_aliases: {{ site_abbreviation }}_aliases
            raw_read_limit: 10000
            # Optional FK write-back (enable when DM exposes e.g. references_found on CogniteDescribable)
            source_raw_db: db_key_extraction
            source_raw_table_key: {{ site_abbreviation }}_extracted_keys
            source_raw_read_limit: 10000
            source_instance_space: {{ instance_space }}
            source_view_space: cdf_cdm
            source_view_external_id: CogniteFile
            source_view_version: v1
            write_foreign_key_references: false
            foreign_key_writeback_property: references_found
      dependsOn:
        - externalId: 'fn_dm_aliasing_{{ site_abbreviation }}'
      name: '{{ site_name }} Alias Persistence'
      description: 'Persist aliases to cdf_cdm:CogniteDescribable:v1'
      retries: 3
      timeout: 3600
      onFailure: 'abortWorkflow'
