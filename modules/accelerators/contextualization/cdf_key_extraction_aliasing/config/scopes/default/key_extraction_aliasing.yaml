# Representative CDM default: CogniteAsset / CogniteFile / CogniteTimeSeries.
# Shared tag token (asset candidate + FK + timeseries general): optional unit, TYPE, optional -, id digits, optional -NN suffixes, optional letter.
#   Examples: 10-P-1234, P1234, 23-LT-92529-02. (?<![\d-]) avoids inner type-id inside 10P1234 / 10-P-1234.
#   After VAL_… use (?:\b|(?<=_)) not \b alone: in Python \w includes _, so there is no word boundary between _ and a digit.
# Timeseries VAL_/embedded triple: after ^ or _/space; -NN tails before : . or space (e.g. VAL_23-LT-92529-02:X...).
schemaVersion: 1
key_extraction:
  externalId: ctx_key_extraction_default
  config:
    parameters:
      debug: true
      run_all: true
      overwrite: true
      raw_db: db_key_extraction
      raw_table_state: key_extraction_state
      raw_table_key: default_extracted_keys
      # Drop FK strings that duplicate a candidate key on the same instance (default true).
      # Per-source_view ignore_self_referencing_keys overrides this (see CogniteTimeSeries below).
      ignore_self_referencing_keys: true
    data:
      validation:
        min_confidence: 0.5
        max_keys_per_type: 1000
        blacklist_keywords:
        - test
        - example
        - sample
        - dummy
        - temp
        - temporary
        - 'null'
        - none
        - n/a
        - na
        - unknown
      source_views:
      - view_external_id: CogniteAsset
        view_space: cdf_cdm
        view_version: v1
        entity_type: asset
        batch_size: 100
        filters:
        - operator: CONTAINSANY
          target_property: tags
          values:
          - asset_tag
        include_properties:
        - externalId
        - name
        - description
        - tags
      - view_external_id: CogniteFile
        view_space: cdf_cdm
        view_version: v1
        entity_type: file
        batch_size: 50
        # PDF documents only (CogniteFile.mimeType).
        filters:
        - operator: IN
          target_property: mimeType
          values:
          - application/pdf
        include_properties:
        - externalId
        - name
        - description
        - tags
        - documentType
        - drawingNumber
      - view_external_id: CogniteTimeSeries
        view_space: cdf_cdm
        view_version: v1
        entity_type: timeseries
        batch_size: 200
        # Keep FK strings that match a candidate on the same instance (e.g. name vs tag).
        ignore_self_referencing_keys: false
        include_properties:
        - externalId
        - name
        - description
        - tags
        - unit
      extraction_rules:
      # Shared tag regex: &alphanumeric_tag (alphanumeric_tag in config/tag_patterns.yaml).
      # All asset/timeseries tag candidate_key and foreign_key_reference rules use *alphanumeric_tag.
      # File candidate_key uses basename regex only (not an equipment tag).
      # --- Candidate keys ---
      - name: asset_equipment_tag_candidate
        method: regex
        extraction_type: candidate_key
        description: Equipment tags — optional hyphens; optional numeric tail segments (e.g. ...-92529-02).
        enabled: true
        priority: 10
        scope_filters:
          entity_type:
          - asset
        parameters:
          pattern: &alphanumeric_tag (?<![\d-])(?:\b|(?<=_))(?:\d{1,8}-?)?[A-Z]{1,8}-?\d{1,10}(?:-\d{1,6})*[A-Z]?\b
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
        - field_name: name
          required: true
          max_length: 500
          field_type: string
          priority: 1
          role: target
          preprocessing:
          - trim
        field_selection_strategy: first_match
      - name: file_basename_candidate
        method: regex
        extraction_type: candidate_key
        description: Basename (with extension) as candidate key for files.
        enabled: true
        priority: 20
        scope_filters:
          entity_type:
          - file
        parameters:
          pattern: (?:^|[/\\])([^/\\]+)$
          max_matches_per_field: 1
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: true
        source_fields:
        - field_name: name
          required: true
          max_length: 500
          field_type: string
          priority: 1
          role: target
          preprocessing:
          - trim
        field_selection_strategy: first_match
      - name: timeseries_instrument_tag_candidate
        method: regex
        extraction_type: candidate_key
        description: Same *alphanumeric_tag as timeseries FK rules on name/description (and asset candidate).
        enabled: true
        priority: 30
        scope_filters:
          entity_type:
          - timeseries
        parameters:
          pattern: *alphanumeric_tag
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
        - field_name: name
          required: true
          max_length: 500
          field_type: string
          priority: 1
          role: target
          preprocessing:
          - trim
        field_selection_strategy: first_match
      # --- Foreign key references (*alphanumeric_tag, same as asset/timeseries tag candidates) ---
      - name: file_description_asset_fk
        method: regex
        extraction_type: foreign_key_reference
        description: Extract asset-tag references from file description for linking to assets.
        enabled: true
        priority: 40
        scope_filters:
          entity_type:
          - file
        parameters:
          pattern: *alphanumeric_tag
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
        - field_name: description
          required: false
          max_length: 1000
          field_type: string
          priority: 1
          role: target
          preprocessing:
          - trim
        field_selection_strategy: merge_all
      - name: timeseries_name_asset_fk
        method: regex
        extraction_type: foreign_key_reference
        description: Extract asset-tag references embedded in timeseries name.
        enabled: true
        priority: 50
        scope_filters:
          entity_type:
          - timeseries
        parameters:
          pattern: *alphanumeric_tag
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
        - field_name: name
          required: true
          max_length: 500
          field_type: string
          priority: 1
          role: target
          preprocessing:
          - trim
        field_selection_strategy: merge_all
      - name: timeseries_description_asset_fk
        method: regex
        extraction_type: foreign_key_reference
        description: Extract asset-tag references from timeseries description.
        enabled: true
        priority: 60
        scope_filters:
          entity_type:
          - timeseries
        parameters:
          pattern: *alphanumeric_tag
          max_matches_per_field: 10
          regex_options:
            ignore_case: false
            multiline: false
            dotall: false
            unicode: true
          early_termination: false
        source_fields:
        - field_name: description
          required: false
          max_length: 1000
          field_type: string
          priority: 1
          role: target
          preprocessing:
          - trim
        field_selection_strategy: merge_all
aliasing:
  externalId: ctx_aliasing_default
  config:
    parameters:
      debug: true
      run_all: true
      overwrite: true
      raw_db: db_tag_aliasing
      raw_table_state: tag_aliasing_state
      raw_table_aliases: default_aliases
      alias_writeback_property: aliases
      write_foreign_key_references: false
      foreign_key_writeback_property: references_found
    data:
      aliasing_rules:
      # priority 10 tier: same priority, YAML order — semantic first, then unit-prefix strip on expanded set.
      - name: semantic_expansion
        type: pattern_based_expansion
        description: Semantic expansion of tag patterns (format variants); align pattern with asset extraction regex.
        enabled: true
        priority: 10
        preserve_original: true
        config:
          patterns:
          - pattern: ^([A-Z]{1,2})([-_]?)(\d{2,6})([A-Z]?)$
            example_formats:
            - '{type}{separator}{number}{suffix}'
            - '{type}{number}{suffix}'
            - '{type}{separator}{number}'
          format_adaptation: true
        conditions: {}
        scope_filters:
          entity_type:
          - asset
      - name: strip_numeric_unit_prefix
        type: regex_substitution
        description: '{unit}-{type}-{id} e.g. 10-P-1234 -> P-1234; does not match tags already starting with type (P-1234).'
        enabled: true
        priority: 10
        preserve_original: true
        config:
          patterns:
          - pattern: ^\d+-
            replacement: ''
        conditions: {}
        scope_filters:
          entity_type:
          - asset
      - name: leading_zero_normalization
        type: leading_zero_normalization
        description: Normalize leading zeros in numeric tokens within tags (assets only).
        enabled: true
        priority: 20
        preserve_original: true
        config:
          preserve_single_zero: true
          min_length: 4
        conditions: {}
        scope_filters:
          entity_type:
          - asset
      - name: document_aliases
        type: document_aliases
        description: P&ID / drawing / file-name variants for file candidate keys.
        enabled: true
        priority: 30
        preserve_original: true
        config:
          pid_rules:
            remove_ampersand: true
            add_spaces: true
            revision_variants: true
          drawing_rules:
            zero_padding:
              enabled: true
              target_length: 6
            sheet_variants: true
          file_rules:
            remove_revision_numbers: true
        conditions: {}
        scope_filters:
          entity_type:
          - file
      validation:
        max_aliases_per_tag: 100
        min_alias_length: 2
        max_alias_length: 80
        allowed_characters: r"A-Za-z0-9-_/. "
