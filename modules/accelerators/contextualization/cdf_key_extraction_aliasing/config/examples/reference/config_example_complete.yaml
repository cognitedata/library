parameters:
  debug: true
  verbose: true
  run_all: false
  raw_db: my_raw_database
  raw_table_key: key_extraction_state
  skip_entity_policy: successful_only
  write_empty_extraction_rows: false
  raw_skip_scan_chunk_size: 5000
data:
  source_views:
  - view_external_id: CogniteEquipment
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: asset
    include_properties:
    - name
    - description
    - equipmentType
    - manufacturer
    - serialNumber
    filters:
    - operator: EQUALS
      target_property: equipmentType
      values: Pump
      negate: false
  - view_external_id: CogniteTimeSeries
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: timeseries
    batch_size: 50
    include_properties:
    - name
    - description
    - unit
    filters:
    - operator: IN
      target_property: type
      values:
      - temperature
      - pressure
      - flow
      negate: false
  - view_external_id: CogniteFile
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: file
    batch_size: 75
    include_properties:
    - name
    - mimeType
    filters:
    - operator: EXISTS
      target_property: uploaded
      negate: false
  - view_external_id: CogniteAsset
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: asset
    include_properties:
    - name
    - labels
    filters:
    - operator: CONTAINSALL
      target_property: labels
      values:
      - critical
      - production
      negate: true
  - view_external_id: CogniteDocument
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: file
    batch_size: 25
    include_properties:
    - name
    - content
    filters:
    - operator: SEARCH
      target_property: content
      values: P&ID diagram
      negate: false
  extraction_rules:
  - rule_id: pump_tag_regex_simple
    handler: regex_handler
    priority: 50
    fields:
    - field_name: name
      required: true
      priority: 1
      max_length: 500
      preprocessing:
      - trim
      - uppercase
      regex: \bP[-_]?\d{2,4}[A-Z]?\b
      max_matches_per_field: 10
      regex_options:
        multiline: false
        dotall: false
        ignore_case: true
        unicode: true
    field_results_mode: merge_all
  - rule_id: instrument_tag_regex_capture
    handler: regex_handler
    priority: 30
    fields:
    - field_name: description
      required: false
      priority: 1
      max_length: 1000
      preprocessing:
      - trim
      regex: (?P<type>[FPTLA][A-Z]{1,2})[-_]?(?P<number>\d{3,4})(?P<suffix>[A-Z])?
      max_matches_per_field: 50
      regex_options: &id001
        multiline: true
        dotall: false
        ignore_case: false
        unicode: true
    - field_name: name
      required: false
      priority: 2
      max_length: 500
      preprocessing: []
      regex: (?P<type>[FPTLA][A-Z]{1,2})[-_]?(?P<number>\d{3,4})(?P<suffix>[A-Z])?
      max_matches_per_field: 50
      regex_options: *id001
    field_results_mode: merge_all
  - rule_id: tag_raw_compact_regex
    handler: regex_handler
    priority: 40
    fields:
    - field_name: rawData
      required: true
      priority: 1
      max_length: 2000
      preprocessing:
      - trim
      regex: ^([A-Z]\d{3}[A-Z]?)$
      max_matches_per_field: 10
      regex_options:
        multiline: false
        dotall: false
        ignore_case: false
        unicode: true
    field_results_mode: merge_all
  - rule_id: tag_multiline_regex_demo
    handler: regex_handler
    priority: 35
    fields:
    - field_name: multilineData
      required: true
      priority: 1
      max_length: 5000
      preprocessing: []
      regex: \b[A-Z]{2}-\d{3}\b
      max_matches_per_field: 20
      regex_options:
        multiline: true
        dotall: true
        ignore_case: false
        unicode: true
    field_results_mode: merge_all
  - rule_id: tag_hierarchical_regex
    handler: regex_handler
    priority: 25
    fields:
    - field_name: name
      required: true
      priority: 1
      max_length: 500
      preprocessing:
      - trim
      - uppercase
      regex: \b[A-Z]{2,3}-\d{2,4}-[A-Z]\d{2,4}[A-Z]?\b
      max_matches_per_field: 10
      regex_options: &id002
        multiline: false
        dotall: false
        ignore_case: false
        unicode: true
    - field_name: description
      required: false
      priority: 2
      max_length: 1000
      preprocessing:
      - trim
      regex: \b[A-Z]{2,3}-\d{2,4}-[A-Z]\d{2,4}[A-Z]?\b
      max_matches_per_field: 10
      regex_options: *id002
    field_results_mode: merge_all
  - rule_id: multi_field_extraction
    handler: regex_handler
    priority: 70
    fields:
    - field_name: name
      required: true
      priority: 1
      max_length: 500
      preprocessing:
      - trim
      - uppercase
      regex: '[A-Z]{1,3}[-_]?\d{2,6}[A-Z]?'
      max_matches_per_field: 100
      regex_options: &id003
        multiline: true
        dotall: true
        ignore_case: true
        unicode: true
    - field_name: description
      required: false
      priority: 2
      max_length: 1000
      preprocessing:
      - trim
      regex: '[A-Z]{1,3}[-_]?\d{2,6}[A-Z]?'
      max_matches_per_field: 100
      regex_options: *id003
    - field_name: metadata.tagIds
      required: false
      priority: 3
      max_length: 2000
      preprocessing:
      - trim
      regex: '[A-Z]{1,3}[-_]?\d{2,6}[A-Z]?'
      max_matches_per_field: 100
      regex_options: *id003
    - field_name: equipmentType
      required: false
      priority: 4
      max_length: 100
      preprocessing:
      - trim
      - lowercase
      regex: '[A-Z]{1,3}[-_]?\d{2,6}[A-Z]?'
      max_matches_per_field: 100
      regex_options: *id003
    - field_name: serialNumber
      required: false
      priority: 5
      max_length: 200
      preprocessing: []
      regex: '[A-Z]{1,3}[-_]?\d{2,6}[A-Z]?'
      max_matches_per_field: 100
      regex_options: *id003
    field_results_mode: merge_all
  - rule_id: field_selection_demo
    handler: regex_handler
    priority: 80
    fields:
    - field_name: primaryTag
      required: false
      priority: 1
      max_length: 500
      preprocessing:
      - trim
      regex: '[A-Z]+\d+'
      max_matches_per_field: 5
      regex_options: &id004
        multiline: false
        dotall: false
        ignore_case: false
        unicode: true
    - field_name: secondaryTag
      required: false
      priority: 2
      max_length: 500
      preprocessing:
      - trim
      regex: '[A-Z]+\d+'
      max_matches_per_field: 5
      regex_options: *id004
    - field_name: alternateTag
      required: false
      priority: 3
      max_length: 500
      preprocessing:
      - trim
      regex: '[A-Z]+\d+'
      max_matches_per_field: 5
      regex_options: *id004
    field_results_mode: merge_all
