schemaVersion: 1
source_views:
  - view_external_id: CogniteEquipment
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: asset
    include_properties:
    - name
    - description
    - equipmentType
    - manufacturer
    - serialNumber
    filters:
    - operator: EQUALS
      target_property: equipmentType
      values: Pump
      negate: false
  - view_external_id: CogniteTimeSeries
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: timeseries
    batch_size: 50
    include_properties:
    - name
    - description
    - unit
    filters:
    - operator: IN
      target_property: type
      values:
      - temperature
      - pressure
      - flow
      negate: false
  - view_external_id: CogniteFile
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: file
    batch_size: 75
    include_properties:
    - name
    - mimeType
    filters:
    - operator: EXISTS
      target_property: uploaded
      negate: false
  - view_external_id: CogniteAsset
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: asset
    include_properties:
    - name
    - labels
    filters:
    - operator: CONTAINSALL
      target_property: labels
      values:
      - critical
      - production
      negate: true
  - view_external_id: CogniteDocument
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: file
    batch_size: 25
    include_properties:
    - name
    - content
    filters:
    - operator: SEARCH
      target_property: content
      values: P&ID diagram
      negate: false

key_extraction:
  externalId: ctx_key_extraction_tag_token_reassembly
  config:
    parameters:
      debug: true
      verbose: true
      full_rescan: false
      raw_db: my_raw_database
      raw_table_key: key_extraction_state
    data:
      validation:
        min_confidence: 0.5
        max_keys_per_type: 1000
        confidence_match_rules:
        - name: blacklist
          priority: 10
          match:
            keywords:
            - test
            - example
            - sample
            - dummy
            - temp
            - temporary
            - 'null'
            - none
            - n/a
            - na
            - unknown
          confidence_modifier:
            mode: explicit
            value: 0.0
        - name: isa_compliant
          priority: 50
          match:
            expressions:
            - pattern: '\bP[-_]?\d{1,6}[A-Z]?\b'
              description: Standard pump tags (P-101, P101A, P-2001)
            - pattern: '\b[A-Z]{2,4}P[-_]?\d{1,6}[A-Z]?\b'
              description: Pump with service designation (FWP-101, CWP-201)
            - pattern: '\bCP[-_]?\d{1,6}[A-Z]?\b'
              description: Centrifugal pump tags
            - pattern: '\bC[-_]?\d{1,6}[A-Z]?\b'
              description: Standard compressor tags (C-101, C101A)
            - pattern: '\b[A-Z]{2}C[-_]?\d{1,6}[A-Z]?\b'
              description: Compressor with type designation (AC-101, RC-201)
            - pattern: '\b[A-Z]{2,3}V[-_]?\d{1,6}[A-Z]?\b'
              description: Control valve tags (FCV-101, PCV-201, TCV-301)
            - pattern: '\bV[-_]?\d{1,6}[A-Z]?\b'
              description: Manual valve and vessel tags (V-101, V101A)
            - pattern: '\b[A-Z]{2,3}SV[-_]?\d{1,6}[A-Z]?\b'
              description: Safety valve tags (PSV-101, TSV-201)
            - pattern: '\bT[-_]?\d{1,6}[A-Z]?\b'
              description: Standard tank tags (T-101, T101A)
            - pattern: '\bR[-_]?\d{1,6}[A-Z]?\b'
              description: Reactor tags (R-101, R101A)
            - pattern: '\bE[-_]?\d{1,6}[A-Z]?\b'
              description: Heat exchanger tags (E-101, E101A)
            - pattern: '\b[A-Z]{2}E[-_]?\d{1,6}[A-Z]?\b'
              description: Heat exchanger with type (HE-101, CE-201)
            - pattern: '\bF[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Flow instruments (FIC-101, FIT-201, FCV-301)
            - pattern: '\bP[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Pressure instruments (PIC-101, PIT-201, PCV-301)
            - pattern: '\bT[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Temperature instruments (TIC-101, TIT-201, TCV-301)
            - pattern: '\bL[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Level instruments (LIC-101, LIT-201, LCV-301)
            - pattern: '\bA[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Analytical instruments (AIC-101, AIT-201, ACV-301)
            - pattern: '\b[A-Z]?C[-_]?\d{1,6}[A-Z]?\b'
              description: Distillation column tags (C-101, DC-201)
          confidence_modifier:
            mode: explicit
            value: 1.0
        - name: not_isa_penalty
          priority: 1000
          match:
            expressions:
            - pattern: '(?s).*'
              description: Catch-all when no higher-priority rule matched; applies non-ISA penalty
          confidence_modifier:
            mode: offset
            value: -0.2
      field_selection_strategy: merge_all
      extraction_rules:
      - rule_id: tag_token_reassembly
        method: token reassembly
        priority: 25
        source_fields:
        - field_name: name
          field_type: string
          required: true
          priority: 1
          role: target
          max_length: 500
          preprocessing:
          - trim
          - uppercase
        - field_name: description
          field_type: string
          required: false
          priority: 2
          role: context
          max_length: 1000
          preprocessing:
          - trim
        config:
          tokenization:
            token_patterns:
            - name: site_code
              pattern: '[A-Z]{2,3}'
              position: 0
              required: true
              component_type: location
            - name: unit_number
              pattern: \d{2,4}
              position: 1
              required: true
              component_type: identifier
            - name: equipment_type
              pattern: '[A-Z]{1}'
              position: 2
              required: true
              component_type: type
            - name: equipment_number
              pattern: \d{2,4}
              position: 3
              required: true
              component_type: identifier
            - name: suffix
              pattern: '[A-Z]{1}'
              position: 4
              required: false
              component_type: modifier
            separator_patterns:
            - '-'
            - _
            - ' '
            - /
            max_tokens: 10
            min_tokens: 2
            cross_field_extraction_paths:
            - name
            - description
          assembly_rules:
          - name: FULL_TAG_WITH_SUFFIX
            format: '{site_code}-{unit_number}-{equipment_type}{equipment_number}{suffix}'
            priority: 10
            conditions:
              all_required_present: true
              suffix_present: true
          - name: FULL_TAG_NO_SUFFIX
            format: '{site_code}-{unit_number}-{equipment_type}{equipment_number}'
            priority: 20
            conditions:
              all_required_present: true
              suffix_missing: true
          - name: SIMPLE_TAG
            format: '{equipment_type}{equipment_number}'
            priority: 30
            conditions:
              min_token_count: 2
          validation:
            min_tokens: 2
            max_tokens: 6
            validate_assembled: true
            validation_pattern: ^[A-Z]{2,3}-\d{2,4}-[A-Z]\d{2,4}[A-Z]?$
