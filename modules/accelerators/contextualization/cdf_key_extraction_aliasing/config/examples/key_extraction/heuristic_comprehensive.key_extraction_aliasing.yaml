schemaVersion: 1
source_views:
  - view_external_id: CogniteEquipment
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: asset
    include_properties:
    - name
    - description
    - equipmentType
    - manufacturer
    - serialNumber
    filters:
    - operator: EQUALS
      target_property: equipmentType
      values: Pump
      negate: false
  - view_external_id: CogniteTimeSeries
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: timeseries
    batch_size: 50
    include_properties:
    - name
    - description
    - unit
    filters:
    - operator: IN
      target_property: type
      values:
      - temperature
      - pressure
      - flow
      negate: false
  - view_external_id: CogniteFile
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: file
    batch_size: 75
    include_properties:
    - name
    - mimeType
    filters:
    - operator: EXISTS
      target_property: uploaded
      negate: false
  - view_external_id: CogniteAsset
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: asset
    include_properties:
    - name
    - labels
    filters:
    - operator: CONTAINSALL
      target_property: labels
      values:
      - critical
      - production
      negate: true
  - view_external_id: CogniteDocument
    view_space: sp_enterprise_process_industry
    view_version: v1
    instance_space: sp_my_instance_space
    entity_type: file
    batch_size: 25
    include_properties:
    - name
    - content
    filters:
    - operator: SEARCH
      target_property: content
      values: P&ID diagram
      negate: false

key_extraction:
  externalId: ctx_key_extraction_tag_heuristic_comprehensive
  config:
    parameters:
      debug: true
      verbose: true
      full_rescan: false
      raw_db: my_raw_database
      raw_table_key: key_extraction_state
    data:
      validation:
        min_confidence: 0.5
        max_keys_per_type: 1000
        confidence_match_rules:
        - name: blacklist
          priority: 10
          match:
            keywords:
            - test
            - example
            - sample
            - dummy
            - temp
            - temporary
            - 'null'
            - none
            - n/a
            - na
            - unknown
          confidence_modifier:
            mode: explicit
            value: 0.0
        - name: isa_compliant
          priority: 50
          match:
            expressions:
            - pattern: '\bP[-_]?\d{1,6}[A-Z]?\b'
              description: Standard pump tags (P-101, P101A, P-2001)
            - pattern: '\b[A-Z]{2,4}P[-_]?\d{1,6}[A-Z]?\b'
              description: Pump with service designation (FWP-101, CWP-201)
            - pattern: '\bCP[-_]?\d{1,6}[A-Z]?\b'
              description: Centrifugal pump tags
            - pattern: '\bC[-_]?\d{1,6}[A-Z]?\b'
              description: Standard compressor tags (C-101, C101A)
            - pattern: '\b[A-Z]{2}C[-_]?\d{1,6}[A-Z]?\b'
              description: Compressor with type designation (AC-101, RC-201)
            - pattern: '\b[A-Z]{2,3}V[-_]?\d{1,6}[A-Z]?\b'
              description: Control valve tags (FCV-101, PCV-201, TCV-301)
            - pattern: '\bV[-_]?\d{1,6}[A-Z]?\b'
              description: Manual valve and vessel tags (V-101, V101A)
            - pattern: '\b[A-Z]{2,3}SV[-_]?\d{1,6}[A-Z]?\b'
              description: Safety valve tags (PSV-101, TSV-201)
            - pattern: '\bT[-_]?\d{1,6}[A-Z]?\b'
              description: Standard tank tags (T-101, T101A)
            - pattern: '\bR[-_]?\d{1,6}[A-Z]?\b'
              description: Reactor tags (R-101, R101A)
            - pattern: '\bE[-_]?\d{1,6}[A-Z]?\b'
              description: Heat exchanger tags (E-101, E101A)
            - pattern: '\b[A-Z]{2}E[-_]?\d{1,6}[A-Z]?\b'
              description: Heat exchanger with type (HE-101, CE-201)
            - pattern: '\bF[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Flow instruments (FIC-101, FIT-201, FCV-301)
            - pattern: '\bP[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Pressure instruments (PIC-101, PIT-201, PCV-301)
            - pattern: '\bT[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Temperature instruments (TIC-101, TIT-201, TCV-301)
            - pattern: '\bL[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Level instruments (LIC-101, LIT-201, LCV-301)
            - pattern: '\bA[A-Z]{1,3}[-_]?\d{1,6}[A-Z]?\b'
              description: Analytical instruments (AIC-101, AIT-201, ACV-301)
            - pattern: '\b[A-Z]?C[-_]?\d{1,6}[A-Z]?\b'
              description: Distillation column tags (C-101, DC-201)
          confidence_modifier:
            mode: explicit
            value: 1.0
        - name: not_isa_penalty
          priority: 1000
          match:
            expressions:
            - pattern: '(?s).*'
              description: Catch-all when no higher-priority rule matched; applies non-ISA penalty
          confidence_modifier:
            mode: offset
            value: -0.2
      field_selection_strategy: merge_all
      extraction_rules:
      - rule_id: tag_heuristic_comprehensive
        method: heuristic
        priority: 45
        source_fields:
        - field_name: name
          field_type: string
          required: true
          priority: 1
          role: target
          max_length: 500
          preprocessing:
          - trim
        - field_name: description
          field_type: string
          required: false
          priority: 2
          role: context
          max_length: 1000
          preprocessing:
          - trim
          - lowercase
        - field_name: equipmentType
          field_type: string
          required: false
          priority: 3
          role: context
          max_length: 100
          preprocessing:
          - trim
        config:
          name: TAG_HEURISTIC_COMPREHENSIVE
          current_node_id:
            space: sp_my_instance_space
            external_id: comprehensive_node_789
          heuristic_strategies:
          - strategy_id: position_analysis
            weight: 0.25
            method: positional_detection
            rules:
            - method: positional_detection
              position: start_of_field
              pattern: '[A-Z]{1,3}[-_]?\d{2,6}[A-Z]?'
              confidence_boost: 0.25
            - method: positional_detection
              position: after_keyword
              pattern: '[A-Z0-9-_]{3,20}'
              confidence_boost: 0.15
          - strategy_id: corpus_frequency
            weight: 0.25
            method: frequency_analysis
            rules:
            - analyze_corpus: true
              min_frequency: 3
              pattern_stability_threshold: 0.7
              common_prefix_detection: true
              common_suffix_detection: true
          - strategy_id: contextual_clues
            weight: 0.25
            method: context_inference
            rules:
            - surrounding_keywords:
                positive:
                - tag
                - equipment
                - instrument
                - id
                - identifier
                - code
                negative:
                - description
                - note
                - comment
                - remark
              context_window: 15
              keyword_proximity_bonus: 0.12
              equipment_type_correlation:
                enabled: true
                type_indicators:
                  pump:
                  - centrifugal
                  - positive displacement
                  - submersible
                  - reciprocating
                  valve:
                  - ball
                  - gate
                  - globe
                  - butterfly
                  - check
                  tank:
                  - storage
                  - pressure
                  - atmospheric
                  - holding
                  heat_exchanger:
                  - shell and tube
                  - plate
                  - air cooled
          - strategy_id: similarity_matching
            weight: 0.25
            method: example_based_learning
            rules:
            - learning_mode: similarity
              source_db: master_tag_database
              source_tbl: validated_equipment_tags
              similarity_threshold: 0.82
              feature_extraction:
                use_character_ngrams: true
                ngram_sizes:
                - 2
                - 3
                - 4
                - 5
                use_token_patterns: true
                use_position_features: true
                use_length_features: true
          scoring:
            aggregation_method: weighted_average
            min_confidence: 0.65
            normalize_scores: true
          confidence_modifiers:
          - condition: multiple_strategies_agree
            operator: '>=3'
            modifier: '+0.25'
          - condition: multiple_strategies_agree
            operator: '>=2'
            modifier: '+0.15'
          - condition: field_name_indicates_tag
            field_names:
            - tagId
            - equipmentTag
            - instrumentTag
            - assetTag
            - equipmentId
            modifier: '+0.1'
          - condition: extracted_value_length
            range:
            - 4
            - 18
            modifier: '+0.08'
          - condition: extracted_value_in_known_catalog
            catalog_source: validated_tags
            modifier: '+0.2'
          validation:
          - type: length_check
            min_length: 3
            max_length: 25
          - type: pattern_match
            pattern: ^[A-Z0-9-_/]+$
          - type: blacklist_check
            blacklist:
            - 'NULL'
            - N/A
            - UNKNOWN
            - TBD
            - NONE
            - TEST
          - type: similarity_check
            min_similarity_to_examples: 0.65
