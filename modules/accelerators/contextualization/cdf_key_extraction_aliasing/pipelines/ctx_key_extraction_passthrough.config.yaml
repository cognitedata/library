# Passthrough extraction: use the entire field value as the extracted key (no regex or parsing).
# Use when the source field already contains the identifier (e.g. name, externalId).
externalId: ctx_key_extraction_passthrough
config:
  parameters:
    debug: true
    run_all: true
    overwrite: true
    raw_db: db_key_extraction
    raw_table_state: key_extraction_state
    raw_table_key: passthrough_extracted_keys
  data:
    validation:
      min_confidence: 0.5
      max_keys_per_type: 1000
      blacklist_keywords:
        - "test"
        - "example"
        - "dummy"
    source_views:
      - view_external_id: CogniteAsset
        view_space: cdf_cdm
        view_version: v1
        instance_space: sp_enterprise_schema
        entity_type: asset
        batch_size: 100
        filters:
          - operator: CONTAINSANY
            target_property: tags
            values:
              - asset_tag
        include_properties:
          - externalId
          - name
          - description
          - tags

    extraction_rules:
      # Use asset name as candidate key with no parsing (entire value = key)
      - name: "name_as_candidate_key"
        method: "passthrough"
        extraction_type: "candidate_key"
        description: "Use name field value as the candidate key (no regex or parsing)"
        enabled: true
        priority: 50
        scope_filters:
          entity_type: ["asset"]
        parameters:
          min_confidence: 1.0   # optional; default 1.0
        source_fields:
          - field_name: "name"
            required: true
            max_length: 500
            field_type: string
            priority: 1
            role: target
            preprocessing:
              - trim
        field_selection_strategy: "first_match"
