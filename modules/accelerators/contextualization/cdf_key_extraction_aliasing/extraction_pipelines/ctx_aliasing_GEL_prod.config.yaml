# =============================================================================
# Geleen Aliasing Config
# Generated from: prod/geleen/config.yaml
# Targets: CogniteFile (resource_type=File), CogniteAsset (resource_type=Asset)
# Structure based on: ctx_aliasing_default.config.yaml
# =============================================================================

externalId: ctx_aliasing_GEL_prod
config:
  parameters:
    debug: true
    run_all: true
    overwrite: true
    raw_db: db_tag_aliasing
    raw_table_state: tag_aliasing_state_GEL
    raw_table_aliases: GEL_aliases
  data:
    aliasing_rules:

    # =========================================================================
    # FILE RULES (scope_filters: entity_type: [file])
    # Legacy: files_query_args detect/match_transformations, metadata_transformations
    # =========================================================================

    # File: RDP-PID <-> PPG-* OCR substitutions (legacy ocr_fix)
    # Legacy: object | ocr_fix({'RDP-PID': ['PPG-SYS', 'PPG-HAS', 'PPG-E25', 'PPG-UTI']})
    - name: geleen_file_rdp_ppg_ocr
      type: character_substitution
      description: "Geleen file OCR substitutions - RDP-PID <-> PPG-SYS, PPG-HAS, PPG-E25, PPG-UTI"
      enabled: true
      priority: 10
      preserve_original: true
      config:
        substitutions:
          "RDP-PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
          "RDP_PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
          "RDP PID": ["PPG-SYS", "PPG-HAS", "PPG-E25", "PPG-UTI"]
        cascade_substitutions: false
        max_aliases_per_input: 10
        bidirectional: true
      conditions: {}
      scope_filters:
        entity_type: [file]

    # File: Default OCR substitutions (from default_file_aliasing)
    # Legacy: default_file_aliasing includes ocr_fix({"A": ["W"], "8": ["B"]})
    - name: geleen_file_default_ocr
      type: character_substitution
      description: "Default OCR substitutions A<->W, 8<->B for files"
      enabled: true
      priority: 11
      preserve_original: true
      config:
        substitutions:
          A: [W]
          8: [B]
        cascade_substitutions: false
        max_aliases_per_input: 20
        bidirectional: true
      conditions: {}
      scope_filters:
        entity_type: [file]

    # File: Leading zero normalization (from default_file_aliasing)
    - name: geleen_file_leading_zero_normalization
      type: leading_zero_normalization
      description: "Strip leading zeros from numeric tokens in file tags"
      enabled: true
      priority: 75
      preserve_original: true
      config:
        preserve_single_zero: true
        min_length: 1
      conditions: {}
      scope_filters:
        entity_type: [file]

    # File: create_aliases infix variants (from default_file_aliasing)
    # Legacy: create_aliases with "", "-", "0", "00", "-0", "-00"
    # Delimit at first alpha-numeric boundary (handler uses match from start)
    - name: geleen_file_delimit_alpha_numeric_hyphen
      type: regex_substitution
      description: "Add hyphen at alpha-numeric boundaries (create_aliases infix '-')"
      enabled: true
      priority: 20
      preserve_original: true
      config:
        patterns:
          - pattern: "^([A-Za-z]+)([0-9].*)$"
            replacement: "\\1-\\2"
      conditions: {}
      scope_filters:
        entity_type: [file]

    - name: geleen_file_delimit_alpha_numeric_zero
      type: regex_substitution
      description: "Add '0' at alpha-numeric boundaries (create_aliases infix '0')"
      enabled: true
      priority: 21
      preserve_original: true
      config:
        patterns:
          - pattern: "^([A-Za-z]+)([0-9].*)$"
            replacement: "\\10\\2"
      conditions: {}
      scope_filters:
        entity_type: [file]

    - name: geleen_file_delimit_alpha_numeric_double_zero
      type: regex_substitution
      description: "Add '00' at alpha-numeric boundaries (create_aliases infix '00')"
      enabled: true
      priority: 22
      preserve_original: true
      config:
        patterns:
          - pattern: "^([A-Za-z]+)([0-9].*)$"
            replacement: "\\100\\2"
      conditions: {}
      scope_filters:
        entity_type: [file]

    - name: geleen_file_delimit_alpha_numeric_hyphen_zero
      type: regex_substitution
      description: "Add '-0' at alpha-numeric boundaries (create_aliases infix '-0')"
      enabled: true
      priority: 23
      preserve_original: true
      config:
        patterns:
          - pattern: "^([A-Za-z]+)([0-9].*)$"
            replacement: "\\1-0\\2"
      conditions: {}
      scope_filters:
        entity_type: [file]

    - name: geleen_file_delimit_alpha_numeric_hyphen_double_zero
      type: regex_substitution
      description: "Add '-00' at alpha-numeric boundaries (create_aliases infix '-00')"
      enabled: true
      priority: 24
      preserve_original: true
      config:
        patterns:
          - pattern: "^([A-Za-z]+)([0-9].*)$"
            replacement: "\\1-00\\2"
      conditions: {}
      scope_filters:
        entity_type: [file]

    # File: Remove non-alphanumeric (cleanse_string from create_aliases)
    # Uses capture groups to remove blocks of non-alphanumeric
    - name: geleen_file_cleanse
      type: regex_substitution
      description: "Remove non-alphanumeric characters (cleanse_string)"
      enabled: true
      priority: 5
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*)[^A-Za-z0-9]+(.*)$"
            replacement: "\\1\\2"
      conditions: {}
      scope_filters:
        entity_type: [file]

    # File: Document revision removal (from document_aliases / truncate_revision_suffix)
    - name: geleen_file_remove_revision_suffix
      type: regex_substitution
      description: "Remove revision suffixes (rX, vX, revX, verX) from file names"
      enabled: true
      priority: 60
      preserve_original: true
      config:
        patterns:
          - pattern: "(.*)((?:REV|VER|rev|ver)[A-Za-z0-9]{1,2})$"
            replacement: "\\1"
          - pattern: "(.*)((?:R|V|r|v)[A-Za-z0-9]{1,2})$"
            replacement: "\\1"
      conditions: {}
      scope_filters:
        entity_type: [file]

    # =========================================================================
    # ASSET RULES (scope_filters: entity_type: [asset])
    # Legacy: assets_query_args, name_transformations
    # =========================================================================

    # Asset: Instrument-type OCR substitutions (legacy ocr_fix)
    # Legacy: ocr_fix({"FT": ["FC","FE","FI"], "LT": [...], "PT": [...], ...})
    - name: geleen_asset_instrument_ocr
      type: character_substitution
      description: "Geleen asset instrument-type OCR substitutions"
      enabled: true
      priority: 10
      preserve_original: true
      config:
        substitutions:
          FT: [FC, FE, FI]
          LT: [LC, LE, LI]
          PT: [PC, PE, PI]
          ST: [SC, SE, SI]
          TT: [TC, TE, TI]
          VE: [VO, VC]
          WT: [WC, WE, WI]
        cascade_substitutions: false
        max_aliases_per_input: 30
        bidirectional: true
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Asset: Add suffix A/B/C/O/S/R after 6 digits (infix_string_pattern)
    # Legacy: infix_string_pattern("(?<=[0-9]{6}$)", ["A", "B", "C", "O", "S", "R"])
    - name: geleen_asset_6digit_suffix_variants
      type: regex_substitution
      description: "Add A,B,C,O,S,R suffix after 6-digit codes"
      enabled: true
      priority: 15
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*)(\\d{6})$"
            replacement: "\\1\\2A"
          - pattern: "^(.*)(\\d{6})$"
            replacement: "\\1\\2B"
          - pattern: "^(.*)(\\d{6})$"
            replacement: "\\1\\2C"
          - pattern: "^(.*)(\\d{6})$"
            replacement: "\\1\\2O"
          - pattern: "^(.*)(\\d{6})$"
            replacement: "\\1\\2S"
          - pattern: "^(.*)(\\d{6})$"
            replacement: "\\1\\2R"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Asset: Remove -SIS suffix (replace_string_pattern)
    # Legacy: replace_string_pattern("[-]?[S][I][S]$", [""])
    - name: geleen_asset_remove_sis_suffix
      type: regex_substitution
      description: "Remove -SIS or SIS suffix from asset tags"
      enabled: true
      priority: 25
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*)[-]?SIS$"
            replacement: "\\1"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Asset: Remove trailing single letter after digit (replace_string_pattern)
    # Legacy: replace_string_pattern("(?<=[0-9])[A-Z]{1}$", [""])
    - name: geleen_asset_remove_trailing_letter
      type: regex_substitution
      description: "Remove trailing single letter after digit"
      enabled: true
      priority: 26
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*\\d)([A-Z])$"
            replacement: "\\1"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Asset: Insert unit infixes (infix_string_pattern)
    # Legacy: infix_string_pattern("(?<=[a-zA-Z])(?=[0-9]{4,6})", ["-CSB1-", "-SSPT-", "-CSA1-", "-SSND-", "-SSSF-", "-SSB1-"])
    - name: geleen_asset_unit_infix_csb1
      type: regex_substitution
      description: "Insert -CSB1- at alpha-to-numeric boundary (4-6 digits)"
      enabled: true
      priority: 30
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$"
            replacement: "\\1-CSB1-\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    - name: geleen_asset_unit_infix_sspt
      type: regex_substitution
      description: "Insert -SSPT- at alpha-to-numeric boundary"
      enabled: true
      priority: 31
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$"
            replacement: "\\1-SSPT-\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    - name: geleen_asset_unit_infix_csa1
      type: regex_substitution
      description: "Insert -CSA1- at alpha-to-numeric boundary"
      enabled: true
      priority: 32
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$"
            replacement: "\\1-CSA1-\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    - name: geleen_asset_unit_infix_ssnd
      type: regex_substitution
      description: "Insert -SSND- at alpha-to-numeric boundary"
      enabled: true
      priority: 33
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$"
            replacement: "\\1-SSND-\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    - name: geleen_asset_unit_infix_sssf
      type: regex_substitution
      description: "Insert -SSSF- at alpha-to-numeric boundary"
      enabled: true
      priority: 34
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$"
            replacement: "\\1-SSSF-\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    - name: geleen_asset_unit_infix_ssb1
      type: regex_substitution
      description: "Insert -SSB1- at alpha-to-numeric boundary"
      enabled: true
      priority: 35
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*[A-Za-z])([0-9]{4,6}.*)$"
            replacement: "\\1-SSB1-\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Asset: Default OCR (from default_asset_aliasing)
    - name: geleen_asset_default_ocr
      type: character_substitution
      description: "Default OCR substitutions A<->W, 8<->B for assets"
      enabled: true
      priority: 11
      preserve_original: true
      config:
        substitutions:
          A: [W]
          8: [B]
        cascade_substitutions: false
        max_aliases_per_input: 20
        bidirectional: true
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Asset: Leading zero normalization (from default_asset_aliasing)
    - name: geleen_asset_leading_zero_normalization
      type: leading_zero_normalization
      description: "Strip leading zeros from numeric tokens in asset tags"
      enabled: true
      priority: 76
      preserve_original: true
      config:
        preserve_single_zero: true
        min_length: 1
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Asset: create_aliases delimit variants (from default_asset_aliasing)
    - name: geleen_asset_delimit_alpha_numeric_hyphen
      type: regex_substitution
      description: "Add hyphen at alpha-numeric boundaries"
      enabled: true
      priority: 20
      preserve_original: true
      config:
        patterns:
          - pattern: "^([A-Za-z]+)([0-9].*)$"
            replacement: "\\1-\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    - name: geleen_asset_delimit_alpha_numeric_zero
      type: regex_substitution
      description: "Add '0' at alpha-numeric boundaries"
      enabled: true
      priority: 21
      preserve_original: true
      config:
        patterns:
          - pattern: "^([A-Za-z]+)([0-9].*)$"
            replacement: "\\10\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    - name: geleen_asset_cleanse
      type: regex_substitution
      description: "Remove non-alphanumeric characters"
      enabled: true
      priority: 5
      preserve_original: true
      config:
        patterns:
          - pattern: "^(.*)[^A-Za-z0-9]+(.*)$"
            replacement: "\\1\\2"
      conditions: {}
      scope_filters:
        entity_type: [asset]

    # Shared: separator variants (hyphen, underscore, empty)
    - name: geleen_separator_variants
      type: character_substitution
      description: "Generate hyphen/underscore/empty separator variants"
      enabled: true
      priority: 12
      preserve_original: true
      config:
        substitutions:
          "-": ["_", ""]
          "_": ["-", ""]
        cascade_substitutions: false
        max_aliases_per_input: 15
        bidirectional: false
      conditions: {}
      scope_filters:
        entity_type: [file, asset]

    validation:
      max_aliases_per_tag: 50
      min_alias_length: 2
      max_alias_length: 100
      allowed_characters: "A-Za-z0-9-_/. "
