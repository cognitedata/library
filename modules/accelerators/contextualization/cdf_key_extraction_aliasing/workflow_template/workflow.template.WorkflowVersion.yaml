# Reference document only: shipped ``workflows/**.WorkflowVersion.yaml`` is generated by
# ``scripts/build_scopes.py`` from build-time ``compiled_workflow`` IR (``build_workflow_version_document``).
# v5: Node-per-task canvas-driven workflow; each task uses stable task externalId (kea__*).
# Function payloads include task_id plus inlined IR fields (payload, persistence); trigger supplies configuration only.
# Scope rules remain in workflow.input.configuration (trimmed unified document).
# Template: __KEA_WORKFLOW_EXTERNAL_ID__ → must match sibling Workflow externalId.
workflowExternalId: __KEA_WORKFLOW_EXTERNAL_ID__
version: 'v5'
workflowDefinition:
  description: >-
    Canvas-driven key extraction and aliasing (node-per-task). Each task passes task_id
    plus inlined payload/persistence from build-time IR; workflow.input carries configuration only.
  input:
    run_all: false
    run_id: ''
    configuration: {}
  tasks:
    - externalId: kea__incremental_state
      type: function
      parameters:
        function:
          externalId: fn_dm_incremental_state_update
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__incremental_state
      name: Incremental state (cohort)
      description: >-
        Detect changed CDM instances per source_views and write cohort rows to RAW (RUN_ID, WORKFLOW_STATUS),
        or no-op when incremental_change_processing is false (stable DAG).
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow

    - externalId: kea__key_extraction
      type: function
      parameters:
        function:
          externalId: fn_dm_key_extraction
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__key_extraction
      name: Key extraction
      description: >-
        Extract candidate keys and foreign-key references from assets, files, and timeseries;
        write key-extraction RAW rows.
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow
      dependsOn:
        - externalId: kea__incremental_state

    - externalId: kea__inverted_index
      type: function
      parameters:
        function:
          externalId: fn_dm_inverted_index
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__inverted_index
      name: Inverted index
      description: >-
        Build RAW inverted index for FK and document references from key-extraction output.
        Skips RAW writes when enable_inverted_index is false in merged task persistence.
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow
      dependsOn:
        - externalId: kea__key_extraction

    - externalId: kea__aliasing
      type: function
      parameters:
        function:
          externalId: fn_dm_aliasing
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__aliasing
      name: Aliasing
      description: >-
        Apply aliasing_rules to extracted keys: read key-extraction RAW, run AliasingEngine,
        write tag-aliasing RAW.
      retries: 3
      timeout: 7200
      onFailure: abortWorkflow
      dependsOn:
        - externalId: kea__key_extraction

    - externalId: kea__alias_persistence
      type: function
      parameters:
        function:
          externalId: fn_dm_alias_persistence
          data:
            logLevel: INFO
            run_all: ${workflow.input.run_all}
            configuration: ${workflow.input.configuration}
            task_id: kea__alias_persistence
      name: Alias persistence
      description: >-
        Read aliasing RAW and write aliases onto source instances (alias_writeback_property).
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: kea__aliasing
