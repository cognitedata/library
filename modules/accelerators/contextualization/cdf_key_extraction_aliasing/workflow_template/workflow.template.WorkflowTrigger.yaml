# One schedule trigger per leaf: build_scopes replaces __KEA_CDF_SUFFIX__ with cdf_external_id_suffix(scope_id).
# Scope rules are under input.configuration (from workflow.template.config.yaml, patched per leaf).
# validation_rule_definitions / confidence_match_rule_sequences are expanded in functions before engines run.
# Schedule cron is literal here (aligned with default.config.yaml key_extraction_aliasing_schedule).
# Toolkit substitutes {{instance_space}} (and other tokens) inside configuration at cdf deploy.
# Trigger OAuth client id/secret are not stored here: ``deploy_scope_cdf.py`` injects them from
# env (KEA_WORKFLOW_TRIGGER_CLIENT_* or IDP_CLIENT_* / COGNITE_CLIENT_*) when upserting to CDF.
# Optional root `name`: operator UI label in the Configure sidebar (remove if your Toolkit rejects extra keys).
name: ''
externalId: key_extraction_aliasing.__KEA_CDF_SUFFIX__
triggerRule:
  triggerType: schedule
  cronExpression: '0 2 * * *'
workflowExternalId: {{ workflow }}
workflowVersion: v5
input:
  run_all: false
  run_id: ''
  compiled_workflow: {}
