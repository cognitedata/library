# Token Proxy Environment Variables (template)
# Copy this file to token-proxy/.env for local runs.
# The proxy runtime reads token-proxy/.env.
# Keep real secrets out of git.
TOKEN_PROXY_PORT=7071
CDF_CLUSTER=<YOUR_CDF_CLUSTER>
IDP_TENANT_ID=<YOUR_IDP_TENANT_ID>

# Optional
IDP_TOKEN_URL=https://login.microsoftonline.com/<YOUR_IDP_TENANT_ID>/oauth2/v2.0/token
IDP_SCOPES=https://<YOUR_CDF_CLUSTER>.cognitedata.com/.default

# Optional (local troubleshooting only)
# If your corporate TLS chain blocks local tests, uncomment temporarily.
# Never use this in CI/CD or production.
# Set this in token-proxy/.env only for short-lived local troubleshooting sessions.
# NODE_TLS_REJECT_UNAUTHORIZED=<LOCAL_TEST_ONLY>

# Dev/Test Client Credentials
IDP_CLIENT_ID=<YOUR_IDP_CLIENT_ID>
IDP_CLIENT_SECRET=<YOUR_IDP_CLIENT_SECRET>

# # Prod Client Credentials
# IDP_CLIENT_ID=<YOUR_IDP_CLIENT_ID>
# IDP_CLIENT_SECRET=<YOUR_IDP_CLIENT_SECRET>

