name: "grp_{{location}}_workflow_user"
sourceId: "{{workflowUserGroupSourceId}}"
metadata:
  origin: cdf-project-templates
capabilities:
  - projectsAcl:
      actions: [READ, LIST]
      scope:
        all: {}
  - workflowOrchestrationAcl:
      actions: [READ, WRITE]
      scope:
        datasetScope:
          ids: ["{{dataset}}"]
  - datasetsAcl:
      actions: [READ]
      scope:
        all: {}
