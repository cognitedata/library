- workflowExternalId: wf_{{location}}_ingestion
  version: v1
  workflowDefinition:
    description: 'GENERATED by scripts/build_workflow.py — do not edit by hand. Enabled
      sources: {''pi'': True, ''opcua'': False, ''sap'': True}. DM variant: isa_manufacturing_extension.'
    tasks:
    - externalId: task_pi_timeseries
      type: transformation
      name: 'PI: TimeSeries → ISATimeSeries'
      description: Promote PI ExtractorTimeSeries instances to ISATimeSeries DM nodes
        (direct-write, no RAW staging)
      parameters:
        transformation:
          externalId: tr_pi_timeseries_{{location}}_to_isa
          concurrencyPolicy: fail
      retries: 1
      timeout: 1800
      onFailure: abortWorkflow
    - externalId: task_sap_assets
      type: transformation
      name: 'SAP: Functional Locations → ISAAsset'
      description: Transform SAP functional locations from RAW into ISAAsset DM instances
      parameters:
        transformation:
          externalId: tr_sap_assets_{{location}}_to_isa
          concurrencyPolicy: fail
      retries: 1
      timeout: 1800
      onFailure: abortWorkflow
    - externalId: task_sap_equipment
      type: transformation
      name: 'SAP: Equipment → Equipment'
      description: Transform SAP equipment master records from RAW into Equipment
        DM instances
      dependsOn:
      - externalId: task_sap_assets
      parameters:
        transformation:
          externalId: tr_sap_equipment_{{location}}_to_isa
          concurrencyPolicy: fail
      retries: 1
      timeout: 1800
      onFailure: abortWorkflow
    - externalId: task_sap_maintenance_orders
      type: transformation
      name: 'SAP: Work Orders → WorkOrder'
      description: Transform SAP work orders from RAW into WorkOrder DM instances
      dependsOn:
      - externalId: task_sap_assets
      parameters:
        transformation:
          externalId: tr_sap_maintenance_orders_{{location}}_to_isa
          concurrencyPolicy: fail
      retries: 1
      timeout: 1800
      onFailure: abortWorkflow
    - externalId: task_sap_operations
      type: transformation
      name: 'SAP: Work Tasks → Operation'
      description: Transform SAP work tasks from RAW into Operation DM instances
      dependsOn:
      - externalId: task_sap_maintenance_orders
      parameters:
        transformation:
          externalId: tr_sap_operations_{{location}}_to_isa
          concurrencyPolicy: fail
      retries: 1
      timeout: 1800
      onFailure: abortWorkflow
    - externalId: ctx_isa_equipment_to_asset
      type: transformation
      name: 'CTX: Equipment → Asset relation'
      description: Set Equipment.asset property linking each equipment to its functional
        location ISAAsset
      dependsOn:
      - externalId: task_sap_assets
      - externalId: task_sap_equipment
      parameters:
        transformation:
          externalId: tr_sap_equipment_{{location}}_to_asset
          concurrencyPolicy: fail
      retries: 1
      timeout: 1800
      onFailure: abortWorkflow
    - externalId: ctx_isa_operation_to_order
      type: transformation
      name: 'CTX: Operation → WorkOrder relation'
      description: Set Operation.workOrder property linking each operation to its
        parent work order
      dependsOn:
      - externalId: task_sap_maintenance_orders
      - externalId: task_sap_operations
      parameters:
        transformation:
          externalId: tr_sap_operation_{{location}}_to_order
          concurrencyPolicy: fail
      retries: 1
      timeout: 1800
      onFailure: abortWorkflow
