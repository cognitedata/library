# Optional site segment for access-group names (e.g. "oslo"). Leave blank to omit.
site: ""

# Dataset used to scope the foundation access group ACLs.
# Must match the dataset used by the source system modules.
dataset: "ds_ingestion"

# Computed by scripts/setup_project.py per environment as <persona>[-<site>]-<env>
# where env is "dev" (covers dev + test) or "prod". These defaults are the
# no-site dev values; setup_project.py overrides them in each config.<env>.yaml.
consumerGroupName: "consumer-dev"
producerGroupName: "producer-dev"
adminGroupName: "admin-dev"

# Object ID of the Entra ID security group mapped to each persona (SOP Step 3d).
# These are object IDs, not secrets — safe to template, left blank by default.
# Populate per environment after the Entra ID groups have been created.
consumerSourceId: ""    # read-only consumers
producerSourceId: ""    # read/write ingestion producers
adminSourceId: ""       # foundation administrators

# Schema space where the selected data model views are defined.
# Generic across variants: sp_isa_manufacturing (ISA) or dm_dom_oil_and_gas (CHIFO).
# Synced by scripts/setup_project.py from the installed data model variant.
schemaSpace: "sp_isa_manufacturing"

# Space where DM instances (ISAAsset, Equipment, FunctionalLocation, …) are written.
# Must match the instanceSpace used by the source system modules.
instanceSpace: "sp_isa_instance_space"

# Data model variant — controls which schema/instance spaces are synced.
# Supported: isa_manufacturing_extension | cfihos_oil_and_gas_extension
dataModelVariant: isa_manufacturing_extension
