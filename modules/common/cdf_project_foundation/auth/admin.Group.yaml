# Admin persona — full capabilities including groups:write.
name: "{{ adminGroupName }}"
sourceId: "{{ adminSourceId }}"
metadata:
  origin: cdf-project-templates
capabilities:
  - projectsAcl:
      actions: [READ, LIST, UPDATE]
      scope:
        all: {}
  - groupsAcl:
      actions: [LIST, READ, CREATE, UPDATE, DELETE]
      scope:
        all: {}
  - sessionsAcl:
      actions: [LIST, CREATE, DELETE]
      scope:
        all: {}
  - datasetsAcl:
      actions: [READ, WRITE, OWNER]
      scope:
        all: {}
  - dataModelsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - dataModelInstancesAcl:
      actions: [READ, WRITE, WRITE_PROPERTIES]
      scope:
        all: {}
  - timeSeriesAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - filesAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - rawAcl:
      actions: [READ, WRITE, LIST]
      scope:
        all: {}
  - transformationsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - workflowOrchestrationAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - extractionPipelinesAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - extractionConfigsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - extractionRunsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - functionsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - entitymatchingAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
