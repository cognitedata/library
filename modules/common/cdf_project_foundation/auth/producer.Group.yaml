# Producer persona — read/write on needed resources.
name: "{{ producerGroupName }}"
sourceId: "{{ producerSourceId }}"
metadata:
  origin: cdf-project-templates
capabilities:
  - projectsAcl:
      actions: [READ, LIST]
      scope:
        all: {}
  - sessionsAcl:
      actions: [CREATE]
      scope:
        all: {}
  - datasetsAcl:
      actions: [READ]
      scope:
        idScope:
          ids: {{ dataset }}
  - dataModelsAcl:
      actions: [READ, WRITE]
      scope:
        spaceIdScope:
          spaceIds: ["{{ schemaSpace }}", "{{ instanceSpace }}"]
  - dataModelInstancesAcl:
      actions: [READ, WRITE]
      scope:
        spaceIdScope:
          spaceIds: {{ instanceSpaces }}
  - timeSeriesAcl:
      actions: [READ, WRITE]
      scope:
        datasetScope:
          ids: {{ dataset }}
  - filesAcl:
      actions: [READ, WRITE]
      scope:
        datasetScope:
          ids: {{ dataset }}
  - rawAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - transformationsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - workflowOrchestrationAcl:
      actions: [READ, WRITE]
      scope:
        datasetScope:
          ids: {{ dataset }}
  - extractionPipelinesAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - extractionConfigsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
  - extractionRunsAcl:
      actions: [READ, WRITE]
      scope:
        all: {}
