# Generated by cdf_project_foundation — deploy to {{ENTERPRISE}}-test on merge to main.
name: Toolkit Deploy Test

on:
  push:
    branches:
      - main

concurrency:
  group: toolkit-deploy-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to {{ENTERPRISE}}-test
    runs-on: ubuntu-latest
    environment: test-toolkit-credentials
    env:
      CDF_CLUSTER: ${{ vars.CDF_CLUSTER }}
      CDF_PROJECT: ${{ vars.CDF_PROJECT }}
      LOGIN_FLOW: ${{ vars.LOGIN_FLOW }}
      IDP_TENANT_ID: ${{ vars.IDP_TENANT_ID }}
      IDP_CLIENT_ID: ${{ vars.IDP_CLIENT_ID }}
      IDP_CLIENT_SECRET: ${{ secrets.IDP_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Toolkit configs
        run: bash .github/scripts/prepare-toolkit-project.sh

      - name: Remove local .env
        run: rm -f .env

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Cognite Toolkit
        run: pip install "cognite-toolkit=={{TOOLKIT_VERSION}}" pyyaml

      - name: cdf build
        run: cdf build --env test

      - name: cdf deploy
        run: cdf deploy --env test
