name: Toolkit PR Validate

on:
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: toolkit-pr-${{ github.head_ref }}-${{ github.base_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  source-branch-guard:
    name: Source branch guardrail
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Enforce promotion flow (main ← dev or hotfix/* only)
        env:
          HEAD: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [ "${HEAD}" != "dev" ] && [[ "${HEAD}" != hotfix/* ]]; then
            echo "::error::PRs to 'main' must come from 'dev' or 'hotfix/*' only (head: ${HEAD})"
            exit 1
          fi
          echo "Promotion flow OK: ${HEAD} -> main"

  lint:
    name: Lint (ruff, pyright, config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install lint dependencies
        run: pip install pre-commit pyyaml

      - name: Validate workflow YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in (
              ".github/workflows/dry-run.yml",
              ".github/workflows/deploy-dev.yml",
              ".github/workflows/deploy-test.yml",
              ".github/workflows/deploy-prod.yml",
          ):
              yaml.safe_load(Path(path).read_text())
              print(f"valid yaml: {path}")
          PY

      - name: Config lint (Toolkit templates; skip strict YAML on modules)
        env:
          SKIP: check-yaml,end-of-file-fixer,trailing-whitespace
        run: |
          mapfile -t FILES < <(git ls-files \
            {{LINT_PATHS}})
          if [ "${#FILES[@]}" -gt 0 ]; then
            pre-commit run --files "${FILES[@]}"
          fi

  cdf-dry-run:
    name: cdf build & deploy --dry-run
    needs:
      - source-branch-guard
      - lint
    if: >-
      always() &&
      needs.lint.result == 'success' &&
      (github.base_ref == 'dev' || needs.source-branch-guard.result == 'success')
    runs-on: ubuntu-latest
    environment: ${{ github.base_ref == 'dev' && 'dev-toolkit-credentials' || 'test-toolkit-credentials' }}
    env:
      CDF_CLUSTER: ${{ vars.CDF_CLUSTER }}
      CDF_PROJECT: ${{ vars.CDF_PROJECT }}
      LOGIN_FLOW: ${{ vars.LOGIN_FLOW }}
      IDP_TENANT_ID: ${{ vars.IDP_TENANT_ID }}
      IDP_CLIENT_ID: ${{ vars.IDP_CLIENT_ID }}
      ADMIN_SOURCE_ID: ${{ vars.ADMIN_SOURCE_ID }}
      CONSUMER_SOURCE_ID: ${{ vars.CONSUMER_SOURCE_ID }}
      PRODUCER_SOURCE_ID: ${{ vars.PRODUCER_SOURCE_ID }}
      IDP_CLIENT_SECRET: ${{ secrets.IDP_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Remove local .env
        run: rm -f .env

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Cognite Toolkit
        run: pip install "cognite-toolkit=={{TOOLKIT_VERSION}}" pyyaml

      - name: cdf build
        id: build
        run: |
          ENV="${{ github.base_ref == 'dev' && 'dev' || 'test' }}"
          cdf build --env "${ENV}" | tee build-output.txt

      - name: cdf deploy --dry-run
        id: deploy
        run: |
          ENV="${{ github.base_ref == 'dev' && 'dev' || 'test' }}"
          cdf deploy --dry-run --env "${ENV}" | tee dryrun-output.txt

      - name: Comment PR with dry-run output
        if: always() && github.event_name == 'pull_request' && (steps.build.outcome == 'success' || steps.build.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const buildOutput = fs.existsSync('build-output.txt')
              ? fs.readFileSync('build-output.txt', 'utf8')
              : 'Build step did not run or produce output.';
            const dryrunOutput = fs.existsSync('dryrun-output.txt')
              ? fs.readFileSync('dryrun-output.txt', 'utf8')
              : 'Dry-run step did not run or produce output.';
            const buildSuccess = '${{ steps.build.outcome }}' === 'success';
            const deploySuccess = '${{ steps.deploy.outcome }}' === 'success';
            const header = buildSuccess && deploySuccess
              ? '✅ Toolkit dry-run finished — review before merging'
              : '❌ Toolkit dry-run failed — please check the errors';
            const marker = '<!-- toolkit-dry-run-marker -->';
            const body = [
              marker,
              header,
              '',
              '<details><summary>Build output</summary>',
              '',
              '```',
              buildOutput.slice(-12000),
              '```',
              '',
              '</details>',
              '',
              '<details><summary>Deploy dry-run output</summary>',
              '',
              '```',
              dryrunOutput.slice(-12000),
              '```',
              '',
              '</details>',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
