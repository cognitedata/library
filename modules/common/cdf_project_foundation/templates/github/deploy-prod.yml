name: Toolkit Deploy Prod

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to {{ENTERPRISE}}-prod
    runs-on: ubuntu-latest
    environment: prod-toolkit-credentials
    env:
      CDF_CLUSTER: ${{ vars.CDF_CLUSTER }}
      CDF_PROJECT: ${{ vars.CDF_PROJECT }}
      LOGIN_FLOW: ${{ vars.LOGIN_FLOW }}
      IDP_TENANT_ID: ${{ vars.IDP_TENANT_ID }}
      IDP_CLIENT_ID: ${{ vars.IDP_CLIENT_ID }}
      IDP_CLIENT_SECRET: ${{ secrets.IDP_CLIENT_SECRET }}
    steps:
      - name: Reject releases not created from main
        run: |
          if [ "${{ github.event.release.target_commitish }}" != "main" ]; then
            echo "::error::Production releases must be published from branch main"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Remove local .env
        run: rm -f .env

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Cognite Toolkit
        run: pip install "cognite-toolkit=={{TOOLKIT_VERSION}}" pyyaml

      - name: cdf build
        run: cdf build --env prod

      - name: cdf deploy
        run: cdf deploy --env prod
