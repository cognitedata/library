space: '{{space}}'
externalId: FunctionalLocation
name: Functional Location
description: >
  A hierarchical location in the plant structure where equipment is installed
  and maintained. FunctionalLocationProperties are typically sourced from ERP
  or maintenance systems such as SAP or IFS.
implements:
- space: cdf_cdm
  externalId: CogniteDescribable
  version: v1
  type: view
version: '{{dm_version}}'
properties:
  name:
    name: Name
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: name
    description: Human-readable name of the functional location.
  description:
    name: Description
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: description
    description: Textual description of the functional location.
  tags:
    name: Tags
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: tags
    description: Text-based labels for generic use, limited to 1000.
  aliases:
    name: Aliases
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: aliases
    description: Alternative names or identifiers for this functional location.
  workOrderOperations:
    name: Work Order Operations
    source:
      space: '{{space}}'
      externalId: WorkOrderOperation
      version: '{{dm_version}}'
      type: view
    through:
      source:
        space: '{{space}}'
        externalId: WorkOrderOperation
        version: '{{dm_version}}'
        type: view
      identifier: functionalLocation
    description: Work order operations whose functionalLocation relation points to this
      functional location (reverse traversal from operation to location).
    connectionType: multi_reverse_direct_relation
  area:
    name: Area
    container:
      space: '{{space}}'
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000001
    description: Physical location on the facility where the equipment is installed
  facility:
    name: Facility
    container:
      space: '{{space}}'
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000005
    description: The facility code of a tagged object
  parentTag:
    name: Parent Tag
    container:
      space: '{{space}}'
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000178
    description: The main Tag number of a system that child Tags are related
  system:
    name: System
    container:
      space: '{{space}}'
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000157
    description: System code as per the used standard
  labels:
    name: Labels
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: tags
    description: Text based labels for generic use, limited to 1000
