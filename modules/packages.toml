The open-source Github repository ("Repository") is provided "as is", without warranty of any kind, express or implied, including but not limited to the warranties of merchantability, fitness for a particular purpose, and non-infringement. Usage of the Repository is voluntary and in no event shall Cognite be liable for any claim, damages, or other liability, whether in an action of contract, tort, or otherwise, arising from, out of, or in connection with the use of the Repository.
"""


[packages.contextualization]
id = "dp:contextualization"
title = "Contextualization"
description = "Module templates for data contextualization"
canCherryPick = true
modules = [
    "contextualization/cdf_p_and_id_annotation",
    "contextualization/cdf_p_and_id_parser",
    "contextualization/cdf_file_annotation",
    "contextualization/cdf_entity_matching",
    "contextualization/cdf_connection_sql",
]

[packages.infield]
id = "dp:infield"
title = "Infield"
description = "Deploy Infield configuration modules for CDM-backed locations."
canCherryPick = true
modules = [
    "infield/location",
]

[packages.cdm_maintain]
id = "dp:cdm_maintain"
title = "CDM Maintain"
description = "Complete Maintain deployment package with data models, locations, and sample data"
canCherryPick = false
modules = [
    "solutions/cdm_maintain/cdf_maintain_config_base",
    "solutions/cdm_maintain/cdf_maintain_location",
    "solutions/cdm_maintain/cdf_maintain_solution_model",
    "solutions/cdm_maintain/cdf_maintain_source_data_model",
    "solutions/cdm_maintain/cdf_sample_data",
]

[packages.models]
id = "dp:models"
title = "Data models"
description = "Data models that extend the core data model"
canCherryPick = true
modules = [
    "data_models/rmdm",
    "data_models/isa_manufacturing_extension",
    "data_models/cdf_process_industry_extension",
    "data_models/qs_enterprise_dm",
    "data_models/cfihos_oil_and_gas_extension",
    "data_models/cfihos_oil_and_gas_extension_search",
]



[packages.atlas_ai]
id = "dp:atlas_ai"
title = "Atlas AI Deployment Pack"
description = "Deploy all Atlas AI modules in one package."
canCherryPick = true
modules = [
    "atlas_ai/ootb_agents",
    "solutions/cdf_ai_extractor",
]

[packages.dashboards]
id = "dp:dashboards"
title = "Dashboards"
description = "Streamlit dashboards and visualization modules"
canCherryPick = true
modules = [
    "dashboards/context_quality",
    "dashboards/project_health",
    "dashboards/report_quality",
]

[packages.quickstartdp]
id = "dp:quickstart"
title = "Quickstart Deployment Pack"
description = "DP to showcase CDF capabilities in a quick and easy way."
canCherryPick = false
modules = [
    "common/cdf_common",
    "common/cdf_ingestion",
    "contextualization/cdf_file_annotation",
    "contextualization/cdf_entity_matching",
    "contextualization/cdf_connection_sql",
    "common/cdf_search",
    "sourcesystem/cdf_oid_sync",
    "sourcesystem/cdf_pi",
    "sourcesystem/cdf_sap_assets",
    "sourcesystem/cdf_sap_events",
    "sourcesystem/cdf_sharepoint",
    "dashboards/report_quality",
    "data_models/qs_enterprise_dm",
]

[packages.sourcesystem]
id = "dp:sourcesystem"
title = "Source Systems"
description = "Source systems modules"
canCherryPick = true
modules = [
    "sourcesystem/cdf_pi",
    "sourcesystem/cdf_sap_assets",
    "sourcesystem/cdf_sap_events",
    "sourcesystem/cdf_sharepoint",
    "sourcesystem/cdf_oid_sync",
]

[packages.common]
id = "dp:common"
title = "Common"
description = "Common CDF platform modules"
canCherryPick = true
modules = [
    "common/cdf_common",
    "common/cdf_ingestion",
    "common/cdf_search",
]

[packages.tools]
id = "tool"
title = "Tools and Accelerators"
description = "Tools and accelerators for CDF projects"
canCherryPick = true
modules = [
    "tools/notebooks/cdf_performance_testing",
    "tools/notebooks/cdf_transformation_jobs_metric_explorer",
    "tools/apps/qualitizer",
]

[packages.foundation]
id = "dp:foundation"
title = "Foundation Deployment Pack"
description = "A scalable, modular foundation for industrial CDF projects. Near zero-config start with ISA Manufacturing Extension or CFIHOS Oil & Gas DM, production-grade extractor config templates for PI, OPC-UA, SAP, DB, and file sources, modular ingestion orchestration, and contextualization."
canCherryPick = true
modules = [
    # Data models — choose one or both
    "models/isa_manufacturing_extension",
    "models/cfihos_oil_and_gas_extension",
    # Source systems — deploy the ones matching your site
    "sourcesystem/cdf_pi_foundation",
    "sourcesystem/cdf_opcua_foundation",
    "sourcesystem/cdf_sap_foundation",
    "sourcesystem/cdf_db_foundation",
    "sourcesystem/cdf_files_foundation",
    # Ingestion orchestration
    "foundation/cdf_ingestion_foundation",
    # Contextualization
    "accelerators/contextualization/cdf_file_annotation",
    "accelerators/contextualization/cdf_entity_matching",
    # Quality tooling
    "tools/apps/qualitizer",
]

[packages.custom]
id = "dp:emptymodule"
title = "Empty Module"
description = "Start with an empty module"
canCherryPick = false
modules = [
    "custom/my_module",
]
