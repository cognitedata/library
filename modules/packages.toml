[library]
title = "official Cognite Deployment Packages"
description = """
The open-source Github repository ("Repository") is provided "as is", without warranty of any kind, express or implied, including but not limited to the warranties of merchantability, fitness for a particular purpose, and non-infringement. Usage of the Repository is voluntary and in no event shall Cognite be liable for any claim, damages, or other liability, whether in an action of contract, tort, or otherwise, arising from, out of, or in connection with the use of the Repository.
"""


[packages.cdf_p_and_id_annotation]
id = "dp:cdf_p_and_id_annotation"
title = "CDF P&ID Annotation"
description = "Data pipeline for P&ID annotation and contextualization mapping of tags to assets and files."
modules = ["accelerators/contextualization/cdf_p_and_id_annotation"]

[packages.cdf_file_annotation]
id = "dp:cdf_file_annotation"
title = "CDF File Annotation Module"
description = "Framework for automating file annotation in CDF using a data model-centric approach."
modules = ["accelerators/contextualization/cdf_file_annotation"]

[packages.cdf_entity_matching]
id = "dp:cdf_entity_matching"
title = "CDF Entity Matching Module"
description = "Entity matching for contextualizing timeseries data with assets in CDF."
modules = ["accelerators/contextualization/cdf_entity_matching"]


[packages.infield_quickstart]
id = "dp:infield_quickstart"
title = "Infield Quickstart"
description = "Accelerate Infield App Configuration"
modules = [
    "accelerators/infield_quickstart/cdf_apm_base",
    "accelerators/infield_quickstart/cdf_infield_common",
    "accelerators/infield_quickstart/cdf_infield_location"
]

[packages.rmdm_v1]
id = "dp:rmdm_v1"
title = "Reliability Maintenance Data Model"
description = "Reliability & Maintenance Data Model, ISO14224 compliant"
modules = ["models/rmdm_v1"]

[packages.isa_manufacturing_extension]
id = "dp:isa_manufacturing_extension"
title = "ISA Manufacturing Extension"
description = "ISA-95/ISA-88 based manufacturing domain model for CDF."
modules = ["models/isa_manufacturing_extension"]

[packages.cdf_process_industry_extension]
id = "dp:cdf_process_industry_extension"
title = "CDF Process Industry Extension"
description = "Extension of the Cognite Process Industry data model with organization-specific views and containers."
modules = ["models/cdf_process_industry_extension"]

[packages.qs_enterprise_dm]
id = "dp:qs_enterprise_dm"
title = "Quick Start Enterprise Data Model"
description = "Enterprise data model for CDF extending CDM for process industry use cases."
modules = ["models/qs_enterprise_dm"]

[packages.cfihos_oil_and_gas_extension]
id = "dp:cfihos_oil_and_gas_extension"
title = "Oil and Gas Domain Model — CFIHOS Extension"
description = "Tag-centric data model for oil and gas operations based on CFIHOS 2.0, extending CDM and IDM."
modules = ["models/cfihos_oil_and_gas_extension"]

[packages.ootb_agents]
id = "dp:ootb_agents"
title = "Out-of-the-Box Agents"
description = "Pre-configured Atlas AI agents for data exploration and CDF integration."
modules = ["atlas_ai/ootb_agents"]

[packages.rca_with_rmdm]
id = "dp:rca_with_rmdm"
title = "Root Cause Analysis (RCA) Agents"
description = "Atlas AI agents for root cause analysis using the RMDM v1 data model."
modules = ["atlas_ai/rca_with_rmdm"]

[packages.ai_extractor]
id = "dp:ai_extractor"
title = "AI Property Extractor"
description = "Extract structured property values from unstructured text in CDF using LLM agents."
modules = ["atlas_ai/ai_extractor"]

[packages.context_quality]
id = "dp:context_quality"
title = "Contextualization Quality Dashboard"
description = "Measure and visualize contextualization quality of CDF data (asset hierarchy, equipment, time series, maintenance, file annotation, 3D)."
modules = ["dashboards/context_quality"]

[packages.project_health]
id = "dp:project_health"
title = "CDF Project Health Dashboard"
description = "Measure and visualize health of CDF resources (extraction pipelines, workflows, transformations, functions) by dataset."
modules = ["dashboards/project_health"]

[packages.classic_cdf_analysis]
id = "dp:classic_cdf_analysis"
title = "Classic CDF Analysis"
description = "Streamlit app for metadata field distribution across Assets, Time series, Events, Sequences, and Files."
modules = ["dashboards/classic_cdf_analysis"]


[packages.quickstartdp]
id = "dp:quickstart"
title = "Quickstart Deployment Pack"
description = "DP to showcase CDF capabilities in a quick and easy way."
canCherryPick = false # This package is not meant to be cherry picked, it is a complete deployment pack.
modules = [
    "accelerators/cdf_common",
    "accelerators/cdf_ingestion",
    "accelerators/contextualization/cdf_file_annotation",
    "accelerators/contextualization/cdf_entity_matching",
    "accelerators/contextualization/cdf_connection_sql",
    "accelerators/industrial_tools/cdf_search",
    "accelerators/open_industrial_data_sync",
    "sourcesystem/cdf_pi",
    "sourcesystem/cdf_sap_assets",
    "sourcesystem/cdf_sap_events",
    "sourcesystem/cdf_sharepoint",
    "dashboards/rpt_quality",
    "models/qs_enterprise_dm",
]

[packages.cdf_pi]
id = "dp:cdf_pi"
title = "CDF PI"
description = "Ingestion of time series metadata from OSIsoft/AVEVA PI into CDF."
modules = ["sourcesystem/cdf_pi"]

[packages.cdf_sap_assets]
id = "dp:cdf_sap_assets"
title = "CDF SAP Assets"
description = "Ingestion of asset and equipment master data from SAP S/4HANA into CDF."
modules = ["sourcesystem/cdf_sap_assets"]

[packages.cdf_sap_events]
id = "dp:cdf_sap_events"
title = "CDF SAP Events"
description = "Ingestion of maintenance events (work orders, operations) from SAP S/4HANA into CDF."
modules = ["sourcesystem/cdf_sap_events"]

[packages.cdf_sharepoint]
id = "dp:cdf_sharepoint"
title = "CDF SharePoint Files"
description = "Ingestion of document files from SharePoint into CDF."
modules = ["sourcesystem/cdf_sharepoint"]

[packages.cdf_common]
id = "dp:cdf_common"
title = "CDF Common"
description = "Foundational resources for CDF projects: spaces, datasets, RAW, annotation-to-direct-relation writer."
modules = ["accelerators/cdf_common"]

[packages.cdf_ingestion]
id = "dp:cdf_ingestion"
title = "CDF Ingestion"
description = "Workflow orchestration for data ingestion and contextualization (transformations in dependency order)."
modules = ["accelerators/cdf_ingestion"]

[packages.cdf_performance_testing]
id = "dp:cdf_performance_testing"
title = "CDF Performance Testing"
description = "Framework for testing CDF operation performance with Jupyter notebooks (benchmarking, visualization)."
modules = ["tools/notebooks/cdf_performance_testing"]

[packages.cdf_transformation_jobs_metric_explorer]
id = "dp:cdf_transformation_jobs_metric_explorer"
title = "TSJM Analysis Notebook"
description = "Export, visualize, and analyze CDF Transformation Job Metrics (TSJM)."
modules = ["tools/notebooks/cdf_transformation_jobs_metric_explorer"]

[packages.qualitizer]
id = "dp:qualitizer"
title = "Qualitizer"
description = "Tools to understand, troubleshoot, and improve the quality of your CDF deployment."
modules = ["tools/apps/qualitizer"]
