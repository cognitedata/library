[library]
title = "official Cognite Deployment Packages"
description = """
The open-source Github repository ("Repository") is provided "as is", without warranty of any kind, express or implied, including but not limited to the warranties of merchantability, fitness for a particular purpose, and non-infringement. Usage of the Repository is voluntary and in no event shall Cognite be liable for any claim, damages, or other liability, whether in an action of contract, tort, or otherwise, arising from, out of, or in connection with the use of the Repository.
"""


[packages.contextualization]
id = "dp:contextualization"
title = "Contextualization"
description = "Module templates for data contextualization"
modules = [
    "accelerators/contextualization/cdf_p_and_id_annotation",
    "accelerators/contextualization/cdf_file_annotation",
    "accelerators/contextualization/cdf_entity_matching",
]

[packages.infield_quickstart]
id = "dp:infield_quickstart"
title = "Infield Quickstart"
description = "Accelerate Infield App Configuration"
canCherryPick = false
modules = [
    "accelerators/infield_quickstart/cdf_apm_base",
    "accelerators/infield_quickstart/cdf_infield_common",
    "accelerators/infield_quickstart/cdf_infield_location"
]

[packages.models]
id = "dp:models"
title = "Data models"
description = "Data models that extend the core data model"
canCherryPick = true
modules = [
    "models/rmdm_v1",
    "models/isa_manufacturing_extension",
    "models/cdf_process_industry_extension_full",
    "models/qs_enterprise_dm",
    "models/cfihos_oil_and_gas_extension",
    "models/cdf_scene",
]

[packages.atlas_ai]
id = "dp:atlas_ai"
title = "Atlas AI Deployment Pack"
description = "Deploy all Atlas AI modules in one package."
canCherryPick = true  # allows users to select individual modules
modules = [
    "atlas_ai/ootb_agents",
    "atlas_ai/rca_with_rmdm",
    "atlas_ai/ai_extractor"
]

[packages.dashboards]
id = "dp:dashboards"
title = "Dashboards"
description = "Streamlit dashboards and visualization modules"
canCherryPick = true
modules = [
    "dashboards/context_quality",
    "dashboards/project_health",
    "dashboards/classic_cdf_analysis"
]

[packages.quickstartdp]
id = "dp:quickstart"
title = "Quickstart Deployment Pack"
description = "DP to showcase CDF capabilities in a quick and easy way."
canCherryPick = false # This package is not meant to be cherry picked, it is a complete deployment pack.
modules = [
    "accelerators/cdf_common",
    "accelerators/cdf_ingestion",
    "accelerators/contextualization/cdf_file_annotation",
    "accelerators/contextualization/cdf_entity_matching",
    "accelerators/contextualization/cdf_connection_sql",
    "accelerators/industrial_tools/cdf_search",
    "accelerators/open_industrial_data_sync",
    "sourcesystem/cdf_pi",
    "sourcesystem/cdf_sap_assets",
    "sourcesystem/cdf_sap_events",
    "sourcesystem/cdf_sharepoint",
    "dashboards/rpt_quality",
    "models/qs_enterprise_dm",
]


[packages.sourcesystem]
id = "dp:sourcesystem"
title = "Source Systems"
description = "Source systems modules"
canCherryPick = true
modules = [
    "sourcesystem/cdf_pi",
    "sourcesystem/cdf_sap_assets",
    "sourcesystem/cdf_sap_events",
    "sourcesystem/cdf_sharepoint",
]


[packages.common]
id = "dp:common"
title = "Common"
description = "Common modules"
canCherryPick = true
modules = [
    "accelerators/cdf_common",
    "accelerators/cdf_ingestion",
]

[packages.tools]
id = "tool"
title = "Tools and Accelerators"
description = "Tools and accelerators for CDF projects"
canCherryPick = true
modules = [
    "tools/notebooks/cdf_performance_testing",
    "tools/notebooks/cdf_transformation_jobs_metric_explorer",
    "tools/apps/qualitizer"
]

[packages.industrial_tools]
id = "dp:industrial_tools"
title = "Industrial Tools"
description = "Data exploration and analytics tools"
canCherryPick = true
modules = [
    "accelerators/industrial_tools/cdf_search",
]

[packages.inrobot]
id = "dp:inrobot"
title = "InRobot"
description = "Robotics inspection data integration"
canCherryPick = true
modules = [
    "accelerators/inrobot/cdf_inrobot_common",
    "accelerators/inrobot/cdf_inrobot_location",
]

[packages.bootcamp]
id = "dp:bootcamp"
title = "Bootcamp"
description = "Initial configurations for the Cognite Data Fusion Bootcamp"
canCherryPick = false
modules = [
    "bootcamp/ice_cream_api",
    "bootcamp/use_cases/oee",
]

[packages.custom]
id = "dp:emptymodule"
title = "Empty Module"
description = "Start with an empty module"
canCherryPick = false
modules = [
    "custom/my_module",
]

[packages.auth_readwrite_all]
id = "dp:common"
title = "Admin group for CI/CD with read-write and read-only access"
description = "Admin group for CI/CD with read-write and read-only access"
canCherryPick = false
modules = [
    "common/cdf_auth_readwrite_all",
]

