name: gp_{{environment}}_read_shared_ops_data_model
sourceId: {{read_source_id}}

capabilities:
  - datasetsAcl:
      actions:
        - READ
      scope:
        idScope:
          ids:
            - {{dataset_external_id}}
  - dataModelsAcl:
      actions:
        - READ
      scope:
        spaceIdScope:
          spaceIds:
            - cdf_cdm
            - cdf_idm
            - {{space}}
            - {{search_space}}

  - dataModelInstancesAcl:
      actions:
        - READ
      scope:
        spaceIdScope:
          spaceIds:
            - {{instance_space}}
metadata:
  origin: {{admin_user}}
