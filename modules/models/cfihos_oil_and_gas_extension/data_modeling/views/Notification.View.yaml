space: "{{space}}"
externalId: Notification
name: Notification
description: A formal record to report maintenance issues, defects, or requests. Maps
  SAP notifications to the Cognite Notification standard.
implements:
  - space: cdf_idm
    externalId: CogniteNotification
    version: v1
    type: view
version: "{{dm_version}}"
properties:
  maintenanceOrder:
    name: Work order
    description: The work order the notification is related to.
    container:
      space: cdf_idm
      externalId: CogniteNotification
      type: container
    containerPropertyIdentifier: maintenanceOrder
    source:
      space: "{{space}}"
      externalId: WorkOrder
      version: "{{dm_version}}"
      type: view
  asset:
    name: Tag
    description: The asset (functional location) the notification is related to.
    container:
      space: cdf_cdm
      externalId: CogniteActivity
      type: container
    containerPropertyIdentifier: assets
    source:
      space: "{{space}}"
      externalId: Tag
      version: "{{dm_version}}"
      type: view
  failureMode:
    name: failureMode
    description: Failure mode reference
    container:
      space: "{{space}}"
      externalId: Notification
      type: container
    containerPropertyIdentifier: failureMode
    source:
      space: "{{space}}"
      externalId: FailureMode
      version: "{{dm_version}}"
      type: view    
  labels:
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: tags
    description: Text based labels for generic use, limited to 1000
  mainWorkCenter:
    name: mainWorkCenter
    description: Main work center
