space: "{{space}}"
externalId: WorkOrderOperation
name: Work Order Operation
description: A specific part of the work included in a maintenance order. Maps SAP work
  order operations to the Cognite Operation standard.
implements:
  - space: cdf_idm
    externalId: CogniteOperation
    version: v1
    type: view
version: "{{dm_version}}"
properties:
  assets:
    name: Tags
    description: A list of tags the work order operation is related to.
    container:
      space: cdf_cdm
      externalId: CogniteActivity
      type: container
    containerPropertyIdentifier: assets
    source:
      space: "{{space}}"
      externalId: Tag
      version: "{{dm_version}}"
      type: view
  maintenanceOrder:
    name: Work order
    description: The Work Order the operation is related to.
    container:
      space: cdf_idm
      externalId: CogniteOperation
      type: container
    containerPropertyIdentifier: maintenanceOrder
    source:
      space: "{{space}}"
      externalId: WorkOrder
      version: "{{dm_version}}"
      type: view
  mainAsset:
    name: Main tag
    description: The primary tag (functional location) the operation refers to
    container:
      space: cdf_idm
      externalId: CogniteOperation
      type: container
    containerPropertyIdentifier: mainAsset
    source:
      space: "{{space}}"
      externalId: Tag
      version: "{{dm_version}}"
      type: view
  timeSeries:
    name: Time series
    description: A list of time series the operation is related to.
    container:
      space: cdf_cdm
      externalId: CogniteActivity
      type: container
    containerPropertyIdentifier: timeSeries
    source:
      space: "{{space}}"
      externalId: TimeSeriesData
      version: "{{dm_version}}"
      type: view
  equipment:
    name: Equipment
    description: The equipment the operation is related to.
    container:
      space: cdf_cdm
      externalId: CogniteActivity
      type: container
    containerPropertyIdentifier: equipment
    source:
      space: "{{space}}"
      externalId: Equipment
      version: "{{dm_version}}"
      type: view
  labels:
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: tags
    description: Text based labels for generic use, limited to 1000
  routingNo:
    name: routingNo
    description: SAP routing number
    container:
      space: "{{space}}"
      externalId: WorkOrderOperation
      type: container
    containerPropertyIdentifier: routingNo
  operationCounter:
    name: operationCounter
    description: SAP operation counter
    container:
      space: "{{space}}"
      externalId: WorkOrderOperation
      type: container
    containerPropertyIdentifier: operationCounter
  opWctr:
