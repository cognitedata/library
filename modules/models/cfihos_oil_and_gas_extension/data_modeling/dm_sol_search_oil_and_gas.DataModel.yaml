space: "{{search_space}}"
externalId: "{{search_data_model_external_id}}"
name: "{{search_data_model_name}}"
description: >
  The Oil And Gas Domain Model provides a unified asset hierarchy by merging data from Aveva (LCI),
  SAP (Maintenance & Integrity), and OPC UA (SAS) sources into a single tag-centric structure.
  Built on the CFIHOS 2.0 standard with example project Class Library taxonomy integration,
  it models equipment classes, work orders, notifications, and time series references.
  Extending the Cognite Data Model (CDM), this foundation enables Atlas AI capabilities
  and unified data exploration across currently Aveva, OPC UA, SAP, and D2 sources,
  with new sources to be added in H1 2026.
