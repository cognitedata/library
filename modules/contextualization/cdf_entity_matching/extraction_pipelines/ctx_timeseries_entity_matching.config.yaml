externalId: 'ep_ctx_timeseries_{{location_name}}_{{source_name}}_entity_matching'
config:
  parameters:
    debug: False
    runAll: True
    dmUpdate: True
    removeOldLinks: False
    rawDb: '{{ dbName }}'
    rawTableState: 'contextualization_state_store'
    rawTaleCtxGood: 'contextualization_good'
    rawTaleCtxBad: 'contextualization_bad'
    rawTaleCtxManual: 'contextualization_manual_input'
    rawTaleCtxRule: 'contextualization_rule_input'
    autoApprovalThreshold: 0.85
  data:
    targetView: # target view to match timeseries to, ex: Asset, Tags, Equipment, etc.
      schemaSpace: {{ schemaSpace }}
      instanceSpace: {{ assetInstanceSpace }}
      externalId: {{ targetViewExternalId }}
      version: {{ viewVersion }}
      searchProperty: {{ targetViewSearchProperty }}
      filterProperty: tags
      filterValues: {{ targetViewFilterValues }}
    entityView: # entity our source for values to be matched against, ex: TimeSeries, etc.
      schemaSpace: {{ schemaSpace }}
      instanceSpace: {{ timeseriesInstanceSpace }}
      externalId: {{ entityViewExternalId }}
      version: {{ viewVersion }}
      searchProperty: {{ entityViewSearchProperty }}
      filterProperty: tags
      filterValues: {{ entityViewFilterValues }}
