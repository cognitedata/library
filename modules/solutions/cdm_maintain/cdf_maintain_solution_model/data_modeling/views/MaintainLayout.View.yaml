space: {{schemaSpace}}
externalId: MaintainLayout
version: v1
name: MaintainLayout
filter:
  hasData:
    - type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
properties:
  name:
    description: Human readable name of the layout
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: name
  owner:
    description: User who owns the layout, null if system created
    source:
      type: view
      space: cdf_apps_shared
      externalId: CDF_User
      version: v1
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: owner
  filters:
    description: Filters to apply to activities when the layout is active
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: filters
  groups:
    description: Attributes to group activities by when the layout is active. Order decides hiearchy of grouping
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: groups
  sortingField:
    description: Attributes to sort activities by when the layout is active
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: sortingField
  sortingDir:
    description: Direction to sort activities by when the layout is active on the sortingField attribute
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: sortingDir
  globalLayout:
    description: Flag to indicate if the layout should be visible to all users in the project
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: globalLayout
  visibleFields:
    description: List of attributes to show in the activity table when the layout is active
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: visibleFields
  category:
    description: Category to group the layout by in the layout dropdown
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: category
  activeColorCoding:
    description: Attribute to color code activities in GANTT by when the layout is active
    container:
      type: container
      space: {{schemaSpace}}
      externalId: MaintainLayout
    containerPropertyIdentifier: activeColorCoding
