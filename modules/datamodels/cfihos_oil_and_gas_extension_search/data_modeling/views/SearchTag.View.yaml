space: "{{search_space}}"
externalId: Tag
name: Tag
description: Search-optimized tag view. Maps to enterprise Tag containers and hosts
  reverse relations for search/AI navigation. Exposes CogniteAsset hierarchy
  properties (parent, root, path, children) self-referencing this view so search-side
  traversal stays within the search model.
implements:
- space: cdf_cdm
  externalId: CogniteDescribable
  version: v1
  type: view
version: "{{search_dm_version}}"
properties:
  # ------------------------------------------------------------------
  # Custom properties — mapped to enterprise Tag container
  # ------------------------------------------------------------------
  tagNumber:
    name: Tag Number
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000166
    description: Tag number identifier (e.g. equipment or functional location tag)
  area:
    name: Area
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000001
    description: Area code within the facility
  classId:
    name: Class Id
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: classId
    description: CFIHOS equipment class identifier
  className:
    name: Class Name
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: className
    description: CFIHOS equipment class name
  facility:
    name: Facility
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000005
    description: Facility code where the tag is located
  parentTag:
    name: Parent Tag
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000178
    description: Reference to the parent tag in the hierarchy
  project:
    name: Project
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000084
    description: Project code associated with the tag
  system:
    name: System
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000157
    description: System code the tag belongs to
  tagDiscipline:
    name: Tag Discipline
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000153
    description: Engineering discipline of the tag (e.g. mechanical, electrical, instrument)
  fromTag:
    name: From Tag
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000182
    description: Source tag for connection or flow direction
  toTag:
    name: To Tag
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000184
    description: Destination tag for connection or flow direction
  foundInSources:
    name: Found In Sources
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: foundInSources
    description: List of data sources where this tag was found
  missingParent:
    name: Missing Parent
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: missingParent
    description: Indicates if the parent tag reference is unresolved
  validNamingConvention:
    name: Valid Naming Convention
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: validNamingConvention
    description: Indicates if the tag follows the naming convention
  classViewExtId:
    name: Class View Ext Id
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: classViewExtId
    description: External ID of the class-specific view for this tag (e.g., CFIHOS_Pump, CFIHOS_Valve)
  originatingContractor:
    name: Originating Contractor
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000179
    description: Contractor responsible for originating the tag data
  updatedDate:
    name: Updated Date
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: updatedDate
    description: Date when the tag information was last updated
  dateInstalled:
    name: Date Installed
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000169
    description: Date when the equipment was installed
  useProjectStatus:
    name: Use Project Status
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: useProjectStatus
    description: Project status flag for the tag
  purchaseOrderNo:
    name: Purchase Order No
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000128
    description: Purchase order number for the equipment
  avevaTagStatus:
    name: Aveva Tag Status
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CFIHOS_10000025
    description: AVEVA tag status indicator
  cfihosTagClassCode:
    name: Cfihos Tag Class Code
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: cfihosTagClassCode
    description: CFIHOS tag classification code
  additionalProperties:
    name: Additional Properties
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: additionalProperties
    description: Additional properties stored as JSON

  # ------------------------------------------------------------------
  # Asset hierarchy and classification — mapped to CDM containers,
  # with hierarchy relations self-referencing this view
  # ------------------------------------------------------------------
  object3D:
    name: Object3D
    container:
      space: cdf_cdm
      externalId: CogniteVisualizable
      type: container
    containerPropertyIdentifier: object3D
    description: Direct relation to an Object3D instance representing the 3D resource
    source:
      space: cdf_cdm
      externalId: Cognite3DObject
      version: v1
      type: view
  parent:
    name: Parent
    container:
      space: cdf_cdm
      externalId: CogniteAsset
      type: container
    containerPropertyIdentifier: assetHierarchy_parent
    description: The parent of the asset.
    source:
      space: "{{search_space}}"
      externalId: Tag
      version: "{{search_dm_version}}"
      type: view
  root:
    name: Root
    container:
      space: cdf_cdm
      externalId: CogniteAsset
      type: container
    containerPropertyIdentifier: assetHierarchy_root
    description: An automatically updated reference to the top-level asset of the
      hierarchy.
    source:
      space: "{{search_space}}"
      externalId: Tag
      version: "{{search_dm_version}}"
      type: view
  path:
    name: Path
    container:
      space: cdf_cdm
      externalId: CogniteAsset
      type: container
    containerPropertyIdentifier: assetHierarchy_path
    description: An automatically updated ordered list of this asset's ancestors,
      starting with the root asset. Enables subtree filtering to find all assets under
      a parent.
    source:
      space: "{{search_space}}"
      externalId: Tag
      version: "{{search_dm_version}}"
      type: view
  pathLastUpdatedTime:
    name: Path last updated time
    container:
      space: cdf_cdm
      externalId: CogniteAsset
      type: container
    containerPropertyIdentifier: assetHierarchy_path_last_updated_time
    description: The last time the path was updated for this asset.
  assetClass:
    name: Tag class
    container:
      space: cdf_cdm
      externalId: CogniteAsset
      type: container
    containerPropertyIdentifier: assetClass
    description: Specifies the class of the tag. It's a direct relation to CogniteAssetClass.
    source:
      space: cdf_cdm
      externalId: CogniteAssetClass
      version: v1
      type: view
  type:
    name: Tag type
    container:
      space: cdf_cdm
      externalId: CogniteAsset
      type: container
    containerPropertyIdentifier: type
    description: Specifies the type of the asset. It's a direct relation to CogniteAssetType.
    source:
      space: cdf_cdm
      externalId: CogniteAssetType
      version: v1
      type: view
  children:
    name: Children
    description: An automatically updated list of assets with this asset as their
      parent.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: Tag
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: Tag
        version: "{{search_dm_version}}"
        type: view
      identifier: parent

  # ------------------------------------------------------------------
  # Direct relations on enterprise Tag container, retargeted to Search* views
  # ------------------------------------------------------------------
  FunctionalLocationProperties:
    name: Functional Location Properties
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: FunctionalLocationProperties
    description: Direct relation to functional location properties
    source:
      space: "{{search_space}}"
      externalId: FunctionalLocationProperties
      version: "{{search_dm_version}}"
      type: view
  CommonLCIProperties:
    name: Common LCI Properties
    container:
      space: "{{enterprise_space}}"
      externalId: Tag
      type: container
    containerPropertyIdentifier: CommonLCIProperties
    description: Direct relation to common lifecycle information properties
    source:
      space: "{{search_space}}"
      externalId: CommonLCIProperties
      version: "{{search_dm_version}}"
      type: view

  # ------------------------------------------------------------------
  # CDM properties (re-sourced from cdf_cdm)
  # ------------------------------------------------------------------
  name:
    name: Name
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: name
    description: Name of the tag
  description:
    name: Description
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: description
    description: Description of the tag
  labels:
    name: Labels
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: tags
    description: Text-based labels for generic use, limited to 1000. Aliased from
      CogniteDescribable.tags to avoid naming collision with the Tag entity.
  aliases:
    name: Aliases
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: aliases
    description: Alternative names for the node
  sourceId:
    name: Source Id
    container:
      space: cdf_cdm
      externalId: CogniteSourceable
      type: container
    containerPropertyIdentifier: sourceId
    description: Identifier from the source system
  sourceContext:
    name: Source Context
    container:
      space: cdf_cdm
      externalId: CogniteSourceable
      type: container
    containerPropertyIdentifier: sourceContext
    description: Context of the source id
  source:
    name: Source
    container:
      space: cdf_cdm
      externalId: CogniteSourceable
      type: container
    containerPropertyIdentifier: source
    description: Direct relation to a source system
    source:
      space: cdf_cdm
      externalId: CogniteSourceSystem
      version: v1
      type: view
  sourceCreatedTime:
    name: Source Created Time
    container:
      space: cdf_cdm
      externalId: CogniteSourceable
      type: container
    containerPropertyIdentifier: sourceCreatedTime
    description: When the instance was created in source system (if available)
  sourceUpdatedTime:
    name: Source Updated Time
    container:
      space: cdf_cdm
      externalId: CogniteSourceable
      type: container
    containerPropertyIdentifier: sourceUpdatedTime
    description: When the instance was last updated in the source system (if available)
  sourceCreatedUser:
    name: Source Created User
    container:
      space: cdf_cdm
      externalId: CogniteSourceable
      type: container
    containerPropertyIdentifier: sourceCreatedUser
    description: User identifier from the source system on who created the source data
  sourceUpdatedUser:
    name: Source Updated User
    container:
      space: cdf_cdm
      externalId: CogniteSourceable
      type: container
    containerPropertyIdentifier: sourceUpdatedUser
    description: User identifier from the source system on who last updated the source data

  # ------------------------------------------------------------------
  # Reverse relations — moved here from the enterprise Tag view
  # All forwards live on solution-specific views, so the reverses belong here.
  # ------------------------------------------------------------------
  files:
    name: Files
    description: An automatically updated list of files related to the tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: Files
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: Files
        version: "{{search_dm_version}}"
        type: view
      identifier: assets
  equipment:
    name: Equipment
    description: An automatically updated list of equipment related to the tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: Equipment
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: Equipment
        version: "{{search_dm_version}}"
        type: view
      identifier: asset
  timeSeries:
    name: Time series
    description: An automatically updated list of time series related to the tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: TimeSeriesData
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: TimeSeriesData
        version: "{{search_dm_version}}"
        type: view
      identifier: assets
  failureModes:
    name: Failure modes
    description: An automatically updated list of failure modes related to the tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: FailureMode
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: FailureMode
        version: "{{search_dm_version}}"
        type: view
      identifier: assets
  primaryWorkOrder:
    name: Primary work order
    description: The primary work order related to the tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: WorkOrder
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: WorkOrder
        version: "{{search_dm_version}}"
        type: view
      identifier: mainAsset
  workOrders:
    name: Work orders
    description: An automatically updated list of work orders related to the tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: WorkOrder
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: WorkOrder
        version: "{{search_dm_version}}"
        type: view
      identifier: assets
  notifications:
    name: Notifications
    description: Notifications related to this tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: Notification
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: Notification
        version: "{{search_dm_version}}"
        type: view
      identifier: assets
  workOrderOperations:
    name: Work order operations
    description: Work order operations related to this tag.
    connectionType: multi_reverse_direct_relation
    source:
      space: "{{search_space}}"
      externalId: WorkOrderOperation
      version: "{{search_dm_version}}"
      type: view
    through:
      source:
        space: "{{search_space}}"
        externalId: WorkOrderOperation
        version: "{{search_dm_version}}"
        type: view
      identifier: mainAsset
