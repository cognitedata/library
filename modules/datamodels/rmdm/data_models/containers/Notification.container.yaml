space: rmdm
externalId: Notification
name: RM Notification
description: Stores RMDM notification extension properties for maintenance requests and issues.
properties:
  equipment:
    type:
      list: true
      maxListSize: 300
      type: direct
    immutable: false
    nullable: true
    autoIncrement: false
    name: Equipment
    description: A list of physical equipment related to this notification.
  subunitFailed:
    type:
      list: true
      maxListSize: 300
      type: direct
    immutable: false
    nullable: true
    autoIncrement: false
    name: Subunit
    description: A reference to the specific subsystem(s) belonging to the asset in
      this notification that failed.
  componentFailed:
    type:
      list: true
      maxListSize: 300
      type: direct
    immutable: false
    nullable: true
    autoIncrement: false
    name: Component
    description: A reference to the specific parts of the subsystem referenced in
      this notification that failed.
  longDescription:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: Long Text
    description: A detailed textual explanation providing additional context or specifications
      for this notification.
  discipline:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: Discipline
    description: The technical field associated with this notification.
  plannerGroup:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: Planner Group
    description: A designated team responsible for planning and managing maintenance
      activities.
  plannerGroupDescription:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: Planner Group Description
    description: A textual summary defining the role, responsibilities, and scope
      of a planner group.
  typeDescription:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: Type Description
    description: The type of this notification as a human readable name.
  statusDescription:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: Status Description
    description: A string indicating the status of this notification.
constraints:
  cdf_idm_CogniteNotification:
    require:
      space: cdf_idm
      externalId: CogniteNotification
      type: container
    constraintType: requires
indexes:
  equipment:
    indexType: btree
    properties:
    - equipment
    cursorable: false
  subunitFailed:
    indexType: btree
    properties:
    - subunitFailed
    cursorable: false
  componentFailed:
    indexType: btree
    properties:
    - componentFailed
    cursorable: false
usedFor: node
