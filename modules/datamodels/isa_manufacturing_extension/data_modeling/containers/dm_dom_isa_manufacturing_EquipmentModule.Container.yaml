space: {{ enterprise_space }}
externalId: EquipmentModule
name: EquipmentModule
description: A functional group of equipment that can carry out a finite number of specific minor
  processing activities. An equipment module is typically centered around a piece of process
  equipment (a weigh tank, a process heater, a scrubber, etc.). This term applies to both the
  physical equipment and the equipment entity. Examples of minor process activities are dosing
  and weighing.
properties:
  equipmentModuleId:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: false
    autoIncrement: false
    name: equipmentModuleId
  equipmentModuleName:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: false
    autoIncrement: false
    name: equipmentModuleName
  module_class:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: module_class
  capacity:
    type:
      list: false
      type: float64
    immutable: false
    nullable: true
    autoIncrement: false
    name: capacity
  capacity_unit:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: capacity_unit
  unit:
    type:
      list: false
      type: direct
    immutable: false
    nullable: true
    autoIncrement: false
    name: unit
  equipment:
    type:
      list: true
      type: direct
      maxListSize: 100
    immutable: false
    nullable: true
    autoIncrement: false
    name: equipment

indexes:
  equipmentModuleIdIndex:
    properties:
    - equipmentModuleId
    cursorable: true
    indexType: btree
  equipmentModuleNameIndex:
    properties:
    - equipmentModuleName
    cursorable: true
    indexType: btree
  moduleClassIndex:
    properties:
    - module_class
    cursorable: true
    indexType: btree
  unitIndex:
    properties:
    - unit
    cursorable: true
    indexType: btree
  equipmentIndex:
    properties:
    - equipment
    cursorable: false
    indexType: btree
