space: {{ enterprise_space }}
externalId: MaterialLot
name: MaterialLot
description: A unique amount of material having a set of common traits. Some examples of common
  traits are material source, the master recipe used to produce the material, and distinct
  physical properties.
properties:
  materialLotId:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: false
    autoIncrement: false
    name: materialLotId
  material:
    type:
      list: false
      type: direct
    immutable: false
    nullable: true
    autoIncrement: false
    name: material
  lotNumber:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: lotNumber
  manufactureDate:
    type:
      list: false
      type: timestamp
    immutable: false
    nullable: true
    autoIncrement: false
    name: manufactureDate
  expiryDate:
    type:
      list: false
      type: timestamp
    immutable: false
    nullable: true
    autoIncrement: false
    name: expiryDate
indexes:
  materialLotIdIndex:
    properties:
    - materialLotId
    cursorable: true
    indexType: btree
  lotNumberIndex:
    properties:
    - lotNumber
    cursorable: true
    indexType: btree
  materialIndex:
    properties:
    - material
    cursorable: true
    indexType: btree
  manufactureDateIndex:
    properties:
    - manufactureDate
    cursorable: true
    indexType: btree
  expiryDateIndex:
    properties:
    - expiryDate
    cursorable: true
    indexType: btree
constraints:
  requiresCogniteDescribable:
    constraintType: requires
    require:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
