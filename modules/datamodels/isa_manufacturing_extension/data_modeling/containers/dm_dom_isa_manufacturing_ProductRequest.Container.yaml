  dueDateIndex:
    properties:
    - dueDate
    cursorable: true
    indexType: btree
  statusDueDateIndex:
    properties:
    - requestStatus
    - dueDate
    cursorable: true
    indexType: btree
  unitIndex:
    properties:
    - unit
    cursorable: false
    indexType: btree
  filesIndex:
    properties:
    - files
    cursorable: false
    indexType: btree
  workOrdersIndex:
    properties:
    - workOrders
    cursorable: false
    indexType: btree
constraints:
  requiresCogniteDescribable:
    constraintType: requires
    require:
      space: cdf_cdm
      externalId: CogniteDescribable
