space: {{ enterprise_space }}
externalId: ProductRequest
name: ProductRequest
description: Request to produce specific quantities of products (ISA-95 Level 3)
properties:
  productRequestId:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: false
    autoIncrement: false
    name: productRequestId
  requestNumber:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: false
    autoIncrement: false
    name: requestNumber
  priority:
    type:
      list: false
      type: int32
    immutable: false
    nullable: true
    autoIncrement: false
    name: priority
  dueDate:
    type:
      list: false
      type: timestamp
    immutable: false
    nullable: true
    autoIncrement: false
    name: dueDate
  quantityRequested:
    type:
      list: false
      type: float64
    immutable: false
    nullable: false
    autoIncrement: false
    name: quantityRequested
  quantityUnit:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: quantityUnit
  requestStatus:
    type:
      list: false
      collation: ucs_basic
      type: text
    immutable: false
    nullable: true
    autoIncrement: false
    name: requestStatus
  unit:
    type:
      list: true
      type: direct
      maxListSize: 100
    immutable: false
    nullable: true
    autoIncrement: false
    name: unit
  files:
    type:
      list: true
      type: direct
      maxListSize: 100
    immutable: false
    nullable: true
    autoIncrement: false
    name: files
  workOrders:
    type:
      list: true
      type: direct
      maxListSize: 100
    immutable: false
    nullable: true
    autoIncrement: false
    name: workOrders
indexes:
  productRequestIdIndex:
    properties:
    - productRequestId
    cursorable: true
    indexType: btree
  requestNumberIndex:
    properties:
    - requestNumber
    cursorable: true
    indexType: btree
  requestStatusIndex:
    properties:
    - requestStatus
    cursorable: true
    indexType: btree
  priorityIndex:
    properties:
    - priority
    cursorable: true
