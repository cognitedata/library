        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_site'
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_area'
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_process_cell'
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_unit'
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_equipment_module'
    # Equipment
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_equipment'
