workflowExternalId: wf_all_isa_raw_to_isa_manufacturing
version: {{ workflowVersion }}
workflowDefinition:
  description: 'Run ISA asset build, then overlays in parallel'
  tasks:
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_isatree'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_asset_all_to_isa_asset'
          concurrencyPolicy: fail
      name: 'Build ISA Asset Tree'
      description: Create ISAAsset nodes and hierarchy from RAW
      retries: 3
      timeout: 3600
      onFailure: 'abortWorkflow'
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_enterprise'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_asset_all_to_enterprise'
          concurrencyPolicy: fail
      name: 'Enterprise overlay'
      description: Upsert Enterprise view fields
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_isatree'
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_site'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_asset_all_to_site'
          concurrencyPolicy: fail
      name: 'Site overlay'
      description: Upsert Site view fields
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_isatree'
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_area'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_asset_all_to_area'
          concurrencyPolicy: fail
      name: 'Area overlay'
      description: Upsert Area view fields
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_isatree'
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_process_cell'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_asset_all_to_process_cell'
          concurrencyPolicy: fail
      name: 'ProcessCell overlay'
      description: Upsert ProcessCell view fields
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_isatree'
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_unit'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_asset_all_to_unit'
          concurrencyPolicy: fail
      name: 'Unit overlay'
      description: Upsert Unit view fields
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_isatree'
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_equipment_module'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_asset_all_to_equipment_module'
          concurrencyPolicy: fail
      name: 'EquipmentModule overlay'
      description: Upsert EquipmentModule view fields
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_isatree'
    # Personnel
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_personnel'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_personnel_all_to_personnel'
          concurrencyPolicy: fail
      name: 'Personnel'
      description: Create Personnel nodes
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_site'
    # Control Module
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_control_module'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_control_module_all_to_control_module'
          concurrencyPolicy: fail
      name: 'Control Module'
      description: Create Control Module nodes
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_equipment_module'
    # Control Module Asset Overlay
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_control_module_asset'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_control_module_all_to_isa_asset'
          concurrencyPolicy: fail
      name: 'Control Module Asset Overlay'
      description: Create Control Module Asset nodes
      retries: 3
      timeout: 3600
      onFailure: 'skipTask'
      dependsOn:
        - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_control_module'
    # Files - Transformation
    - externalId: 'wf_all_isa_raw_to_isa_manufacturing_t_files'
      type: 'transformation'
      parameters:
        transformation:
          externalId: 'tr_isa_file_all_to_isa_file'
