space: "{{space}}"
externalId: TimeSeriesData
name: Time Series Data
description: View that provides references to time series for both PI and OPCUA.
implements:
- space: cdf_cdm
  externalId: CogniteTimeSeries
  version: v1
  type: view
version: "{{dm_version}}"
properties:
  assets:
    container:
      space: cdf_cdm
      externalId: CogniteTimeSeries
      type: container
    containerPropertyIdentifier: assets
    name: Tags
    description: A list of tags the time series is related to.
    source:
      space: "{{space}}"
      externalId: Tag
      version: "{{dm_version}}"
      type: view
  equipment:
    container:
      space: cdf_cdm
      externalId: CogniteTimeSeries
      type: container
    containerPropertyIdentifier: equipment
    name: Equipment
    description: A list of equipment the time series is related to.
    source:
      space: "{{space}}"
      externalId: Equipment
      version: "{{dm_version}}"
      type: view
  stateSet:
    name: State Set
    description: The state set of the time series, only in effect when the type is 'state'.
    container:
      space: cdf_cdm
      externalId: CogniteTimeSeries
      type: container
    containerPropertyIdentifier: stateSet
    source:
      space: cdf_cdm
      externalId: CogniteStateSet
      version: v1
      type: view
  activities:
    connectionType: multi_reverse_direct_relation
    name: Work Orders
    description: An automatically updated list of activities the time series is related to.
    source:
      space: "{{space}}"
      externalId: WorkOrder
      version: "{{dm_version}}"
      type: view
    through:
      source:
        space: "{{space}}"
        externalId: WorkOrder
        version: "{{dm_version}}"
        type: view
      identifier: timeSeries
  operations:
    connectionType: multi_reverse_direct_relation
    name: Operations
    description: An automatically updated list of activities the time series is related to.
    source:
      space: "{{space}}"
      externalId: WorkOrderOperation
      version: "{{dm_version}}"
      type: view
    through:
      source:
        space: "{{space}}"
        externalId: WorkOrderOperation
        version: "{{dm_version}}"
        type: view
      identifier: timeSeries
  timeSeriesType:
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: timeSeriesType
    name: Time series type
    description: Type of the time series.
  labels:
    name: Labels
    container:
      space: cdf_cdm
      externalId: CogniteDescribable
      type: container
    containerPropertyIdentifier: tags
    description: Text based labels for generic use, limited to 1000
  assetName:
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: assetName
    name: Asset Name
    description: Name of the asset the time series is related to.
  facility:
    name: Facility
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: facility
    description: Facility code where the time series originates
  assetDescription:
    name: Asset Description
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: assetDescription
    description: Description of the asset linked to the time series
  additionalProperties:
    name: Additional Properties
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: additionalProperties
    description: Additional properties stored as JSON
  pi_archiving:
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: pi_archiving
    name: PI Archiving
    description: PI archiving enabled flag.
  pi_compDev:
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: pi_compDev
    name: PI Compression Deviation
    description: PI compression deviation threshold
  pi_compDevPercent:
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
    containerPropertyIdentifier: pi_compDevPercent
    name: PI Compression Deviation Percent
    description: PI compression deviation as percentage
  pi_compDevPercent_UOM:
    container:
      space: "{{space}}"
      externalId: TimeSeriesData
      type: container
