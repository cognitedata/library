name: "grp_{{location}}_workflow"
sourceId: "{{workflowGroupSourceId}}"
metadata:
  origin: cdf-project-templates
capabilities:
  - projectsAcl:
      actions: [READ, LIST]
      scope:
        all: {}
  - sessionsAcl:
      actions: [CREATE]
      scope:
        all: {}
  - workflowOrchestrationAcl:
      actions: [READ, WRITE]
      scope:
        datasetScope:
          ids: ["{{dataset}}"]
  - transformationsAcl:
      actions: [READ, RUN]
      scope:
        all: {}
  - datasetsAcl:
      actions: [READ]
      scope:
        all: {}
