# PI Foundation — configuration variables

# Site/location code, used in externalIds (e.g. ep_{{location}}_pi)
location: "site1"

# DM space where ISATimeSeries instances are written
instanceSpace: "sp_isa_instance_space"

# Schema space for ISA Manufacturing Extension views (used by transformations)
schemaSpace: "sp_isa_manufacturing"

# Data model view version
dataModelVersion: "v1"

# dataSetExternalId for the extraction pipeline
dataset: "ds_pi"

# External ID prefix for PI tag timeseries instances
piIdPrefix: "pi:"

# Set to false to omit sysTagsFound population (used by downstream SQL contextualization)
populateSysTagsFound: true

# Integration owner (technical contact for the pipeline)
integration_owner_name: "Integration Owner"
integration_owner_email: "integration.owner@example.com"

# Data owner (business contact for the data)
data_owner_name: "Data Owner"
data_owner_email: "data.owner@example.com"
