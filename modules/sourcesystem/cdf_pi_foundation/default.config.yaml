# PI Foundation — configuration variables

# Site/location code, used in externalIds (e.g. ep_{{location}}_pi, db_{{location}}_pi)
location: "site"

# DM space where TimeSeries / CogniteTimeSeries instances are written
instanceSpace: "sp_instances"

# dataSetExternalId for the extraction pipeline and RAW database
dataset: "ds_pi"

# External ID prefix for PI tag timeseries instances (used by the extractor)
piIdPrefix: "pi:"
