externalId: "ep_{{location}}_pi"

config:
  # PI .NET Extractor configuration template
  # Source: gss-knowledge-base/extractors/toolkit_examples/pi_net_extractor
  #
  # Secrets belong in environment variables on the extractor host — not in this file.
  # The extractor pulls this config remotely via extraction-pipeline.external-id.

  version: 1

  logger:
    file:
      level: "information"
      path: "logs/log.log"
    console:
      level: "warning"

  time-series:
    # External ID prefix — all PI tags will be created as "pi:<tagname>" in CDF
    external-id-prefix: "{{piIdPrefix}}"
    # Write timeseries metadata to RAW for transformation into ISATimeSeries DM instances
    raw:
      database: "db_{{location}}_pi"
      table: "timeseries_metadata"
    data-set:
      external-id: "{{dataset}}"

  pi:
    host: ${PI_HOST}
    username: ${PI_USER}
    password: ${PI_PASSWORD}

    # Optional: filter which PI tags are extracted
    # Uncomment and configure for your site:
    # tag-filter:
    #   whitelist:
    #     - "SITE.*"
    #     - "TAG_PREFIX.*"
    #   blacklist:
    #     - "*.BAD"
    #     - "*.SHUTDOWN"

  # Optional: extraction schedule
  # history:
  #   start-time: "2020-01-01T00:00:00Z"
  #   max-parallelism: 10
