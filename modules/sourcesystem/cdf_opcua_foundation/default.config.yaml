# OPC-UA Foundation — configuration variables

# Site/location code, used in externalIds (e.g. ep_{{location}}_opcua, db_{{location}}_opcua)
# Populated automatically from the site / location name entered in setup_project.py.
location: ""
prometheusJobName: opcua-extractor

# DM space where ISATimeSeries / CogniteTimeSeries instances are written
instanceSpace: "sp_isa_instance_space"

# dataSetExternalId for the extraction pipeline and RAW database
dataset: "ds_opcua"

# Integration owner (technical contact for the pipeline)
# Populated by setup_project.py wizard.
integration_owner_name: ""
integration_owner_email: ""

# Data owner (business contact for the data)
# Populated by setup_project.py wizard.
data_owner_name: ""
data_owner_email: ""
