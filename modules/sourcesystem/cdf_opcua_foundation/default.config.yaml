# OPC-UA Foundation — configuration variables
# Inherits: location, instanceSpace, dataset, rawSourceDatabase, schemaSpace from cdf_foundation

# External ID prefix for all OPC-UA node timeseries instances
opcuaIdPrefix: "opcua:"

# OPC-UA subscription settings (milliseconds)
opcuaPublishingInterval: 5000
opcuaSamplingInterval: 5000

# Set to false to omit sysTagsFound population (used by downstream SQL contextualization)
populateSysTagsFound: true
