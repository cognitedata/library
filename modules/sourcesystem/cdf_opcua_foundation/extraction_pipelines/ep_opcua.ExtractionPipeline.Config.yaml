externalId: "ep_{{location}}_opcua"
config:
  version: 1
  source:
    # Primary OPC-UA server endpoint. Replace host/port with your server.
    endpoint-url: opc.tcp://opcua-server-primary.example.com:4840 # Update with actual endpoint
    # Optional redundant endpoints — used when the primary becomes unavailable
    # or when monitor-service-level switches to a healthier server.
    alt-endpoint-urls:
    - opc.tcp://opcua-server-secondary.example.com:4840 # Update with actual secondary endpoint
    redundancy:
      service-level-threshold: 200
      reconnect-interval: 10m
      monitor-service-level: true
    # Service account on the OPC-UA server with read access.
    username: ${OPCUA_USER}
    password: ${OPCUA_PASSWORD}
    secure: true
    auto-accept: false
    publishing-interval: 500
    browse-nodes-chunk: 1000
    browse-chunk: 1000
    subscription-chunk: 500
    attributes-chunk: 5000
    keep-alive-interval: 60000
    browse-throttling:
      max-per-minute: 60
      max-parallelism: 1
      max-node-parallelism: 0
    retries:
      timeout: 0
      max-tries: 10
      max-delay: 20s
      initial-delay: 2s
      retry-status-codes:
      - 2150694912
      - 2148007936
      - 2150105088
      - 2156199936
  extraction:
    # Prefix used for all CDF externalIds created from OPC-UA nodes.
    id-prefix: "opcua_{{location}}_"
    # Map verbose OPC-UA namespace URIs to short prefixes used in node IDs.
    # Replace the example URIs with the namespaces exposed by your server.
    namespace-map:
      http://opcfoundation.org/UA/: 'base:'
      http://www.example.com/: 'c:'
      http://www.example.com/{{location}}: '{{location}}:'
      http://www.example.com/{{location}}2: '{{location}}2:'
      http://www.OPCFoundation.org/UA/2013/01/ISA95: 'isa95:'
    # Root node to start browsing from. Adjust namespace and node-id to your server.
    root-node:
      namespace-uri: "http://www.example.com/Site1"
      node-id: "s=Site1.Root"
    update:
      objects:
        name: true
        description: true
        context: true
        metadata: true
      variables:
        name: true
        description: true
        context: true
        metadata: true
    deletes:
      enabled: true
      delete-marker: "deleted"
    status-codes:
      status-codes-to-ingest: All
      ingest-status-codes: true
    data-types:
      allow-string-variables: true
      auto-identify-types: true
      data-type-metadata: true
      expand-node-ids: true
      append-internal-values: true
    node-types:
      metadata: true
    # Re-browse the server tree daily at 22:10 to pick up new/removed nodes.
    auto-rebrowse-period: 10 22 * * *
  subscriptions:
    sampling-interval: 0
    queue-length: 20
    data-points: true
    events: true
    log-bad-values: true
    data-change-filter:
      trigger: "StatusValueTimestamp"
  events:
    enabled: true
    history: true
    discover-emitters: false
    read-server: false
    # Emit events from the server root node. Replace with site-specific emitter
    # node IDs if your server exposes dedicated event sources.
    emitter-ids:
    - namespace-uri: "http://www.example.com/Site1"
      node-id: "i=0"
    historizing-emitter-ids:
    - namespace-uri: "http://www.example.com/Site1"
      node-id: "i=0"
  history:
    error-threshold: 100
    enabled: true
    restart-period: 0 */6 * * *
    data: true
    backfill: false
    data-chunk: 1000
    data-nodes-chunk: 1000
    event-chunk: 0
    event-nodes-chunk: 10
    start-time: 30d-ago
    end-time: 1d
    throttling:
      max-per-minute: 8000
      max-parallelism: 1
      max-node-parallelism: 0
  state-storage:
    location: 'db_{{location}}_opcua'
    database: Raw
    variable-store: state-store-variables
    event-store: state-store-events
    interval: 10
  cognite:
    cdf-throttling:
      time-series: 5
      assets: 10
      # Tune these down from defaults if you see HTTP 429 responses from CDF.
      data-points: 5
      raw: 5
      ranges: 10
      events: 1
    cdf-retries:
      max-retries: 10
      max-delay: 20000
    cdf-chunking:
      time-series: 500
      assets: 500
      data-point-time-series: 5000
      data-point-delete: 5000
      data-point-list: 50
      data-points: 50000
      raw-rows: 5000
      events: 500
    sdk-logging:
      disable: false
      level: information
    read-extracted-ranges: true
    data-set:
      external-id: '{{dataset}}'
    metadata-targets:
      clean:
        assets: true
        timeseries: true
        relationships: true
        space: '{{instanceSpace}}'
        source: "OPCUA"

      raw:
        database: 'db_{{location}}_opcua'
        assets-table: 'assets'
        timeseries-table: 'timeseries'
        relationships-table: 'relationships'
    raw-node-buffer:
      enable: true
      database: 'db_{{location}}_opcua'
      assets-table: 'assets'
      timeseries-table: 'timeseries'
      browse-on-empty: true
    metadata-mapping:
      timeseries:
        "EngineeringUnits": "unit"
  logger:
    console:
      level: debug
    file:
      level: information
      path: logs/opcua_log.txt
      retention-limit: 336
      rolling-interval: hour
    ua-trace-level: info
    trace-listener:
      level: info
  failure-buffer:
    enabled: true
    datapoint-path: buffer.bin
    event-path: "buffer-events.bin"
    # 10 GB local buffer for datapoints + events when CDF is unreachable.
    max-buffer-size: 10000000000
  metrics:
    # Optional Prometheus push-gateway for extractor metrics.
    push-gateways:
    - host: https://opcua-pushgw.example.com/
      job: '{{prometheusJobName}}'
      username: ${PROMETHEUS_USER}
      password: ${PROMETHEUS_PASSWORD}
