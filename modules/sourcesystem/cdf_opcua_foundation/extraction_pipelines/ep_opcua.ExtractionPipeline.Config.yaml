externalId: "ep_{{location}}_opcua"
dataSetExternalId: "{{dataset}}"

config:
  # OPC-UA Extractor configuration template
  # Source: gss-knowledge-base/extractors/toolkit_examples/opcua_extractor_speira_quickstart
  #
  # Environment variables required on the extractor host (local config.yml):
  #   CDF_PROJECT, CDF_URL, IDP_TENANT_ID, IDP_CLIENT_ID, IDP_CLIENT_SECRET
  #   OPCUA_ENDPOINT_URL  — e.g. opc.tcp://192.168.1.10:4840
  #   OPCUA_USER          — OPC-UA server username (omit if anonymous)
  #   OPCUA_PASSWORD      — OPC-UA server password

  version: 1

  logger:
    console:
      level: information
    file:
      level: information
      path: "logs/log.log"
      retention-limit: 31
      rolling-interval: day

  extraction:
    # External ID prefix — all OPC-UA nodes will be created as "opcua:<node-id>" in CDF
    id-prefix: "{{opcuaIdPrefix}}"

    status-codes:
      status-codes-to-ingest: GoodOnly
      ingest-status-codes: false

  # Write node metadata to RAW for transformation into ISATimeSeries DM instances
  raw:
    database: "db_{{location}}_opcua"
    table: nodes
    store-raw-metadata: true

  data-set:
    external-id: "{{dataset}}"

  source:
    endpoint-url: ${OPCUA_ENDPOINT_URL}
    username: ${OPCUA_USER}
    password: ${OPCUA_PASSWORD}
    # Accept server certificate automatically (set to false and configure certificates for production)
    auto-accept: true
    browse-throttling:
      max-per-minute: 200
      max-parallelism: 3

  subscriptions:
    publishing-interval: {{opcuaPublishingInterval}}
    sampling-interval: {{opcuaSamplingInterval}}

  # IMPORTANT: Node filters MUST be configured before production use.
  # Without filters the extractor browses the full OPC-UA server tree.
  #
  # Example (uncomment and adapt):
  # extraction:
  #   transformations:
  #     - type: Include
  #       filter:
  #         node-class: Object
  #         name:
  #           - "Objects"
  #           - "Site_Area_1"
  #     - type: Include
  #       filter:
  #         node-class: Variable
  #         name:
  #           - "Temperature_Tag_1"
  #     - type: Ignore
  #       filter:
  #         node-class: Variable
  #         name:
  #           - "InternalDiagnostic_*"

  # History backfill (disabled by default — enable for initial data load)
  # history:
  #   enabled: true
  #   start-time: "2024-01-01T00:00:00Z"
  #   throttling:
  #     max-per-minute: 200
  #     max-parallelism: 3
