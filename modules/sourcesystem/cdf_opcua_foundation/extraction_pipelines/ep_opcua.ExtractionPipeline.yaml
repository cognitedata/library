documentation: |
  ## OPC-UA extraction pipeline

  This extraction pipeline reads data from an OPC-UA server and writes Assets,
  Timeseries, Events, and Relationships to CDF. The runtime configuration lives
  in `ep_opcua.ExtractionPipeline.Config.yaml` and is fetched by the extractor
  using its `pipeline-id`.

  ### Endpoints (example — replace with your server addresses)

  * Primary  : `opc.tcp://opcua-server-primary.example.com:4840`
  * Secondary: `opc.tcp://opcua-server-secondary.example.com:4840`

  ### Required environment variables on the extractor host

  | Variable                | Purpose                                    |
  | ----------------------- | ------------------------------------------ |
  | `CDF_PROJECT`           | CDF project name                           |
  | `CDF_URL`               | CDF base URL                               |
  | `IDP_TENANT_ID`         | IdP tenant ID                              |
  | `IDP_CLIENT_ID`         | Service account client ID                  |
  | `IDP_CLIENT_SECRET`     | Service account client secret              |
  | `OPCUA_USER`            | OPC-UA server username (omit if anonymous) |
  | `OPCUA_PASSWORD`        | OPC-UA server password                     |
  | `PROMETHEUS_USER`       | (optional) Push-gateway username           |
  | `PROMETHEUS_PASSWORD`   | (optional) Push-gateway password           |

  ### Install the OPC-UA extractor

  1. **Download the installer** from Cognite Hub or Fusion (Extractors page).
  2. **Install on the extractor host**, e.g. `C:\Cognite\OPCUA\` on Windows or
     `/opt/cognite/opcua/` on Linux. Follow the README that ships with the
     installer to create a service.
  3. **Point the extractor at this pipeline** by giving it a minimal local
     `config.yml` containing only credentials and the pipeline ID:

     ```yaml
     version: 1
     type: remote
     cognite:
       project: ${CDF_PROJECT}
       host: ${CDF_URL}
       idp-authentication:
         tenant: ${IDP_TENANT_ID}
         client-id: ${IDP_CLIENT_ID}
         secret: ${IDP_CLIENT_SECRET}
         scopes:
           - ${CDF_URL}/.default
       extraction-pipeline:
         pipeline-id: ep_{{location}}_opcua
     ```

     The full runtime configuration (source, extraction filters, history,
     subscriptions, throttling, RAW targets, metrics, …) is delivered from this
     extraction pipeline's remote config.

  4. **Configure certificate storage** by editing
     `config/opc.ua.net.extractor.Config.xml` so certificates are stored in a
     known directory rather than the OS user store:

     ```xml
     <ApplicationCertificate>
       <StoreType>Directory</StoreType>
       <StorePath>./certificates/pki/app</StorePath>
       <SubjectName>CN=Opcua-extractor, C=NO, S=Oslo, O=Cognite, DC=localhost</SubjectName>
     </ApplicationCertificate>
     ```

  ### RAW tables written by this pipeline

  | Table                    | Purpose                                                    |
  | ------------------------ | ---------------------------------------------------------- |
  | `assets`                 | Asset rows staged from OPC-UA Object nodes                 |
  | `timeseries`             | Timeseries rows staged from OPC-UA Variable nodes          |
  | `relationships`          | Relationship rows derived from OPC-UA references           |
  | `known_objects`          | Browse cache of seen Object nodes                          |
  | `known_references`       | Browse cache of seen References                            |
  | `known_variables`        | Browse cache of seen Variable nodes                        |
  | `state-store-variables`  | Extractor state for variable subscriptions / history       |
  | `state-store-events`     | Extractor state for event subscriptions / history          |

  ### Browse / rebrowse behaviour

  * **Time-based rebrowse:** daily (configured via `auto-rebrowse-period`
    in the runtime config).
  * **Event-based rebrowse:** triggered by changes to *NamespacePublicationDate*
    (where supported by the server).

  ### References

  * OPC-UA extractor docs: <https://docs.cognite.com/cdf/integration/guides/extraction/opc_ua/>
  * OPC-UA configuration reference: <https://docs.cognite.com/cdf/integration/guides/extraction/configuration/opcua>
