externalId: "ep_{{location}}_opcua"
name: "ep:{{location}}:opcua"
dataSetExternalId: "{{dataset}}"
description: "OPC-UA Extractor pipeline for site {{location}} — writes node metadata to RAW for transformation into ISATimeSeries DM instances"
rawTables:
  - dbName: "db_{{location}}_opcua"
    tableName: "nodes"
schedule: Continuous
contacts:
  - name: {{integration_owner_name}}
    email: {{integration_owner_email}}
    role: Owner
    sendNotification: true
  - name: Cognite Support
    email: support@cognite.com
    role: Operational Owner
    sendNotification: true
  - name: {{data_owner_name}}
    email: {{data_owner_email}}
    role: Data Owner
    sendNotification: true
notificationConfig:
  # OPC-UA extractor streams continuously; alert if not seen for >30 minutes
  allowedNotSeenRangeInMinutes: 30
source: OPCUA
createdBy: cognite-toolkit
documentation: |
  ## OPC-UA extraction pipeline

  This extraction pipeline reads data from an OPC-UA server. The OPC-UA Extractor
  writes timeseries values directly to CDF and node metadata (name, description,
  data type) to RAW table `db_{{location}}_opcua.nodes`. The transformation
  `tr_{{location}}_opcua_timeseries` maps that metadata to **ISATimeSeries** view
  instances in `{{instanceSpace}}`.

  The runtime configuration lives in `ep_opcua.ExtractionPipeline.Config.yaml` and
  is fetched by the extractor using its `pipeline-id`.

  **Configure node filters before production use.** Without filters the extractor
  browses the full OPC-UA server tree, which may be very large and slow.

  ### Required environment variables on the extractor host

  | Variable                | Purpose                                    |
  | ----------------------- | ------------------------------------------ |
  | `CDF_PROJECT`           | CDF project name                           |
  | `CDF_URL`               | CDF base URL                               |
  | `IDP_TENANT_ID`         | IdP tenant ID                              |
  | `IDP_CLIENT_ID`         | Service account client ID                  |
  | `IDP_CLIENT_SECRET`     | Service account client secret              |
  | `OPCUA_ENDPOINT_URL`    | OPC-UA server URL (e.g. opc.tcp://host:4840) |
  | `OPCUA_USER`            | OPC-UA server username (omit if anonymous) |
  | `OPCUA_PASSWORD`        | OPC-UA server password                     |

  ### Install the OPC-UA extractor

  1. **Download the installer** from Cognite Hub or Fusion (Extractors page).
  2. **Install on the extractor host** and register as a service.
  3. **Point the extractor at this pipeline** with a minimal local `config.yml`:

     ```yaml
     version: 1
     type: remote
     cognite:
       project: ${CDF_PROJECT}
       host: ${CDF_URL}
       idp-authentication:
         tenant: ${IDP_TENANT_ID}
         client-id: ${IDP_CLIENT_ID}
         secret: ${IDP_CLIENT_SECRET}
         scopes:
           - ${CDF_URL}/.default
       extraction-pipeline:
         pipeline-id: ep_{{location}}_opcua
     ```

  ### References

  * OPC-UA extractor docs: <https://docs.cognite.com/cdf/integration/guides/extraction/opc_ua/>
  * OPC-UA configuration reference: <https://docs.cognite.com/cdf/integration/guides/extraction/configuration/opcua>
