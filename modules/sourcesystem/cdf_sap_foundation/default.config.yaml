# SAP Foundation — configuration variables

# Site/location code, used in externalIds (e.g. ep_{{location}}_sap, db_{{location}}_sap)
location: "site1"

# DM space where ISA Manufacturing Extension instances are written
instanceSpace: "sp_instances"

# dataSetExternalId for the extraction pipeline and RAW database
dataset: "ds_sap"

# SAP plant code — used in OData filter expressions (e.g. MaintPlant eq '{{sapPlant}}')
sapPlant: "1000"

# Disable SSL verification for the SAP gateway connection.
# Set to true ONLY if the SAP server uses a self-signed certificate that is
# not trusted by the extractor host.
sapDisableSsl: false
