# Files Foundation — configuration variables
# Default example pipeline targets SharePoint Online via the Files Extractor (CDM mode).

# Site/location code, used in externalIds (e.g. ep_{{location}}_files_sharepoint)
# Populated automatically from the site / location name entered in setup_project.py.
location: ""

# dataSetExternalId for the extraction pipeline (Files written by the extractor land here)
dataset: "ds_files"

# DM space where CogniteFile instances are written (extractor runs in destination-mode: cdm)
instanceSpace: "sp_instances"

# Integration owner (technical contact for the pipeline)
# Populated by setup_project.py wizard.
integration_owner_name: ""
integration_owner_email: ""

# Data owner (business contact for the data)
# Populated by setup_project.py wizard.
data_owner_name: ""
data_owner_email: ""
# Extractor group source ID — one scoped producer group per extractor.
extractor_group_source_id: ""
# Deployment environment — populated per environment by setup_project.py.
environment: dev
