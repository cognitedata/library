name: Build and Release Packages

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install test dependencies
      run: pip install pytest "cognite-sdk>=7,<8" pydantic pyyaml python-dotenv tenacity psutil

    - name: Lint with ruff
      uses: astral-sh/ruff-action@v3

    - name: Type check with pyright
      uses: jakebailey/pyright-action@v2

    - name: Run tests
      run: |
        pytest tests/ -q
        pytest modules/contextualization/cdf_entity_matching/functions/fn_dm_context_timeseries_entity_matching/ -q
        pytest modules/contextualization/cdf_p_and_id_annotation/functions/fn_dm_context_files_annotation/ -q

    - name: Validate packages.toml
      run: |
        python validate_packages.py

    - name: Build packages
      run: python build_packages.py

    - name: Upload packages artifact
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: packages.zip

    - name: Create/Update Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Release
        body: |
          ## Latest Packages Release

          **Download:** [packages.zip](https://github.com/${{ github.repository }}/releases/download/latest/packages.zip)

          This release is automatically updated on every merge to main.
        files: |
          packages.zip
        draft: false
        prerelease: false
