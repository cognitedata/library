# Foundation Deployment Pack (FDP): deploy to CDF when merging to dev, test, or prod.
# CDF credentials: repository variables/secrets prefixed DEV_, TEST_, PROD_ (see README).
name: FDP Deploy

on:
  push:
    branches:
      - dev
      - test
      - prod

concurrency:
  group: fdp-deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    env:
      CDF_CLUSTER: ${{ github.ref_name == 'dev' && vars.DEV_CDF_CLUSTER || github.ref_name == 'test' && vars.TEST_CDF_CLUSTER || vars.PROD_CDF_CLUSTER }}
      CDF_PROJECT: ${{ github.ref_name == 'dev' && vars.DEV_CDF_PROJECT || github.ref_name == 'test' && vars.TEST_CDF_PROJECT || vars.PROD_CDF_PROJECT }}
      LOGIN_FLOW: ${{ github.ref_name == 'dev' && vars.DEV_LOGIN_FLOW || github.ref_name == 'test' && vars.TEST_LOGIN_FLOW || vars.PROD_LOGIN_FLOW }}
      IDP_CLIENT_ID: ${{ github.ref_name == 'dev' && vars.DEV_IDP_CLIENT_ID || github.ref_name == 'test' && vars.TEST_IDP_CLIENT_ID || vars.PROD_IDP_CLIENT_ID }}
      IDP_CLIENT_SECRET: ${{ github.ref_name == 'dev' && secrets.DEV_IDP_CLIENT_SECRET || github.ref_name == 'test' && secrets.TEST_IDP_CLIENT_SECRET || secrets.PROD_IDP_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare FDP toolkit project
        run: bash .github/scripts/prepare-fdp-project.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Cognite Toolkit
        run: pip install "cognite-toolkit==0.7.220" pyyaml

      - name: cdf build
        run: cdf build --env ${{ github.ref_name }}

      - name: cdf deploy
        run: cdf deploy --env ${{ github.ref_name }}
